t nice after the rough road.</p><p>I thought about stopping there for lunch, but finding a proper vegetarian restaurant turned out to be difficult.<br>So I continued riding.</p><p>A few kilometres later I finally found a small place where I had a simple meal.<br>Sometimes simple roadside food feels like the best meal after long riding hours.</p><h4 class="font-bold text-xl mt-6 mb-2">A Surprise Meeting</h4><p>As I approached Dimapur, something unexpected happened.<br>I met the hostel travellers I had earlier seen in Nagaland.</p><p>It was one of those beautiful coincidences of the road.<br>Out of all the highways and towns, we crossed paths again.</p><p>We stopped for a while, spoke, laughed about the journey, and continued our rides.<br>Moments like that make travel feel magical.</p><h4 class="font-bold text-xl mt-6 mb-2">Crossing Into Assam</h4><p>Near the Nagaland–Assam border, I stopped for a short break and spoke with a few truck drivers who were resting there.<br>We chatted for a few minutes before I continued.</p><p>At one checkpoint, a policeman stopped me and asked me to remove my helmet.<br>For a moment I felt nervous.</p><p>But instead of questioning me, he smiled and said something encouraging.<br>He looked at my riding gear and said:<br>"This is how a responsible traveller should ride."</p><p>We spoke for about 10–15 minutes, and he wished me a safe journey before letting me continue.<br>That small interaction left me smiling.</p><h4 class="font-bold text-xl mt-6 mb-2">The Fuel Scare</h4><p>After crossing into Assam, I noticed something worrying.<br>My fuel was running low.</p><p>I assumed I would find a petrol pump soon.<br>But kilometre after kilometre passed, and there was nothing.</p><p>Soon the bike went into reserve fuel.<br>The road passed through forest areas, and the thought of the bike stopping there made me uncomfortable.</p><p>Finally, after almost 40 kilometres, I spotted a petrol pump in the middle of the forest region.<br>That moment felt like relief.</p><p>I filled the tank completely and also had some snacks there.<br>The bike was a bit heated from the ride, so I rested for a while and spoke with the petrol pump staff.</p><h4 class="font-bold text-xl mt-6 mb-2">Deciding the Next Stop</h4><p>Originally, I had planned to push further that day.<br>Maybe even reach deeper into Assam.</p><p>But standing there around 3 PM, I paused.<br>I realised something important.<br>There was no need to rush.</p><p>I had already travelled a long distance.<br>And my next dream destination — Kaziranga National Park — was nearby.</p><p>So I decided to stop near Kaziranga and explore it the next morning.</p><h4 class="font-bold text-xl mt-6 mb-2">Reaching Kaziranga</h4><p>The road ahead became calm and beautiful.<br>I rode slowly, enjoying the scenery.</p><p>By around 5 PM, I reached a small hostel near Kaziranga National Park.<br>To my surprise, I was the only guest in the entire hostel.<br>There were four beds, but I was the only traveller that night.</p><h4 class="font-bold text-xl mt-6 mb-2">The Kind Host</h4><p>The hostel owner turned out to be an international travel guide.<br>He was extremely polite and knowledgeable.</p><p>After checking in, I took a bath around 6 PM and relaxed for a while.<br>Across the road there was a small restaurant, so I went there and had a large thali dinner with chicken and rice.<br>After such a long riding day, it felt perfect.</p><p>When I returned, the hostel owner had already started a bonfire outside because the evening had become cold.</p><p>I sat with him and his daughter for a while.<br>We spoke about travel, Manipur, Northeast culture, and many other things.<br>He was calm, thoughtful, and genuinely interested in conversation.</p><h4 class="font-bold text-xl mt-6 mb-2">A Warm Ending to the Day</h4><p>Later that night, he even brought me Assamese snacks — pakoras and sweet tea.<br>It felt like genuine hospitality.</p><p>Before sleeping, I packed my bags again because the next morning I planned to visit Kaziranga National Park.</p><p>He also gave me useful advice.<br>Since I was travelling solo, hiring an entire jeep safari or elephant ride could be expensive.<br>Instead, he suggested joining a shared safari with other travellers.</p><h4 class="font-bold text-xl mt-6 mb-2">A Day of Riding</h4><p>That day had mostly been about riding.<br>In total, I had travelled almost 500 kilometres, crossing through Manipur, Nagaland, and Assam in a single day.</p><p>Yet the ride never felt rushed.<br>I moved slowly.<br>Stopped when needed.<br>Let the road decide the pace.</p><p>And that is exactly what makes long journeys meaningful.<br>Sometimes the best days are simply about riding forward.</p>', quote: '"Sometimes the best days are simply about riding forward."' },
            { type: 'chapter', id: 'ch37', title: 'Rhinos, Destiny, and the Road to the Mountains', chapter: 'Ch  37', stats: 'Kaziranga & Arunachal', image: 'images/chapter-37.jpg', desc: '<p>Kaziranga → Arunachal Pradesh</p><p>The previous night I had unpacked almost nothing.<br>I knew I would be leaving early, so only the essential things were taken out.</p><p>That morning I woke up around 5 AM.<br>The safari point of Kaziranga National Park was only about 20 kilometres from the hostel, so I quickly got ready and started my bike around 5:15 AM.</p><p>Before leaving, I wrote a small note thanking the hostel owner for his kindness. He had shared useful information, helped me plan the safari, and treated me with genuine hospitality.<br>It felt right to leave a small message of gratitude.</p><h4 class="font-bold text-xl mt-6 mb-2">Reaching Kaziranga</h4><p>By 6 AM, I reached the Kaziranga safari gate.<br>Many jeeps were already lining up to enter the park.</p><p>Since I was travelling solo, I began asking groups if I could join their jeep. Hiring an entire jeep alone would cost around ₹5000, which felt unnecessary for a single traveller.</p><p>But finding a group wasn’t easy.<br>Some people said no immediately.<br>Others told me their jeep was already full.<br>A few drivers even took my number and said they would call if they found space.</p><p>For a moment I thought I might miss the safari.<br>But travel has a strange way of helping you at the right time.</p><h4 class="font-bold text-xl mt-6 mb-2">When Destiny Helps</h4><p>While walking along the main road, I met two travellers who worked in the Central Government tax department.<br>They had come to Kaziranga as well.</p><p>I politely asked if I could join them.<br>They smiled and said,<br>"Of course, come with us."</p><p>Just like that, the problem was solved.<br>Instead of paying ₹5000 alone, the safari cost me around ₹600.<br>Sometimes the road really works in mysterious ways.</p><h4 class="font-bold text-xl mt-6 mb-2">The Kaziranga Safari</h4><p>The safari jeep entered the park, and I was lucky enough to stand in the front seat next to the driver, which gave me an amazing view.</p><p>The driver quickly became friendly and began pointing out animals along the way.</p><p>And then we saw them.<br>The famous one-horned rhinoceroses of Kaziranga.<br>Huge, powerful, and moving slowly through the tall grasslands.</p><p>Seeing them in the wild was unforgettable.<br>We also spotted elephants walking through the forest, birds flying across the wetlands, and many other animals moving through the landscape.</p><p>The park itself was stunning.<br>Wide grasslands.<br>Wetlands shining in the morning sun.<br>Mist slowly rising from the ground.</p><p>For nearly two hours, we explored the jungle.<br>I didn’t even realise how quickly time passed.</p><p>Standing there, watching wildlife in its natural habitat, I felt grateful that I hadn’t missed this experience.</p><h4 class="font-bold text-xl mt-6 mb-2">Leaving Kaziranga</h4><p>After the safari ended, I returned to the gate.<br>A small shop owner who had allowed me to keep my jacket and belongings safely also greeted me kindly.</p><p>I had breakfast there around 11 AM.<br>But the journey was far from over.<br>My next destination was Tawang, deep inside Arunachal Pradesh.</p><h4 class="font-bold text-xl mt-6 mb-2">The Permit Surprise</h4><p>To enter Arunachal Pradesh, travellers need an Inner Line Permit.<br>Initially, I had applied online, which cost about ₹500 for three days.</p><p>But at the border checkpost, something surprising happened.<br>When I completed the permit process offline, it cost only ₹75 for one month.<br>Sometimes the road teaches you small tricks like this.</p><p>The police officers at the checkpoint were also extremely helpful and friendly.<br>One of them even advised me to buy tyre chains, as they might be necessary if snow appeared further up in the mountains.</p><p>So I stopped at a nearby shop and bought two chains — one for the front tyre and one for the rear tyre.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering Arunachal Pradesh</h4><p>The moment I crossed into Arunachal Pradesh, everything changed.</p><p>The landscape transformed instantly.<br>The air felt colder.<br>The mountains grew taller.<br>The roads twisted through forests and valleys.<br>The scenery became unbelievably beautiful.</p><p>I stopped every 10–15 kilometres, simply to admire the view.<br>Every stop became a small moment of joy.</p><p>Sometimes local people stopped to talk with me.<br>Many were surprised to see a solo rider travelling from Karnataka.<br>They asked questions, clicked pictures, and wished me well.<br>Those interactions made the ride even more special.</p><h4 class="font-bold text-xl mt-6 mb-2">The Temperature Drops</h4><p>By around 4:30 PM, the temperature suddenly dropped.<br>The cold air became sharp.</p><p>My breath began to feel heavy, and the road started getting darker earlier than expected.<br>Even though the distance ahead looked manageable on the map, the narrow mountain roads forced me to slow down to 30–35 km/h.</p><p>The police officers I met along the way warned me that the road was safe, but the temperature would keep dropping.</p><p>I briefly considered stopping earlier at Rupa, a small town along the way.<br>But I decided to continue.</p><h4 class="font-bold text-xl mt-6 mb-2">The Freezing Night Ride</h4><p>The ride ahead became difficult.<br>By the time I reached Pombida, it was around 5:15 PM.<br>The cold had become intense.</p><p>I decided to stop there for the night.<br>When I entered the room, I immediately understood the situation.</p><p>The bed had four blankets.<br>Only later did I realise why.<br>When I checked the temperature, it was already –3°C.<br>And it was only 6 PM.</p><h4 class="font-bold text-xl mt-6 mb-2">A Cold but Beautiful Evening</h4><p>After ordering food and tea, I sat quietly inside the room.<br>Outside, the mountains were silent.<br>Inside, the warmth of the blankets slowly returned to my body.</p><p>Even though the cold was extreme, the journey felt beautiful.<br>The road from the Assam–Arunachal border to this region was one of the most scenic stretches I had ever ridden.</p><p>Nearly 100 kilometres had taken almost three hours, not because the road was bad — but because I kept stopping to enjoy the scenery.</p><p>Sometimes the best journeys are the slowest ones.</p><h4 class="font-bold text-xl mt-6 mb-2">Ending the Day</h4><p>The hotel owner, who was from Assam, turned out to be a very kind person.<br>We spoke for some time before I went to my room.</p><p>Since I had arrived early, I spent the evening watching videos and resting.<br>It was Sunday, the mountains were silent, and the cold outside was intense.</p><p>But inside the room, wrapped in blankets after a long day of riding, I felt peaceful.<br>The road to Tawang had begun.</p>', quote: '"Sometimes the best journeys are the slowest ones."' },
            { type: 'chapter', id: 'ch38', title: 'Riding Into the Silence of the Himalayas', chapter: 'Ch  38', stats: 'Sela Pass to Tawang', image: 'images/chapter-38.jpg', desc: '<p>Bomdila Region → Sela Pass → Tawang</p><p>By this point in the journey, waking up early had become a habit.<br>That morning in Arunachal Pradesh, I woke up around 4:30 AM.</p><p>But outside, the cold was intense.<br>For a moment I wondered if I should start riding immediately. But the temperature was close to zero degrees, and I knew riding too early would be difficult.</p><p>So I stepped outside the room instead.<br>What I experienced in that moment is something I will never forget.</p><p>The road was completely silent.<br>Not a single vehicle.<br>No people.<br>No sound.</p><p>It was so quiet that I could literally hear my own heartbeat.<br>The mountains stood still around me, and the sky was slowly turning light.</p><p>Even though it was just around 5 AM, the early Himalayan light had already begun spreading across the valley.<br>It was one of the most peaceful mornings of my entire journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Preparing for the Ride</h4><p>By around 6 AM, I had packed everything.<br>My bike was already outside, so I slowly tied all the luggage, checked everything carefully, and even managed to take a quick bath despite the freezing weather.</p><p>By 7 AM, I finally started the ride.<br>But the cold was brutal.</p><p>Within a few kilometres my hands started freezing.<br>I could barely feel the clutch and brake.<br>Every two or three kilometres, I had to stop, rub my hands together, warm them near the engine heat, and start again.</p><p>Sometimes I rode only 20–30 km/h.<br>Riding in zero-degree temperatures is not just difficult — it demands patience.</p><p>My face felt frozen, my beard had tiny crystals forming, and breathing the cold air felt heavy.<br>But the mountains ahead kept pulling me forward.</p><h4 class="font-bold text-xl mt-6 mb-2">Tea Stops and Warm Moments</h4><p>After some time, I stopped at a small roadside place and had hot tea.<br>That cup of tea felt like life returning to my body.</p><p>Slowly, the journey continued.</p><h4 class="font-bold text-xl mt-6 mb-2">The Beauty of Arunachal</h4><p>As I climbed higher into the mountains, the landscape became more dramatic.<br>Near Bomdila, I visited a natural hot spring area, where warm water flows naturally from the ground.</p><p>The contrast between the freezing mountain air and the warm spring water was fascinating.</p><p>Later I stopped at a place called Shanti Valley, where I spent some time walking around and speaking with a few locals.<br>The valley was stunning.<br>Tall mountains, clear skies, and endless silence.</p><p>I took photographs and simply enjoyed the moment.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering the High Mountains</h4><p>Soon I approached the region near Sela Tunnel and Sela Pass, one of the highest mountain passes in India.<br>The road there was breathtaking.<br>But it also demanded attention.</p><p>At first I noticed stones scattered across the road and wondered why people had placed them there.<br>Then I realised something.</p><p>They weren’t placed by people.<br>They had fallen from the mountains above.</p><p>Rockfalls are common in these high Himalayan roads, so riding carefully was extremely important.</p><p>The altitude there was around 13,000 feet above sea level, and I could feel the effect.<br>Even the bike struggled slightly due to the thin air.</p><p>Still, the views were unbelievable.<br>Every few kilometres I stopped.<br>Clicked photographs.<br>Spoke with travellers.<br>Visited war memorials dedicated to soldiers who protected these mountains.</p><p>Each stop became a small story.</p><h4 class="font-bold text-xl mt-6 mb-2">The Decision to Pause</h4><p>By the time I reached Tawang Gateway, it was already around 12 PM.<br>From there, Tawang town was only about 40 kilometres away, but the mountain road meant it would still take nearly two hours.</p><p>At the same time, I also needed to start my work around 1 PM.<br>So I stopped at a small restaurant along the road.</p><p>The restaurant staff were extremely kind.<br>Not only did they serve good food, they also allowed me to sit and work from there for some time.</p><p>For nearly an hour, I worked from that small mountain restaurant.<br>It was one of those unexpected travel-work moments that make remote journeys memorable.</p><h4 class="font-bold text-xl mt-6 mb-2">Deciding Not to Rush</h4><p>After finishing my work at the roadside restaurant around 2 PM, I started riding again.<br>From there, Tawang was still about 40 kilometres away, which in the mountains meant nearly two hours of riding.</p><p>But just a few minutes later, after riding around 200 metres, I saw a small homestay in Jang village.<br>For a moment I paused.</p><p>And a simple thought came to my mind:<br>Why rush to Tawang today?</p><p>The mountains were beautiful.<br>The weather was cold but peaceful.<br>And the journey had already been long.</p><p>Instead of pushing further just to reach a destination, I decided to slow down and stay in Jang for the night.<br>Sometimes the best travel decisions come from simply listening to the road.</p><h4 class="font-bold text-xl mt-6 mb-2">A Warm Stay in Jang</h4><p>The homestay was called Lotus Homestay, and it had opened only about twenty days earlier.<br>I became the first guest to check in there.</p><p>The owner, a kind and humble lady, welcomed me warmly and gave me a room at a very reasonable price.<br>After settling in, I continued my work for some time.</p><p>Later she suggested a few nearby places I could visit and shared useful information about Tawang and the surrounding region.</p><h4 class="font-bold text-xl mt-6 mb-2">A Cold Evening in the Mountains</h4><p>In the evening I stepped out to explore the area around Jang village.<br>The place was quiet and surrounded by mountains.</p><p>Soon there was a power cut, which is quite common in these high mountain villages.<br>The homestay owner suggested that I go to a nearby restaurant run by their relatives.</p><p>So I walked there.<br>The people there welcomed me warmly and offered tea.<br>Later they even served me food without charging anything, simply out of kindness.</p><h4 class="font-bold text-xl mt-6 mb-2">Sitting Around the Mountain Kitchen</h4><p>They invited me inside their traditional kitchen area, where a central stove kept the room warm.<br>In mountain homes, this kitchen space is where people cook, eat, and sit together during cold evenings.</p><p>I sat there with them for a long time.<br>We spoke about life in Arunachal Pradesh, local culture, tourism, business, and travel.<br>They even shared drinks with me and treated me like family.</p><p>That warmth in the middle of the cold mountains felt unforgettable.</p><h4 class="font-bold text-xl mt-6 mb-2">Conversations That Last</h4><p>Later, when I returned to the homestay, the owner and I continued talking for almost one and a half hours.<br>She shared many insights about Arunachal culture, tourism challenges, and life in the mountains.</p><p>Travel often teaches more through people’s stories than through places.<br>And that evening in Jang village was one of those moments.</p><h4 class="font-bold text-xl mt-6 mb-2">Ending the Day in Jang</h4><p>By around 11 PM, I finally went to sleep.<br>The day had been long — riding through frozen roads, mountain passes, and 13,000-foot altitude.</p><p>But ending the day in the peaceful village of Jang, surrounded by kind people and warm conversations, felt perfect.</p><p>Sometimes the journey reminds you:<br>There is no need to rush to the destination.<br>The road itself already gives you everything.</p>', quote: '"There is no need to rush to the destination. The road itself already gives you everything."' },
            { type: 'chapter', id: 'ch39', title: 'When the Road Tested Me', chapter: 'Ch  39', stats: 'Tawang', image: 'images/chapter-39.jpg', desc: '<p>Jang → Nuranang (Jang) Waterfall → Tawang</p><p>This day became one of the most unforgettable days of my journey.</p><p>I woke up around 6 AM in Jang. Everything was already packed from the previous night. The mountains were still quiet and most people in the homestay were asleep.<br>I did not want to disturb anyone.</p><p>So I simply sent a message to the homestay owner thanking her for the kindness and hospitality. She had treated me like family.<br>I quietly started my bike and left.</p><p>Just 50 meters from the homestay, I saw a small tea shop. I stopped there for a cup of tea and biscuits before starting the ride toward Tawang.<br>It was barely 7 AM.</p><p>I parked my bike outside and stepped in.<br>When I came back out after tea, something strange caught my eye.</p><p>There was oil on the ground under my bike.<br>At first I thought it might be engine oil. My heart skipped for a moment.<br>I bent down and checked carefully.</p><p>The oil was coming from the rear suspension.</p><p>For a moment I just stood there silently.<br>“Something is wrong.”</p><h4 class="font-bold text-xl mt-6 mb-2">The Bike Begins to Struggle</h4><p>I asked a few local people if there was any Hero service center nearby.<br>They told me maybe I could find something in Tawang town.<br>So I decided to ride slowly and reach there.</p><p>But as soon as I started the bike, I realized the situation was serious.<br>The bike began jumping violently.<br>Without oil, suspension was no longer absorbing shocks.<br>The bike literally felt like it was dancing on the road.</p><p>Still, I decided to move carefully.<br>My next stop was Nuranang Waterfall, also known as Jang Waterfall, just a few kilometres away.<br>Normally it should take 10–15 minutes to reach.<br>That day it took almost an hour.</p><p>I rode slowly at 20–30 km/h, carefully balancing the bike.<br>The road was steep and the weather extremely cold.<br>In two places there was black ice on the road, and I slipped twice while climbing.</p><p>But somehow I managed to control the bike.<br>Finally, I reached the waterfall.</p><h4 class="font-bold text-xl mt-6 mb-2">Forgetting the Problem</h4><p>The moment I saw the waterfall, something strange happened.<br>I completely forgot about the bike.</p><p>The Nuranang waterfall was breathtaking. Water crashed down from the mountain with immense force, creating mist that floated in the cold air.<br>A few tourists from Assam and West Bengal were there. They became friendly and started asking about my journey.</p><p>We spoke for a few minutes.<br>I walked closer to the waterfall, enjoying the moment.<br>Sometimes nature has a way of reminding you to pause, even when problems are waiting.</p><h4 class="font-bold text-xl mt-6 mb-2">The Reality Returns</h4><p>When I came back to the parking area, I saw the truth.<br>The entire suspension oil had drained out.<br>It was completely empty.</p><p>I took photos and immediately called the Hero service mechanic who usually services my bike back home.<br>I shared the pictures with him.</p><p>After seeing them, he said something very direct.<br>“Your suspension is broken. It needs replacement. You can ride slowly for a short distance, but continuing like this will be very difficult.”</p><p>I asked if there was any service center nearby.<br>We searched.<br>There was no Hero showroom in Tawang.<br>The nearest proper service center was in Guwahati — nearly 500 kilometers away.</p><p>And reaching there with a broken suspension would take two days of extremely slow riding.</p><p>Still, strangely, I wasn’t panicking.<br>Instead, I smiled.</p><p>This journey had already taught me something important:<br>Every problem is also an experience.</p><h4 class="font-bold text-xl mt-6 mb-2">The Fall</h4><p>I continued riding slowly.<br>But without suspension oil, the bike had become extremely unstable.<br>Whenever I accelerated slightly, the bike began shaking and bouncing.</p><p>At one point while climbing a steep road, the bike lost balance again.<br>I fell.</p><p>But I protected the bike and managed to stop the fall from becoming worse.<br>Getting up wasn’t easy.<br>The bike was fully loaded with luggage, and I was wearing full riding gear.<br>It took effort just to stand properly again.</p><p>But slowly, I continued.</p><p>I asked many locals along the way if anyone could repair suspension.<br>Everyone said the same thing.<br>“Very difficult to find here.”</p><h4 class="font-bold text-xl mt-6 mb-2">A Strange Turn of Destiny</h4><p>Then something very strange happened.<br>I passed a small road and continued ahead.<br>After a few minutes, I suddenly felt like turning back.</p><p>I don’t know why.<br>But I did.</p><p>I rode back to the same road.<br>And that moment changed everything.</p><p>Standing there was a man on the phone.<br>When he saw my bike, he looked at the number plate.<br>“Karnataka?”</p><p>Then he spoke in Kannada.<br>He was from Mysuru.<br>And he was an Indian Air Force officer stationed in Tawang.</p><p>Even more surprising, he normally never came to that place.<br>But that morning he happened to be there.<br>Both of us had arrived at that exact place at the exact same moment.</p><p>Sometimes life creates moments that feel too precise to be coincidence.</p><h4 class="font-bold text-xl mt-6 mb-2">Help Arrives</h4><p>He immediately understood that I needed help.<br>He called the Indian Air Force guest house and arranged a place for me to stay.</p><p>I couldn’t believe what was happening.<br>Just a few minutes earlier, I was alone on a mountain road with a broken bike.<br>And now help had appeared out of nowhere.</p><p>I thanked him deeply.</p><h4 class="font-bold text-xl mt-6 mb-2">Trying to Fix the Bike</h4><p>After settling in, I removed all the luggage from the bike and rode slowly into Tawang market to find a mechanic.<br>Finally I found one small workshop.</p><p>The mechanic tried everything possible.<br>He attempted to fit suspension parts from other bikes like KTM and Pulsar.<br>Nothing worked.<br>The design was different.</p><p>By the time we finished trying, it was already 5:30 PM, and darkness had covered the town.<br>He reassembled the bike as best as possible.<br>But the suspension still needed replacement.</p><p>Shipping the bike from Tawang was extremely expensive.<br>And because of the festival season, spare parts delivery would take at least one week.</p><p>For the first time that day, I felt slightly heavy inside.<br>But I told myself something simple.<br>“Don’t think about tomorrow. Just live today.”</p><h4 class="font-bold text-xl mt-6 mb-2">Gratitude</h4><p>That evening I returned to the guest house.<br>Everyone there treated me with kindness.<br>They helped me with everything.</p><p>Dinner felt peaceful.<br>Later I washed my clothes and relaxed in the room.</p><p>But one thought kept returning to my mind.<br>My bike had carried me over 6,000–7,000 kilometres through some of the toughest roads in India.<br>And when it finally broke down…<br>It didn’t leave me in the middle of nowhere.</p><p>It stopped exactly at a place where help would arrive.</p><h4 class="font-bold text-xl mt-6 mb-2">Faith in the Road</h4><p>That day I realised something powerful.<br>Sometimes our plans fail.<br>Not because we planned badly.<br>But because life has its own way of protecting us.</p><p>And maybe that breakdown was not a problem.<br>Maybe it was simply God’s way of guiding me to the right place.</p><h4 class="font-bold text-xl mt-6 mb-2">When Even Machines Feel Like Family</h4><p>That day was hard.<br>Solo travel is beautiful, but it is not easy.<br>When you travel alone, you face everything alone — happiness, sadness, loss, fear, strength.</p><p>The day had started normally.<br>Just another cold morning in the mountains.<br>But suddenly my bike broke down.</p><p>And strangely, I didn’t feel angry.<br>I felt emotional.<br>Because it was not his fault.</p><p>For more than 7,000 kilometres, across forty continuous days, he had carried me everywhere — through broken roads, muddy tracks, mountain passes, dust storms, and places where there was not even a proper road.</p><p>He had never complained.<br>He had never stopped.<br>He had never left me.</p><p>And now, when he was finally tired, I could see it.<br>Oil leaking from the suspension.<br>The front end shaking violently.<br>The bike jumping and struggling on every bump.</p><p>He was hurt.<br>He was broken.<br>But he was still standing there for me.<br>Still trying to move forward.<br>Still trying to protect me.</p><p>Even in pain, he didn’t give up.</p><h4 class="font-bold text-xl mt-6 mb-2">More Than a Machine</h4><p>At that moment I realised something.<br>This was not just a motorcycle.<br>It had become a partner in the journey.</p><p>A silent companion that had carried me through thousands of kilometres without asking for anything.<br>And even when it had no strength left, it chose the place where it would stop carefully.<br>A remote mountain road, where somehow help would arrive.</p><p>And it did.</p><p>An Indian Air Force officer noticed me, recognised the Karnataka number plate, and stopped to help.<br>He arranged a place for me to stay, food to eat, and support when I needed it the most.</p><p>If we had missed each other by even a minute, that meeting might never have happened.</p><p>That moment didn’t feel like luck.<br>It felt like perfect timing.</p><h4 class="font-bold text-xl mt-6 mb-2">A Promise Between Rider and Machine</h4><p>Standing there beside my broken bike, I placed my hand on the tank.<br>And I silently thanked him.<br>For every kilometre.<br>For every rough road.<br>For every mountain pass.</p><p>He had proven something that day.<br>He would never abandon me.<br>No matter where we were.<br>No matter what situation we faced.</p><p>This was not just a bike anymore.<br>It was loyalty.<br>It was trust.<br>It was emotion.</p><p>And it had earned a permanent place in my heart.</p>', quote: '"This was not just a bike anymore. It was loyalty. It was trust. It was emotion."' },
            { type: 'chapter', id: 'ch40', title: 'Faith Over Fear', chapter: 'Ch  40', stats: 'Tawang', image: 'images/chapter-40.jpg', desc: '<p>After the intense events of the previous day, I finally slept peacefully.</p><p>The next morning I woke up around 6:30 AM. For the first time in many days, I had allowed myself to wake up a little later.<br>From the guest house window, I could see the sun slowly rising over the mountains of Tawang. Golden light touched the snow-covered peaks and slowly spread across the valley.</p><p>For a few minutes, I simply stood there watching.<br>Even after everything that had happened with my bike the previous day, the morning felt calm.</p><p>Sometimes the mountains remind you that problems are small in front of nature.</p><h4 class="font-bold text-xl mt-6 mb-2">Starting the Day Slowly</h4><p>The weather was still extremely cold.<br>I started the day slowly with a cup of hot tea, then took a bath and went for breakfast.</p><p>While eating, the thought of the bike stayed in my mind.<br>The suspension was broken.<br>Proper spare parts were unavailable.<br>And the nearest service center was nearly 500 kilometres away in Guwahati.</p><p>But strangely, I was not worried.<br>Somewhere inside me, I felt confident.</p><p>This journey had already shown me many times that help appears when you least expect it.<br>So instead of worrying, I decided to explore Tawang town.</p><h4 class="font-bold text-xl mt-6 mb-2">The Dalai Lama Monastery</h4><p>Around 8 AM, I carefully started the bike and rode slowly toward the Dalai Lama Monastery.</p><p>The moment I entered, a deep silence surrounded me.<br>The monastery was peaceful.<br>Prayer flags moved gently in the cold wind, monks walked quietly through the corridors, and the sound of distant chants echoed through the halls.</p><p>Standing there, I felt something powerful.<br>Even though the journey had suddenly become uncertain, I still had a strange confidence.</p><p>I told myself:<br>"Things will work out. Just stay calm."</p><h4 class="font-bold text-xl mt-6 mb-2">The Great Tawang Monastery</h4><p>From there I rode toward the famous Tawang Monastery, one of the largest monasteries in India.</p><p>When I entered, I was amazed by its beauty.<br>The massive prayer hall, the colourful murals, and the giant Buddha statue created an atmosphere that felt sacred and peaceful.</p><p>On that day, a festival ceremony was taking place inside.<br>Monks were chanting, visitors were observing quietly, and the entire monastery felt alive with spiritual energy.</p><p>I sat there silently for about 15–20 minutes, simply absorbing the moment.<br>Sometimes travel is not about movement.<br>Sometimes it is about pausing in the right place.</p><h4 class="font-bold text-xl mt-6 mb-2">Unexpected Friendships</h4><p>Outside the monastery, a man noticed my Karnataka number plate and approached me.<br>He asked if I was travelling solo.</p><p>Soon we were talking like old friends.<br>He was also surprised to see someone riding all the way from the south to Tawang.</p><p>We clicked a few pictures together and exchanged numbers.<br>Moments like these reminded me that the road connects strangers instantly.</p><h4 class="font-bold text-xl mt-6 mb-2">The Giant Buddha</h4><p>My next stop was the giant Buddha statue overlooking Tawang valley.<br>From there, the view of the mountains was breathtaking.</p><p>Snow-covered peaks surrounded the town, and the cold air felt pure and refreshing.<br>I sat quietly for some time.<br>Not thinking about the bike.<br>Not thinking about the next destination.<br>Just enjoying the moment.</p><h4 class="font-bold text-xl mt-6 mb-2">Reality Returns</h4><p>Eventually, reality returned.<br>The bike still needed repair.</p><p>So I went back to the same mechanic shop I had visited the previous day.<br>Before that, I had even explored the possibility of shipping the bike to Guwahati.<br>But the cost was extremely high.<br>And somehow, I didn’t feel comfortable with that idea.</p><p>It felt like giving up too quickly.<br>Instead, I chose patience.<br>I trusted the journey.</p><p>Throughout the entire trip so far, whenever something unexpected happened, help had always appeared at the right moment.<br>So I stayed positive.</p><h4 class="font-bold text-xl mt-6 mb-2">The Mechanic’s Effort</h4><p>The mechanic understood my situation immediately.<br>Even though he did not have the correct spare parts, he still wanted to help.</p><p>He began experimenting with whatever parts he had in his small garage.<br>First he tried fitting suspensions from KTM and Pulsar motorcycles.<br>But the sizes and fittings didn’t match properly.</p><p>Finally, he removed a suspension from another bike lying in his garage and carefully modified it.</p><p>The entire front portion of my bike was dismantled.<br>Panels were opened.<br>Bolts removed.<br>Parts adjusted.</p><p>After nearly two hours of effort, he managed to install a temporary suspension setup.<br>But there was a compromise.</p><p>Because of the different suspension design, the air filter box could not be fitted back into place.<br>So the mechanic had to remove the air filter completely.</p><p>When I started the engine, the sound shocked me.<br>The bike began roaring loudly, much louder than before.<br>Without the air filter, the engine sounded raw and powerful.<br>It almost felt like a wild machine.</p><p>But at that moment, sound didn’t matter.<br>What mattered was that the bike could move again.</p><h4 class="font-bold text-xl mt-6 mb-2">Something Is Better Than Nothing</h4><p>The repair was not perfect.<br>But it was enough.</p><p>The bike was now stable enough to ride.<br>And sometimes in travel, perfection is not required.<br>Sometimes “something is better than nothing.”</p><p>I thanked the mechanic sincerely.<br>In remote mountain towns, people help you not because they must — but because they understand your situation.</p><h4 class="font-bold text-xl mt-6 mb-2">Trusting the Journey</h4><p>That day taught me something important.<br>At no point did I panic.<br>I didn’t think negatively.<br>Instead, I trusted the journey.</p><p>Every problem on this trip had eventually turned into a story, a lesson, or a meaningful encounter.<br>And this moment was no different.</p><p>With the temporary suspension fixed and the engine roaring louder than ever, my bike was ready to move again.<br>It wasn’t perfect.<br>But neither was the road.</p><p>And somehow, that felt perfectly fine.</p>', quote: '"Sometimes in travel, perfection is not required. Sometimes \'something is better than nothing.\'"' },
            { type: 'chapter', id: 'ch41', title: 'Kindness in the Mountains', chapter: 'Ch  41', stats: 'Tawang', image: 'images/chapter-41.jpg', desc: '<p>The next morning I woke up around 6:30 AM. After everything that had happened with my bike, the previous days had been emotionally intense. But that morning felt calm.</p><p>Within half an hour I got ready and went for breakfast. In the Indian Air Force guest house, breakfast was served early, and by 7:30 AM I was already sitting down for a warm meal.</p><p>After breakfast, I decided to visit the Tawang War Memorial.</p><p>The place carried a deep sense of respect and silence. Standing there, surrounded by the names of soldiers who had sacrificed their lives, made me realise how peaceful our journeys are compared to the sacrifices made by the people protecting these borders.</p><p>I spent some time there before heading to the War Museum nearby.</p><p>Behind the museum was the Indian Air Force office, where the officer I had met the previous day worked. After finishing my visit, I called him.</p><p>Soon he arrived.<br>We spent some time talking and then walked together to the Air Force canteen, where we had snacks and tea.</p><p>During our conversation he shared an interesting story about the region. In Tawang, people traditionally did not cook a Chilly bajji. But after the Air Force officers introduced it and started using it in their meals, IAF canteen gradually began cooking it too.</p><p>Small cultural exchanges like that quietly change communities.</p><p>We continued walking and talking for a while. Then the officer asked me about my next plan.</p><p>I told him I was thinking about visiting Bumla Pass, but I knew the permit process usually takes time.</p><p>To my surprise, he simply asked for my Aadhaar and vehicle documents and said he would arrange the permit.<br>Normally travellers have to wait a day and pay certain charges, but thanks to his help everything was processed quickly.</p><p>All I had to do was collect the permit the next day.</p><p>Before leaving, he also suggested that I attend the light and laser show at the War Memorial in the evening.<br>After thanking him, I returned to my stay and started my work for the day.</p><p>The afternoon was relaxed.<br>I spent some time chatting with two travellers staying there — one from Manali and another from Jammu & Kashmir. We exchanged travel stories and laughed about the strange situations that travellers often face.</p><p>Later in the evening, around 5:30 PM, I went back to the War Memorial to watch the light show.</p><p>The show beautifully narrated the history of the region and the bravery of the soldiers who fought there. Watching it under the cold mountain sky felt powerful and emotional.</p><p>By 7:30 PM, I returned to my stay, had dinner, and spent some more time talking with the travellers.</p><p>Before sleeping, I checked my phone.<br>And what I saw touched me deeply.</p><p>Two days earlier my bike had broken down, and somehow the story had reached many people. There were messages waiting for me.</p><p>Some people were asking if I was safe.<br>Some were waiting for my updates.<br>Some even asked if I needed help.</p><p>Many of them were not even close friends.<br>Still, they cared.</p><p>Reading those messages made me emotional.<br>Sometimes the road teaches you that even strangers can become silent supporters of your journey.</p><p>That night I slept peacefully.<br>The next morning, I would ride to Bumla Pass, one of the most remote and historic borders in India.</p>', quote: '"Sometimes the road teaches you that even strangers can become silent supporters of your journey."' },
            { type: 'chapter', id: 'ch42', title: 'Riding to the Edge of the Nation', chapter: 'Ch  42', stats: 'Bumla Pass', image: 'images/chapter-42.jpg', desc: '<p>Tawang → Bumla Pass</p><p>The next morning I woke up around 5:30 AM.<br>It was freezing cold — nearly –6°C.</p><p>Outside, thin layers of ice had formed on rooftops and vehicles. The air was so sharp that breathing itself felt cold.</p><p>That day I had planned something special.<br>Bumla Pass.</p><p>Because of the temporary suspension fix, I decided to travel with as little weight as possible. I removed all the luggage from my bike and left most of it in the room.</p><p>Around 6:30 AM, I went to the War Museum office to collect my permit.<br>After signing the entry register, I received the Bumla Pass permit.</p><p>Just as I was about to leave, I realised I had forgotten my Insta360 camera and Aadhaar card at the stay.<br>Without those documents I wouldn’t be allowed to cross the checkpoints.</p><p>So I had to ride back, collect them, and start again.</p><p>Finally, around 6:45 AM, I began the journey.</p><h4 class="font-bold text-xl mt-6 mb-2">The Frozen Road</h4><p>After barely three kilometres, my hands became completely numb.<br>The cold was brutal.</p><p>I had to stop for a few minutes just to rub my hands and regain feeling in my fingers.</p><p>Soon I reached a small frozen lake.<br>The surface of the lake had turned into solid ice.</p><p>While I was standing there admiring the view, a man with his young child approached me. They were excited to see someone travelling alone on a motorcycle in such extreme conditions.</p><p>We talked for a few minutes and took pictures together.<br>Moments like that always make the journey special.</p><h4 class="font-bold text-xl mt-6 mb-2">The Roaring Bike</h4><p>My bike sounded very different that day.<br>Since the air filter had been removed, the engine was breathing raw air directly. The sound was loud and aggressive.</p><p>On the quiet mountain roads, the roar echoed through the valley.<br>At such high altitude, the engine was already struggling because of the thin air. Every climb required patience.</p><p>Still, the road ahead was stunning.<br>Every few kilometres there were military camps, reminding me how close I was to the international border.</p><h4 class="font-bold text-xl mt-6 mb-2">Frozen Lakes and Open Silence</h4><p>Further along the road I reached another completely frozen lake.<br>I stopped again.</p><p>This time I even rode my bike carefully onto the icy ground near the lake, just to experience the feeling of standing in such a surreal place.</p><p>Snow patches surrounded the area and the entire valley looked silent and untouched.<br>The view was breathtaking.</p><p>I set up my tripod to take a picture with my bike.<br>But suddenly a strong wind knocked the camera down.</p><p>For a moment my heart stopped — I thought someone had taken it.<br>Thankfully it had just fallen.<br>I fixed the tripod again using stones and finally managed to capture the picture.</p><h4 class="font-bold text-xl mt-6 mb-2">Bumla Pass</h4><p>Eventually I reached Bumla Pass, the border between India and China.<br>Phones and cameras were not allowed inside, so I had to leave them at the security point.</p><p>The temperature there felt even colder.<br>Even though the sun was shining, the wind made it feel like –4°C.</p><p>I stood at the border point for a while, quietly observing the place where two nations meet.<br>It was a powerful moment.</p><p>After spending some time there and having tea at the Indian Army camp, I started my return journey.</p><h4 class="font-bold text-xl mt-6 mb-2">When the Bike Struggled Again</h4><p>But the ride back wasn’t easy.<br>My bike refused to start several times.<br>The battery had become weak because of the cold and the earlier problems.</p><p>I had to push the bike repeatedly to start it.<br>For nearly 30 minutes, I struggled like this — riding a few hundred metres, stopping, pushing, and starting again.</p><p>Still, somehow I kept moving.</p><p>At one point I stopped at a waterfall viewpoint, though cameras were not allowed there either.</p><p>Later I reached a small Indian Army restaurant near a lake and temple.<br>The soldiers noticed how cold I looked and invited me inside the kitchen to warm up near the heater.<br>I had lunch there.<br>It cost only ₹50.<br>But the warmth and kindness I received there felt priceless.</p><h4 class="font-bold text-xl mt-6 mb-2">Encounters on the Road</h4><p>While riding back, an Innova car followed me for some time.<br>Inside was a family.</p><p>They stopped me and started asking about my journey.<br>The little kid in the car was jumping with excitement after hearing that I was travelling across India on a motorcycle.</p><p>They took pictures with me and wished me luck.</p><p>Later I met another local man who was equally curious and excited about my journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Returning to Tawang</h4><p>By around 2 PM, I returned to my stay.<br>I completed my work for the day and began packing my luggage since I planned to leave the next morning.</p><p>That evening was calm.<br>I walked around the town for a while, had dinner, and spent time talking again with the travellers from Jammu & Kashmir and Manali.</p><p>Before sleeping, I checked my phone.<br>More messages had arrived.</p><p>People were asking about me and the bike.<br>Some were worried.<br>Some offered help.</p><p>Reading those messages again made me emotional.<br>Even far away in the mountains, I realised that the journey was not truly solo.<br>Many people were silently travelling with me.</p><p>That night, I slept peacefully.<br>The next morning, the road would call again.</p>', quote: '"Even far away in the mountains, I realised that the journey was not truly solo."' },
            { type: 'chapter', id: 'ch43', title: 'The Road Back Begins', chapter: 'Ch  43', stats: 'Balipara', image: 'images/chapter-43.jpg', desc: '<p>Tawang → Balipara</p><p>Day 43 marked the beginning of my journey back toward Mysuru.</p><p>I woke up early that morning, around 5:30 AM. The air in Tawang was still freezing, but I knew I had a long ride ahead. After taking a bath and getting ready, I checked my luggage.</p><p>Luckily, most of my packing had already been done the previous night.<br>However, there was an additional complication now. I had to carry the damaged suspension and air filter box along with me because the bike was still under warranty and I needed those parts to claim insurance later.</p><p>By the time I came downstairs, it was around 6:45 AM.<br>Breakfast was already prepared.</p><p>The people at the stay had woken up early just to cook food for me before I left. There were four of them, and their kindness had touched me deeply during my stay.<br>They treated me like one of their own.</p><p>Before leaving, we clicked a few pictures together.<br>I also called the Indian Air Force officer who had helped me so much during the previous days. Unfortunately he was busy with work and couldn’t meet me that morning.</p><p>But before hanging up, he said something that made me smile.<br>“Next time when I visit Mysuru, we’ll meet there.”</p><p>I thanked him again for everything.<br>At around 7 AM, I finally started my ride.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding With a Broken Machine</h4><p>The ride out of Tawang was slow and difficult.<br>The weather was extremely cold, and the bike itself was already struggling.</p><p>Since the air filter box had been removed, I had temporarily tied a sock in its place so that air could pass through while keeping dust and moisture out.<br>It was a strange solution, but it was the only option I had.</p><p>The engine sounded rough.<br>The suspension was still unstable.<br>And because of the extra luggage — including the broken suspension parts — the bike was heavier than usual.</p><p>At several places, I had to stop because of black ice on the road.<br>The bike slipped a few times, forcing me to ride extremely carefully.</p><p>Still, slowly and patiently, I continued descending through the mountains.</p><h4 class="font-bold text-xl mt-6 mb-2">The Long Descent</h4><p>At some point along the road, a local person suggested taking a different route which was slightly longer but easier for my condition.<br>I followed the suggestion.</p><p>Even then, the ride remained challenging.<br>In some sections the road was rough, and my bike struggled badly without proper suspension.</p><p>At one point I even asked a truck driver if I could load my bike into his truck for some distance.<br>But in the end I decided to continue riding slowly on my own.</p><p>Around 1 PM, I stopped for lunch.<br>The ride continued after that, but the cold air kept draining my energy and the bike’s power.</p><p>By 3:30 PM, I stopped again for tea.<br>Network was almost nonexistent in many places, and for long stretches I rode completely alone.</p><p>Finally, around 4:30 PM, I reached the Arunachal–Assam border.<br>Crossing the border felt like entering a different world.<br>The road became straighter, the air warmer, and the mountains slowly disappeared behind me.</p><p>But my bike still struggled.</p><h4 class="font-bold text-xl mt-6 mb-2">A Difficult Evening</h4><p>As evening approached, darkness came quickly.<br>At one point my bike suddenly stopped completely.</p><p>For nearly 20 minutes, I tried starting it again and again.<br>Nothing worked.</p><p>The battery had become weak, and the engine refused to respond.<br>The situation was worrying because I was in a forest region, far away from any major town.</p><p>From there, Tezpur was still about 40 kilometres away.<br>So I decided not to push further that night.</p><p>Instead, I found a small place near Balipara where I could stay.<br>I checked into a simple room by the roadside.</p><p>After unloading my luggage, I went for dinner and finally allowed myself to relax.</p><p>The bike had struggled all day.<br>But we had still managed to cover the distance.</p>', quote: '"The bike had struggled all day. But we had still managed to cover the distance."' },
            { type: 'chapter', id: 'ch44', title: 'Luck on the Road', chapter: 'Ch  44', stats: 'Assam Highways', image: 'images/chapter-44.jpg', desc: '<p>Balipara → Rania → Assam Highways</p><p>The next morning was Sunday.<br>After the difficult ride the previous day, I decided not to rush.<br>If something went wrong again, it would be harder to find help early in the morning.</p><p>So I started a little later than usual — around 7:30 AM.</p><p>My plan was simple:<br>Ride to Guwahati, repair the suspension properly, and then decide the next step.<br>Either continue riding home or transport the bike if needed.</p><h4 class="font-bold text-xl mt-6 mb-2">A Warning at Breakfast</h4><p>After riding for some distance, I stopped for breakfast.<br>While eating, I told a few locals about my situation.</p><p>One of them warned me about the shortcut route toward Guwahati.<br>He said:<br>“If your suspension is already damaged, that road will be difficult. It becomes very narrow and rough for around 15 kilometres.”</p><p>I listened carefully.<br>But unfortunately, I didn’t fully realise how rough the road would be.</p><h4 class="font-bold text-xl mt-6 mb-2">The Second Problem</h4><p>While riding through that shortcut section, I hit a rough patch of road.<br>Suddenly I heard a strange sound.<br>Something was scraping against the bike.</p><p>Within moments I realised something terrible.<br>The temporary suspension setup had also been damaged.</p><p>For a moment I just stopped and stood beside the road.<br>I thought to myself:<br>"Not again."</p><p>At that exact moment, another rider stopped beside me.<br>He asked what had happened.<br>I explained the entire story — from Tawang to the temporary repair.</p><p>After hearing everything, he told me something surprising.<br>“There’s a Hero showroom in Rangia, not very far from here. And because of the holiday schedule, they are open today.”</p><p>That moment felt like pure luck.</p><h4 class="font-bold text-xl mt-6 mb-2">A Miracle Repair</h4><p>I rode slowly toward Rangia, which was about 40 kilometres before Guwahati.</p><p>When I reached the showroom, I explained everything to the manager.<br>To my relief, he immediately agreed to help.</p><p>Since my bike was still under warranty, they replaced the suspension without charging anything.<br>The mechanic there was extremely calm and helpful.</p><p>Within about three hours, my bike was fully repaired.<br>New suspension installed.<br>Everything fixed.</p><p>For the first time in days, the bike felt stable again.</p><p>When the work was done, I felt overwhelming relief.<br>I hugged the mechanic and thanked the manager sincerely.<br>My bike was back on the road.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding Again</h4><p>With the suspension fixed, I started riding again.<br>That evening I covered around 150 kilometres.</p><p>The roads were smoother, and the bike finally felt strong again.<br>Along the way I met a few travellers who noticed my bike and started asking about my journey.</p><p>They were excited to hear about the solo ride across India.<br>We had a beautiful conversation before continuing our separate journeys.</p><p>By evening I found a place to stay.<br>After dinner, I rested early.</p><p>The road ahead was still long.<br>But now the bike and I were ready again.</p>', quote: '"For the first time in days, the bike felt stable again."' },
            { type: 'chapter', id: 'ch45', title: 'The Long Ride to Siliguri', chapter: 'Ch  45', stats: 'Siliguri', image: 'images/chapter-45.jpg', desc: '<p>Day 45 was a Monday, which meant I had work as well as a long ride ahead.</p><p>I woke up very early, around 4:45 AM. Everything was already packed from the previous night, so getting ready took very little time.</p><p>The hostel owner was surprisingly emotional that morning. He woke up early just to see me off. Around 5 AM, we stood outside the hostel, clicked a few pictures together, and exchanged numbers.</p><p>He told me how happy he was to see a solo rider travelling across the country.<br>Moments like that always made leaving a place harder.</p><p>By 5 AM, I started riding.<br>That day’s goal was ambitious — I wanted to reach Siliguri, which was nearly 460 kilometres away.</p><p>The road conditions were excellent. Smooth highways stretched ahead, making the ride comfortable despite the long distance.</p><h4 class="font-bold text-xl mt-6 mb-2">Encounters on the Road</h4><p>During the ride, I met an unusual traveller — a solo traveller walking along the highway.<br>He was travelling entirely on foot.</p><p>Seeing someone walking across such long distances made me pause for a moment.<br>If my journey was an adventure, his was an even bigger one.</p><p>I wished him well and continued my ride.</p><h4 class="font-bold text-xl mt-6 mb-2">Crossing into West Bengal</h4><p>By mid-morning I reached the West Bengal border.<br>The weather started getting warmer, and the sun slowly became stronger. After riding through the cold mountain regions for so long, the heat felt intense.</p><p>I stopped at a roadside restaurant to take a short break and cool down.<br>Around 12:30 PM, I stopped again for lunch.</p><p>Eventually I reached Siliguri, but the city traffic was heavy and exhausting. Compared to the peaceful roads of the mountains, city traffic felt chaotic.</p><p>Fortunately, I already knew a hostel where I had stayed before, so I went directly there.<br>The owner recognised me immediately and welcomed me warmly.</p><h4 class="font-bold text-xl mt-6 mb-2">A Familiar Place</h4><p>After checking in, I freshened up and started my work around 2 PM.<br>Later in the afternoon, I stepped out to eat something.</p><p>Siliguri’s momos and street food felt like the perfect comfort meal after a long ride.</p><p>In the evening, I returned to the hostel and spent some time talking with the owner and other travellers.</p><p>Before sleeping, I cleaned and lubricated my bike, preparing it for the next day’s ride.<br>The next destination would be Bihar, where a friend was waiting to meet me.</p>', quote: '"If my journey was an adventure, his was an even bigger one."' },
            { type: 'chapter', id: 'ch46', title: 'A Friend’s Home in Bihar', chapter: 'Ch  46', stats: 'Madhubani', image: 'images/chapter-46.jpg', desc: '<p>Siliguri → Madhubani</p><p>The next morning I woke up around 5 AM.</p><p>Everything was ready, and after saying goodbye to the hostel owner — who offered me a warm cup of black tea before leaving — I started my ride.</p><p>That day’s destination was my friend’s home in Madhubani district, Bihar, around 280 kilometres away.</p><p>The morning ride was calm and pleasant.<br>By around 7 AM, I crossed the West Bengal border.</p><p>Somewhere along the road I stopped for breakfast and had some fresh fruit before continuing the ride.</p><h4 class="font-bold text-xl mt-6 mb-2">A Warm Welcome</h4><p>Around 11:30 AM, I finally reached my friend’s place.<br>The moment he saw me, his face lit up with excitement.</p><p>We had met during previous rides, but the way he welcomed me felt like I was visiting family.</p><p>After taking a bath and relaxing, I started my work for a few hours.<br>Meanwhile, he prepared a special meal for me — biryani and several traditional dishes.</p><p>His hospitality touched me deeply.</p><h4 class="font-bold text-xl mt-6 mb-2">A Day in the Village</h4><p>After finishing my work around 2:30 PM, he took me out to explore the nearby town.</p><p>We visited the local market, had Bihar-style snacks, and even visited his uncle’s shop where he proudly introduced me to everyone.</p><p>In the evening he took me around the village, introducing me to local people and showing me the life he grew up in.</p><p>Later we visited a Durga temple, where we spent some peaceful time.</p><p>Throughout the day I kept thinking about something.<br>This journey had started as a way to see places.<br>But again and again, it reminded me that people were the real destinations.</p><p>Everywhere I went, people welcomed me with kindness.</p><h4 class="font-bold text-xl mt-6 mb-2">A Night of Conversations</h4><p>That night we had dinner with his family members, sharing stories, laughter, and travel experiences.</p><p>He kept insisting that I should stay longer.<br>In fact, he had planned to show me many more places nearby — even Nepal, which was only about 65 kilometres away.</p><p>But I had to continue my journey.</p><p>Around 10:30 PM, after a long day of conversations, I finally went to sleep.</p>', quote: '"This journey had started as a way to see places. But again and again, it reminded me that people were the real destinations."' },
            { type: 'chapter', id: 'ch47', title: 'Leaving With Gratitude', chapter: 'Ch  47', stats: 'Patna', image: 'images/chapter-47.jpg', desc: '<p>Madhubani → Patna</p><p>The next morning something beautiful happened.<br>When I woke up, my friend was already awake.</p><p>It was 5:30 AM, and he was preparing breakfast for me.<br>Watching him cook fresh rotis and food early in the morning just so I could start my journey comfortably touched my heart.</p><p>Moments like these are difficult to explain.<br>Sometimes people you meet during travel show more care than even close friends.</p><p>We sat together and had breakfast before I prepared to leave.</p><p>Saying goodbye was not easy.<br>He genuinely wanted me to stay longer and explore nearby places.</p><p>For a moment, even I felt confused about leaving.<br>But the road was still calling.</p><p>At 6:30 AM, I finally started my ride.</p><h4 class="font-bold text-xl mt-6 mb-2">An Unexpected Stop</h4><p>A few hours into the ride, something unusual happened.<br>A group of young boys had stretched a rope across the national highway, stopping vehicles.</p><p>At first I felt nervous.<br>There was no one else around.</p><p>But when they approached me, they were simply curious.<br>They asked about my ride, clicked pictures with me, and after a few minutes they happily let me continue.</p><h4 class="font-bold text-xl mt-6 mb-2">The Ganga Bridge</h4><p>Eventually I reached Patna.<br>Crossing the massive bridge over the Ganga River was one of the most beautiful moments of the ride.</p><p>The river looked endless and powerful.<br>Standing on that bridge, watching the flowing Ganga, I felt a sense of calm.</p><h4 class="font-bold text-xl mt-6 mb-2">Exploring Patna</h4><p>After reaching the hostel, I started my work around 11 AM.<br>Later in the afternoon I went out to explore the city.</p><p>I visited the Patna Museum and walked through nearby markets and streets.<br>The city had its own charm.</p><p>In the evening I walked through the town again and eventually returned to the hostel.</p><p>That night I had dinner, spoke with the hostel owner for a while, and prepared for the next day’s ride.<br>The next destination would be Varanasi.</p><p>Around 10:30 PM, I went to sleep.<br>Another chapter of the journey had quietly passed.</p>', quote: '"Sometimes people you meet during travel show more care than even close friends."' },
            { type: 'chapter', id: 'ch48', title: 'Returning to Kashi', chapter: 'Ch  48', stats: 'Varanasi', image: 'images/chapter-48.jpg', desc: '<p>Patna → Sarnath → Kashi Vishwanath</p><p>Day 48 began early again.<br>I woke up around 5:30 AM in Patna, packed the final things on my bike, and by 6 AM I had already started riding toward Varanasi.</p><p>The morning air was cool and the roads were calm.<br>After riding for some time, I stopped at a small roadside tea stall. A few truck drivers were sitting there, having their morning tea.</p><p>I joined them.<br>What surprised me most was how warmly they treated me. Within minutes they started asking about my journey, where I had come from, and where I was heading. They were genuinely curious and friendly.</p><p>Before I even realized it, they had already paid for my tea.<br>Moments like this always reminded me how simple kindness can appear on the road.</p><p>I also tried some local Bihari breakfast there before continuing the ride.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding Toward Sarnath</h4><p>After leaving the tea stall, I continued toward Varanasi.</p><p>At one point I realised my bike chain lubrication had completely worn out, so I started searching for a shop to buy chain lube. But on that stretch of road I couldn\'t find any.<br>So I decided to continue and buy it later.</p><p>After another breakfast stop along the highway, I finally reached Varanasi.</p><p>But instead of going directly into the busy city, I felt like visiting a place that had been on my mind for a long time.<br>So I turned toward Sarnath.</p><p>Sarnath is only a short distance from Varanasi, but the atmosphere there felt completely different.</p><h4 class="font-bold text-xl mt-6 mb-2">Peace in Sarnath</h4><p>I found a small stay near the Sarnath temple and checked in.<br>After parking my bike and taking a bath, I started my work for the day. By around 2 PM, my work was finished.</p><p>Then I stepped out to explore.<br>I visited the Sarnath museum, the park, and the Buddhist temples around the area.</p><p>The entire place felt incredibly calm.<br>Compared to the chaos people usually associate with Varanasi, Sarnath felt peaceful and gentle. The streets were quiet, people spoke softly, and there was a sense of stillness everywhere.</p><p>I spent several hours simply walking around and observing the surroundings.<br>By 4:30 PM, I returned to the stay and finished the rest of my work.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering Kashi</h4><p>In the evening, I decided to visit one of the most sacred places in India — Kashi Vishwanath Temple.<br>From my stay, the temple was around 9 kilometres away.</p><p>So I took my bike and started riding toward the old city.<br>But as I moved closer, the situation changed quickly.<br>The roads became extremely crowded.</p><p>After another two kilometres, I realized I simply couldn’t take the bike any further. The streets were overflowing with people.</p><p>So I found a cloth shop near a large hotel where they allowed me to park my bike safely.<br>From there, I continued on foot.<br>Even walking was difficult because the lanes were so crowded.</p><h4 class="font-bold text-xl mt-6 mb-2">Darshan at Kashi Vishwanath</h4><p>Finally, after slowly moving through the narrow streets, I reached Kashi Vishwanath Temple.</p><p>I spent a long time there.<br>Standing in that sacred space felt deeply emotional. After travelling thousands of kilometres across the country, reaching Kashi felt like a moment of spiritual pause in the journey.</p><p>I stayed there until around 8:30 PM, simply absorbing the atmosphere of the temple and the surrounding ghats.</p><h4 class="font-bold text-xl mt-6 mb-2">Returning to Sarnath</h4><p>After leaving the temple, I walked back through the crowded streets to where my bike was parked.<br>Luckily, everything was safe.</p><p>Before leaving, I finally bought chain lube and lubricated the chain there itself since it had been overdue.<br>Then I rode back to Sarnath.</p><p>At the stay, the hotel owner asked me about dinner, but I had already eaten outside.<br>So I packed my luggage for the next day’s ride.</p><p>The room was quiet.<br>And after another long day of riding, walking, and exploring sacred places, I finally went to sleep.</p>', quote: '"After travelling thousands of kilometres... reaching Kashi felt like a moment of spiritual pause in the journey."' },
            { type: 'chapter', id: 'ch49', title: 'Learning to Sit Still', chapter: 'Ch  49', stats: 'Rewa', image: 'images/chapter-49.jpg', desc: '<p>Varanasi → Rewa</p><p>The next morning, I woke up around 5:30 AM.</p><p>There was nothing special planned for that day.<br>No famous destination.<br>No major landmark waiting ahead.<br>Just another day on the road.</p><p>I packed my luggage, strapped everything onto my bike, and by 6 AM I started riding toward Rewa in Madhya Pradesh.</p><p>The morning ride was calm.<br>The roads were quiet, the air slightly cold, and my mind felt unusually relaxed. After weeks of riding through mountains, borders, and unknown terrains, this ride felt simple.</p><p>Around 8:30 AM, I stopped for breakfast at a small roadside place.<br>Nothing fancy.<br>Just simple food and tea.<br>But somehow, it tasted perfect.</p><p>After breakfast I filled fuel for the bike and continued riding toward Rewa.</p><h4 class="font-bold text-xl mt-6 mb-2">Arriving Without Expectations</h4><p>By afternoon, I reached Rewa city.<br>Finding a stay there was slightly difficult. Most of the hotels were either expensive or fully booked.</p><p>Finally, after some searching, I found a small room for ₹299.<br>It wasn’t luxurious.<br>But it was perfect for the night.</p><p>After checking in, I freshened up and started my work for the day.<br>Luckily, the work was light.<br>By 6 PM, everything was finished.</p><h4 class="font-bold text-xl mt-6 mb-2">A Walk Without a Destination</h4><p>In the evening, I stepped outside.<br>This time, I had no plan.<br>No temple to visit.<br>No monument to see.</p><p>So I simply started walking through the streets of Rewa.</p><p>For nearly four kilometres, I walked through the city.<br>I watched shops opening and closing.<br>People chatting with friends.<br>Children playing near the roads.<br>Street vendors preparing food.</p><p>Everything looked so ordinary.<br>But somehow, it felt beautiful.</p><h4 class="font-bold text-xl mt-6 mb-2">A Moment of Realization</h4><p>After travelling thousands of kilometres across the country, I suddenly felt something I had not felt in a long time.<br>Stillness.</p><p>There was no rush.<br>No anxiety about the future.<br>No thoughts about the past.<br>For the first time in many days, my mind was simply present.</p><p>I sat near a small roadside shop and watched people passing by.<br>Everyone was moving somewhere.<br>Everyone was busy with their own lives.</p><p>And there I was — just sitting, observing, breathing.</p><p>At that moment, a simple thought came to my mind:<br>Maybe happiness is not about reaching somewhere.<br>Maybe it is about learning to pause in between journeys.</p><h4 class="font-bold text-xl mt-6 mb-2">A Simple Truth</h4><p>That evening in Rewa taught me something powerful.<br>Life does not always have to be about chasing destinations.<br>Sometimes the most meaningful moments happen when we stop running.</p><p>When we sit quietly.<br>When we watch the world move.<br>When we allow ourselves to simply exist.</p><p>And maybe that is what a simple life truly means.<br>Moving through places.<br>Meeting people.<br>And sometimes just sitting by the roadside, watching everyone pass through their own journeys.</p><p>Life is not always simple.<br>But we can always choose to live it simply.</p>', quote: '"Maybe happiness is not about reaching somewhere. Maybe it is about learning to pause in between journeys."' },
            { type: 'chapter', id: 'ch50', title: 'When the Road Became Meditation', chapter: 'Ch  50', stats: 'Nagpur', image: 'images/chapter-50.jpg', desc: '<p>The next morning, I woke up very early again.<br>It was 5:30 AM.</p><p>After taking a quick bath and packing my things, I started my ride. My plan for the day was simple — reach Nagpur.</p><p>The roads that morning were beautiful. Smooth highways, long straight stretches, and very little traffic. Because the road was so good, I was able to maintain a steady speed.</p><p>By 10 AM, I had already covered nearly 300 kilometers.</p><p>I stopped for breakfast at a small roadside place.<br>While eating, a few elderly men sitting nearby started talking to me. They were curious about the luggage on my bike and where I was coming from. When I told them about my journey across the country, they were surprised. Our conversation went on for a while — simple talks about travel, life, and the road.</p><p>After breakfast, I continued riding.</p><h4 class="font-bold text-xl mt-6 mb-2">When Strangers Become Part of the Journey</h4><p>Somewhere in Madhya Pradesh, I stopped for a short break. While I was standing there, one person who had noticed my bike earlier came looking for me. He had followed me for nearly 15 minutes, just to ask about my ride and take a picture.</p><p>We spoke for some time.</p><p>He told me he was an engineer working with the National Highway Authority, and he was fascinated by the journey.</p><p>Moments like these reminded me how a journey doesn’t just connect cities — it connects people.</p><h4 class="font-bold text-xl mt-6 mb-2">A Day of Long Roads</h4><p>By around 4 PM, I had already reached Nagpur.</p><p>That meant I had covered more than 550 kilometers that day.</p><p>Originally, my plan was to stop there for the night.</p><p>But after taking a short tea break and talking to a few people at the tea stall, I started thinking again.</p><p>I still had time.</p><p>And the road ahead was still calling.</p><p>So I checked the routes.</p><p>One road would take me through Hyderabad, but I had already travelled that road earlier and remembered the road conditions weren’t that great.</p><p>Another route was slightly longer — almost 60 kilometers extra — but the road conditions were much better.</p><p>Without thinking too much, I decided to keep riding.</p><p>Sometimes on a long journey, you stop planning so much.</p><p>You simply follow the road.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding Without Thinking</h4><p>As the evening slowly approached, I kept riding.</p><p>There was something very peaceful about that ride.</p><p>After spending nearly 14 hours on the road, I had covered almost 700 kilometers that day.</p><p>But it didn’t feel exhausting.</p><p>Instead, it felt like a long meditation.</p><p>When you ride for so many hours with a helmet on, listening to the sound of the engine and the wind, your mind slowly becomes quiet.</p><p>Thoughts settle.</p><p>The past disappears.</p><p>The future stops worrying you.</p><p>Only the road exists.</p><h4 class="font-bold text-xl mt-6 mb-2">The Meaning of the Journey</h4><p>Somewhere along that long ride, I realized something important.</p><p>This journey was never only about the destinations.</p><p>It was about everything in between.</p><p>Every road that showed me new possibilities.</p><p>Every stranger who stopped to ask about the ride.</p><p>Every moment when I simply sat somewhere and watched life move around me.</p><p>And somewhere along those thousands of kilometers, I had changed too.</p><p>Maybe the journey wasn’t about where I was going.</p><p>Maybe it was about who I was becoming along the way.</p>', quote: '"Maybe the journey wasn’t about where I was going. Maybe it was about who I was becoming along the way."' },
            { type: 'chapter', id: 'ch51', title: 'The Road Back Home', chapter: 'Ch  51', stats: 'Vijayapura', image: 'images/chapter-51.jpg', desc: '<p>The next morning there was no big plan.<br>No long destination waiting.<br>No mountains to climb.<br>Just the road slowly bringing me closer to home.</p><p>I started the ride early in the morning.<br>Before leaving, I remembered something important — I had forgotten to return the locker key where I had done the engine oil change for my bike earlier. Small things like that matter on long journeys, so I went back and returned it.</p><p>Since it was Sunday, finding the engine oil that I usually use for my bike was difficult. I searched for almost an hour before finally managing to get it changed.</p><p>After that, I started riding again.</p><h4 class="font-bold text-xl mt-6 mb-2">A Small Moment of Innocence</h4><p>Somewhere along the highway, I stopped at a small tea stall.<br>There, I met a tiny puppy.</p><p>He looked at me with those innocent eyes, curious and fearless at the same time. For a few minutes, I forgot about the journey, the kilometers, and the destination.</p><p>It was just me and that little soul.<br>Sometimes the road gives you moments like that — simple, pure, and unexpected.</p><h4 class="font-bold text-xl mt-6 mb-2">Crossing Into Karnataka</h4><p>As I kept riding, the distance to home kept reducing.<br>Eventually, I crossed back into Karnataka.</p><p>At that moment, something inside me felt different.<br>After more than 50 days on the road, thousands of kilometers, countless strangers, breakdowns, sunrises, and silent highways — I was finally riding back into the state where my journey had begun.</p><p>It felt strange.<br>The road was familiar again.<br>But I was not the same person who had left.</p><h4 class="font-bold text-xl mt-6 mb-2">A Journey That Changed Me</h4><p>Somewhere along the highway, I stopped and looked at the road stretching ahead.<br>It reminded me of something.</p><p>Some roads don’t just show directions.<br>They show possibilities.</p><p>One signboard points to Nagpur, another to Hyderabad, another all the way to Kanyakumari.<br>But in between those places exists something much more meaningful.<br>The journey itself.</p><p>And somewhere along those miles, my thoughts had settled.<br>Slowly, quietly, without even realizing it, I had started changing.</p><p>Maybe the ride was never just about reaching places.<br>Maybe it was about who I was becoming along the way.</p><h4 class="font-bold text-xl mt-6 mb-2">Returning to a Place That Felt Different</h4><p>By evening, I reached Vijayapura.<br>I had visited this place before with a friend, so I expected it to feel familiar.</p><p>But this time it felt different.<br>Not because the city had changed.<br>But because I had changed.</p><p>Some places remain beautiful, yet they feel strangely empty when we return.<br>Not because the place lost its charm — but because the moments we once lived there have already turned into memories.</p><p>Sometimes life reminds us that certain chapters belong to the past.<br>Even if our heart wishes to relive them again.</p><h4 class="font-bold text-xl mt-6 mb-2">A Quiet Dinner</h4><p>That night, I sat alone at a small roadside restaurant.<br>A simple plate of food in front of me.<br>My phone playing soft music.<br>Vehicles passing slowly on the road.</p><p>Nothing extraordinary.<br>But after weeks of constant movement, that quiet dinner felt peaceful.</p><p>And one thought stayed in my mind:<br>Not everything fades.<br>Some memories stay with us forever.</p><h4 class="font-bold text-xl mt-6 mb-2">The Final Stretch</h4><p>The next morning, I started the final ride toward Mysuru.<br>The road felt familiar.<br>The air felt different.<br>And somewhere deep inside, I knew something important had changed.</p><p>The journey had ended.<br>But the person who returned home was not the same person who had left.</p>', quote: '"Some roads don’t just show directions. They show possibilities."' },
            { type: 'chapter', id: 'ch52', title: 'Coming Home', chapter: 'Ch  52', stats: 'Mysuru', image: 'images/chapter-52.jpg', desc: '<p>The next morning was Republic Day.<br>It was also the final day of my journey.</p><p>After more than 50 days on the road, thousands of kilometers, countless sunrises, breakdowns, strangers who became friends, and roads that slowly became home — this ride was finally coming back to where it had started.</p><p>I woke up early and started around 6:30 AM.</p><p>Before leaving, I filled fuel for my bike and looked at the road ahead.<br>This time the feeling was different.</p><p>There was no rush.<br>No pressure.<br>Just a quiet realization that the journey was reaching its final page.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding With a Different Mind</h4><p>As I started riding, something felt unusual.<br>The road looked the same.<br>The wind felt the same.<br>But I was not the same person anymore.</p><p>Instead of feeling tired after so many days on the road, I felt something else — lightness.</p><p>Every kilometer felt beautiful.<br>There was no feeling of over-riding, no pressure to rush.<br>I was simply enjoying the road.</p><h4 class="font-bold text-xl mt-6 mb-2">Small Stops Along the Way</h4><p>After riding for some time, I stopped at a Durga temple along the highway.<br>The place had a small restaurant nearby. I wasn’t very hungry, so I just had fresh fruit juice and sat there for some time.</p><p>Sometimes, the best part of a journey is not moving.<br>It is sitting somewhere quietly and watching the road.</p><p>After resting for a while, I started riding again.<br>Later in the afternoon, I stopped for lunch, had a simple meal, and continued the ride toward Mysuru.</p><p>And slowly, the distance kept reducing.</p><h4 class="font-bold text-xl mt-6 mb-2">The Moment I Reached Home</h4><p>By evening, around 6:30 PM, I finally entered Mysuru.<br>After 50 days on the road, I had come back home.</p><p>That moment is something
