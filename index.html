very difficult to describe.<br>There was excitement.<br>There was relief.<br>There was gratitude.<br>But above all, there was a deep feeling of peace.</p><h4 class="font-bold text-xl mt-6 mb-2">A Welcome I Never Expected</h4><p>When I reached, something beautiful happened.<br>My friends and family were waiting for me.<br>There were smiles, laughter, fireworks, and even a cake.</p><p>I never expected such a warm welcome.<br>After traveling alone for so many days, coming back to this love felt overwhelming.</p><p>At that moment I realized something very important.<br>The journey may have taken me across mountains, borders, forests, and highways…<br>But the real destination was always home.</p><h4 class="font-bold text-xl mt-6 mb-2">What This Journey Taught Me</h4><p>This journey gave me more than memories.<br>It gave me clarity.</p><p>Somewhere along these thousands of kilometers, I learned things that no classroom or book could teach.</p><p>I learned that fear is mostly in our mind.<br>Before starting, many people asked me if it was dangerous, difficult, or impossible.<br>But once I started riding, I realized something simple:<br>Most fears disappear when we take the first step.</p><h4 class="font-bold text-xl mt-6 mb-2">Strength I Never Knew I Had</h4><p>There were days when the roads were broken.<br>There were nights when the cold was unbearable.<br>There were moments when my bike broke down in remote places.<br>There were times when I had no idea what would happen next.</p><p>But every single time, somehow, things worked out.<br>Strangers helped.<br>The road guided me.<br>And slowly I discovered a strength inside me that I didn’t know existed.</p><h4 class="font-bold text-xl mt-6 mb-2">A Different Version of Myself</h4><p>When I started this journey, I thought I was traveling across India.<br>But now I understand something deeper.<br>I was actually traveling inside myself.</p><p>The person who left Mysuru on Day 1 and the person who returned on Day 52 were not the same.<br>The road had changed me.</p><p>It made me calmer.<br>It made me stronger.<br>And somewhere along the way, it made life feel simpler.</p><h4 class="font-bold text-xl mt-6 mb-2">The Journey Never Really Ends</h4><p>Even though the ride ended in Mysuru, the journey itself does not end.<br>Because the roads, the people, the stories, and the lessons will stay with me forever.</p><p>And somewhere deep inside, I know one thing for sure.<br>One day…<br>I will pack my bags again,<br>start my bike,<br>and follow the road into another unknown journey.</p><p>Because once the road becomes part of your soul,<br>it never really lets you stop. 🏍️✨</p>', quote: '"Because once the road becomes part of your soul, it never really lets you stop."' },
            { type: 'chapter', id: 'epilogue', title: 'The Road Never Really Ends', chapter: 'Epilogue', stats: 'Final Thoughts', image: 'images/epilogue.jpg', desc: '<p>After thousands of kilometers, broken roads, freezing nights, silent mornings, and countless strangers who became part of the journey…<br>I finally came back home.</p><p>But something inside me had changed.</p><p>When I started this ride, I thought I was traveling across India.<br>But somewhere along the road, I realized something important.<br>I was actually traveling inside myself.</p><p>Every long highway taught patience.<br>Every breakdown taught resilience.<br>Every stranger who helped me reminded me that kindness still exists everywhere.<br>And every sunrise on the road reminded me how small our worries really are.</p><p>This journey showed me that fear usually lives only in our mind.<br>Once we take the first step, the road begins to guide us.</p><p>Somewhere between mountains, forests, tea stalls, temples, army camps, and empty highways…<br>I found something I wasn’t even looking for.<br>Clarity.</p><p>Clarity about life.<br>Clarity about fear.<br>Clarity about what truly matters.</p><p>When I returned to Mysuru, people asked me,<br>“Was the journey difficult?”</p><p>The truth is — yes.<br>But it was also the most beautiful experience of my life.</p><p>Because in the end, this journey was never about the distance.<br>It was about the stories, the people, and the version of myself that I discovered along the way.</p><p>And even though the ride ended…<br>I know something for sure.</p><p>One day, I will start my bike again.<br>And follow another unknown road.</p><p>Because once the road becomes part of your soul,<br>the journey never truly ends.<br>🏍️✨</p>', quote: '"Because in the end, this journey was never about the distance."' },
            { type: 'appendix-chart', title: 'Appendix I: The Emotional Landscape' },
            { type: 'appendix-lessons', title: 'Appendix II: Wisdom from the Asphalt' }
        ];

        const lessonsData = [
            { category: 'Endurance', title: 'The Shift to Partnership', text: '<p>During the early days, the motorcycle was just a machine. But somewhere across Madhya Pradesh, and definitely by the time we hit the grueling 600km stretches in the Northeast, the ride became a partnership.</p><p>On Christmas Eve in Meghalaya, changing the engine oil at midnight in the freezing cold with grease-stained hands didn\'t feel like a chore. Washing the dust off the bike in the dead of night was an act of profound gratitude toward a companion that never once gave up.</p>' },
            { category: 'Connection', title: 'The Grandmother in the Fog', text: '<p>Leaving Siliguri at 5:45 AM, the road disappeared into dense, suffocating fog. Pulling over at a tiny, half-covered tea stall felt like finding a sanctuary.</p><p>The elderly woman running it took one look, understood, and handed over hot coffee and biscuits. When it was time to pay, she refused entirely, placing chocolates in hand and saying, <em>"You are like my son. Don\'t pay."</em> Kindness travels faster than distance.</p>' },
            { category: 'Stillness', title: 'The Pause in Hubli', text: '<p>Movement can often act as a distraction from the mind. When the physical journey stopped for two days in Hubli, internal thoughts accelerated.</p><p>But those two days of stillness were necessary. Realizing the fear was of commitment, not distance, led to a simple, ego-free promise: <em>If I feel uncomfortable, I will return. If I feel steady, I will continue.</em> That was the true beginning of the journey.</p>' },
            { category: 'Endurance', title: 'Panic vs. Pause', text: '<p>Returning from Dawki in Meghalaya, the evening darkness dropped rapidly. Suddenly, the motorcycle\'s headlight died entirely on a narrow, dusty hill road where fog could roll in at any second.</p><p>Yet, the instinct wasn\'t to panic. Instead of anxiety, there was a calm adaptation—tailing cars to use their beams and riding slowly. Obstacles stopped feeling like interruptions and became the experience itself. <em>Sometimes, you just need a pause. But you never stop.</em></p>' },
            { category: 'Connection', title: 'Strangers as Guides', text: '<p>In a Silchar dormitory, a casual conversation about the next day\'s route altered the entire trajectory of the trip. A fellow traveler warned of 14-hour travel times and isolated stretches on the road to Imphal.</p><p>Listening to local voices over a digital map prevented a potentially disastrous situation. Destiny quietly places the right people in your path; you just have to be willing to listen.</p>' },
            { category: 'Stillness', title: 'The Freezing Valley', text: '<p>The Dzukou Valley trek was a test of both physical endurance and mental stillness. Arriving at the base camp alone, the temperature plummeted to -4°C. Rats managed to eat every single snack packed for the trip.</p><p>Sleep was impossible due to the brutal cold, yet there was no regret. Walking through the silent, ancient forest brought an overwhelming feeling of mental lightness. Some nights aren\'t meant for comfort; they are meant to be lived fully so they can become stories.</p>' }
        ];

        let currentPage = 0;
        let chartInstance = null;
        let isTurning = false;
        let isMusicPlaying = false;

        function toggleMusic() {
            const audio = document.getElementById('bg-music');
            const icon = document.getElementById('music-icon');
            if (isMusicPlaying) {
                audio.pause();
                icon.textContent = 'PLAY';
            } else {
                audio.play();
                icon.textContent = 'PAUSE';
            }
            isMusicPlaying = !isMusicPlaying;
        }

        function renderPage(direction = 'right') {
            if (isTurning) return;
            isTurning = true;

            const contentArea = document.getElementById('page-content');
            
            if (contentArea.innerHTML.trim() !== "") {
                contentArea.classList.add(direction === 'right' ? 'turn-out-next' : 'turn-out-prev');
            } else {
                updateHTML();
                return;
            }

            setTimeout(() => {
                updateHTML();
            }, 300);

            function updateHTML() {
                const pageData = bookData[currentPage];

                if (pageData.type === 'cover') {
                    document.getElementById('bookmark').classList.add('hidden');
                    document.getElementById('page-number-display').classList.add('hidden');
                    contentArea.innerHTML = `
                        <div class="h-full w-full flex flex-col items-center justify-center bg-book-ink text-book-paper p-8 sm:p-12 text-center min-h-[85vh]">
                            <div class="text-5xl mb-8">🏍️</div>
                            <h1 class="text-4xl sm:text-6xl font-serif font-bold mb-6 tracking-tight leading-tight">${pageData.title}</h1>
                            <p class="text-xl sm:text-2xl font-light text-gray-400 mb-12 tracking-widest uppercase">${pageData.subtitle}</p>
                            <div class="w-16 h-1 bg-book-accent mb-12"></div>
                            <p class="text-lg font-serif italic text-gray-300 mb-16">${pageData.author}</p>
                            <p class="mt-8 text-sm uppercase tracking-widest text-book-accent animate-pulse font-sans">Click the right edge or press Right Arrow to open</p>
                        </div>
                    `;
                } else if (pageData.type === 'chapter') {
                    document.getElementById('bookmark').classList.remove('hidden');
                    document.getElementById('page-number-display').classList.remove('hidden');
                    
                    let pageLabel = pageData.chapter.includes('Ch ') ? ` — Page ${currentPage - 2}` : '';
                    document.getElementById('page-number-display').textContent = `${pageData.chapter}${pageLabel}`;
                    
                    contentArea.innerHTML = `
                        <div class="w-full h-64 sm:h-80 relative flex-shrink-0 bg-gray-200">
                            <img src="${pageData.image}" class="w-full h-full object-cover" alt="Thematic image">
                            <div class="absolute inset-0 bg-gradient-to-t from-book-paper to-transparent"></div>
                        </div>
                        <div class="px-8 sm:px-16 py-8 flex-grow">
                            <h2 class="text-4xl sm:text-5xl font-bold font-serif mb-2 leading-tight">${pageData.title}</h2>
                            <div class="text-sm font-sans font-bold text-book-accent tracking-widest uppercase mb-10 border-b border-gray-300 pb-4 inline-block">${pageData.stats}</div>
                            
                            <div class="chapter-content text-lg sm:text-xl text-gray-800 leading-relaxed max-w-3xl mb-12">
                                ${pageData.desc}
                            </div>
                            
                            <div class="border-t border-b border-gray-300 py-8 my-12 text-center max-w-2xl mx-auto">
                                <p class="text-2xl font-serif italic text-gray-600">
                                    ${pageData.quote}
                                </p>
                            </div>
                        </div>
                    `;
                } else if (pageData.type === 'appendix-chart') {
                    document.getElementById('bookmark').classList.remove('hidden');
                    document.getElementById('page-number-display').classList.remove('hidden');
                    document.getElementById('page-number-display').textContent = `Appendix I`;

                    contentArea.innerHTML = `
                        <div class="px-8 sm:px-16 py-12 flex-grow min-h-[85vh]">
                            <h2 class="text-4xl font-bold font-serif mb-6">${pageData.title}</h2>
                            <p class="text-lg font-serif mb-10 text-gray-700">A visual representation of the internal shift from paralyzing doubt in Chapter 1 to deep, enduring peace by Chapter 52.</p>
                            <div class="chart-container">
                                <canvas id="emotionChart"></canvas>
                            </div>
                        </div>
                    `;
                    setTimeout(initChart, 400);
                } else if (pageData.type === 'appendix-lessons') {
                    document.getElementById('bookmark').classList.remove('hidden');
                    document.getElementById('page-number-display').classList.remove('hidden');
                    document.getElementById('page-number-display').textContent = `Appendix II`;

                    let gridHTML = lessonsData.map(lesson => `
                        <div class="mb-8 pb-8 border-b border-gray-200 break-inside-avoid">
                            <div class="text-xs font-sans font-bold text-book-accent uppercase tracking-widest mb-1">${lesson.category}</div>
                            <h4 class="text-2xl font-serif font-bold mb-3">${lesson.title}</h4>
                            <div class="text-gray-700 text-lg leading-relaxed font-serif chapter-content">${lesson.text}</div>
                        </div>
                    `).join('');

                    contentArea.innerHTML = `
                        <div class="px-8 sm:px-16 py-12 flex-grow min-h-[85vh]">
                            <h2 class="text-4xl font-bold font-serif mb-6">${pageData.title}</h2>
                            <p class="text-lg font-serif mb-12 text-gray-700">Core lessons distilled from the road, categorized by theme.</p>
                            <div class="columns-1 md:columns-2 gap-12">
                                ${gridHTML}
                            </div>
                            
                            <div class="mt-16 text-center pb-12">
                                <div class="text-4xl mb-4 text-gray-400">❧</div>
                                <p class="font-serif italic text-gray-500 text-xl">The End.</p>
                            </div>
                        </div>
                    `;
                }
                
                document.getElementById('prev-zone').style.display = currentPage > 0 ? 'block' : 'none';
                document.getElementById('next-zone').style.display = currentPage < bookData.length - 1 ? 'block' : 'none';

                contentArea.scrollTop = 0;

                contentArea.classList.remove('turn-out-next', 'turn-out-prev');
                contentArea.classList.add(direction === 'right' ? 'turn-in-next' : 'turn-in-prev');

                setTimeout(() => {
                    contentArea.classList.remove('turn-in-next', 'turn-in-prev');
                    isTurning = false;
                }, 400);
            }
        }

        function nextPage() {
            if (currentPage < bookData.length - 1 && !isTurning) {
                currentPage++;
                renderPage('right');
            }
        }

        function prevPage() {
            if (currentPage > 0 && !isTurning) {
                currentPage--;
                renderPage('left');
            }
        }

        function jumpToPage(index) {
            if (isTurning || index === currentPage) return;
            const direction = index > currentPage ? 'right' : 'left';
            currentPage = index;
            renderPage(direction);
            closeTOC();
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                nextPage();
            } else if (e.key === 'ArrowLeft') {
                prevPage();
            }
        });

        function openTOC() {
            const tocList = document.getElementById('toc-list');
            tocList.innerHTML = bookData.map((page, idx) => {
                if (page.type === 'cover') return '';
                const title = page.type === 'chapter' ? `<span class="font-bold w-24 inline-block text-gray-500">${page.chapter}</span> ${page.title}` : page.title;
                return `
                    <button onclick="jumpToPage(${idx})" class="w-full text-left py-3 px-4 hover:bg-gray-100 border-b border-gray-100 transition-colors flex justify-between items-center text-lg">
                        <span>${title}</span>
                    </button>
                `;
            }).join('');
            document.getElementById('toc-modal').classList.remove('hidden');
        }

        function closeTOC() {
            document.getElementById('toc-modal').classList.add('hidden');
        }

        function initChart() {
            const canvas = document.getElementById('emotionChart');
            if(!canvas) return;
            const ctx = canvas.getContext('2d');
            
            if(chartInstance) chartInstance.destroy();

            const chapters = bookData.filter(d => d.chapter && d.chapter.includes('Ch '));
            const labels = chapters.map(d => d.chapter.replace('Ch  ', 'Ch '));
            
            const dataPoints = [
                1.0, 2.0, 2.5, 3.0, 3.5, 4.0, 3.8, 4.2, 4.5, 5.0, 
                3.5, 4.2, 4.5, 5.0, 4.5, 4.0, 3.8, 4.5, 4.0, 4.0, 
                3.5, 4.8, 3.8, 4.5, 3.5, 4.0, 3.0, 4.5, 5.0, 4.5, 
                4.0, 2.5, 4.0, 4.8, 4.5, 4.0, 4.5, 4.5, 2.0, 3.5, 
                4.5, 4.0, 3.0, 4.0, 3.5, 4.5, 4.0, 4.8, 5.0, 5.0, 
                4.8, 5.0
            ];
            const descriptions = chapters.map(d => d.title);

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Internal State (1: Doubt/Fear -> 5: Peace/Freedom)',
                        data: dataPoints,
                        borderColor: '#9C4221',
                        backgroundColor: 'rgba(156, 66, 33, 0.1)',
                        borderWidth: 2,
                        pointBackgroundColor: '#1A202C',
                        pointBorderColor: '#FAF9F6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.3 
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(26, 32, 44, 0.95)',
                            titleFont: { family: 'Georgia', size: 14 },
                            bodyFont: { family: 'Inter', size: 13 },
                            padding: 12,
                            displayColors: false,
                            callbacks: {
                                label: function(context) { return descriptions[context.dataIndex]; }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: 0, max: 6,
                            ticks: {
                                stepSize: 1,
                                callback: function(value) {
                                    if(value === 1) return 'Doubt';
                                    if(value === 3) return 'Endurance';
                                    if(value === 5) return 'Peace';
                                    return '';
                                },
                                color: '#718096',
                                font: { family: 'Georgia', size: 12 }
                            },
                            grid: { color: 'rgba(0,0,0,0.05)' }
                        },
                        x: {
                            ticks: { 
                                color: '#A0AEC0', 
                                maxRotation: 45, minRotation: 45,
                                autoSkip: true, maxTicksLimit: 20,
                                font: { family: 'Inter', size: 10 }
                            },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderPage();
        });

    </script>
</body>
</html>
