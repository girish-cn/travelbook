 the city.</p><h4 class="font-bold text-xl mt-6 mb-2">The Sunset Over Aizawl</h4><p>We went to a viewpoint restaurant called Aizawl Restaurant.<br>From there, the view of the city was breathtaking.<br>Houses spread across hills like lights on a giant staircase. The sun slowly disappeared behind distant mountains.</p><p>It was honestly one of the most beautiful sunsets I had seen in my life.<br>For a moment, the exhaustion of the day disappeared.</p><p>We spent some time there, took photos, talked about travel and life.</p><p>Later we returned to the city, walked around a bit, and came back to the stay around 9:30 PM.</p><p>Since my clothes were covered in dust from the mountain trails, I washed them and hung them outside to dry.</p><p>Before sleeping, I had a long conversation with my roommate.</p><p>That day had started with a peaceful sunrise…<br>And ended with one of the most adventurous rides of my journey.</p><p>As I lay down that night, I realised something important:<br>Adventure isn’t always comfortable.<br>Sometimes it is uncertainty.<br>Sometimes it is fear.</p><p>But if you keep moving forward, the road eventually rewards you.<br>And that day, it definitely did.</p>', quote: '"Adventure isn’t always comfortable. Sometimes it is uncertainty. Sometimes it is fear."' },
            { type: 'chapter', id: 'ch24', title: 'A Quiet Day in Aizawl', chapter: 'Ch  24', stats: 'Aizawl', image: 'images/chapter-24.jpg', desc: '<p>After the intense ride through the mountains the previous day, Day 24 felt calm from the moment I woke up.</p><p>I woke up early, as usual.<br>The room was quiet, and the view from my stay was beautiful. When I stepped outside, the hills of Aizawl were still wrapped in early morning light. I stood there for a few minutes watching the sunrise slowly appear between the layers of houses and hills.</p><p>There was no hurry that morning.<br>For the first time in many days, I had no plan.</p><p>After taking a bath, I decided to walk toward Bara Bazaar, one of the most famous local markets in Aizawl. The market was just a short distance from my stay.</p><p>What surprised me immediately was how early the city wakes up.<br>By 5:30 or 6 AM, people were already active. Shops were opening, vendors were setting up their goods, and the streets were slowly coming alive.</p><p>I walked through the market lanes quietly observing everything. The food stalls on the roadside smelled amazing, so I stopped for breakfast there.<br>The food was simple and incredibly cheap.</p><p>While exploring the market, I noticed many stalls selling second-hand clothes. It’s a very common thing in the Northeast, and the variety was surprising. I picked up a couple of small things.</p><p>The atmosphere of the market was lively but calm. People were friendly, polite, and curious.</p><p>By around 7:30 or 8 AM, I had spent enough time exploring the market and slowly walked back toward my stay.</p><h4 class="font-bold text-xl mt-6 mb-2">The City Without Chaos</h4><p>Later in the morning, I rode my bike to a nearby viewpoint.</p><p>The sky was cloudy that day, but the view was still breathtaking. Hills stretched endlessly in every direction, and houses seemed to grow out of the slopes.</p><p>I parked my bike and walked to the viewpoint.</p><p>Sitting there, listening to a song on my phone and looking at the hills, I spent nearly half an hour doing nothing.</p><p>Sometimes travel is not about moving.<br>Sometimes it is about sitting still and absorbing where you are.</p><p>After that, I continued exploring the city.<br>I visited the Solomon Temple, one of the well-known churches in Aizawl. The architecture was impressive, standing tall against the hills.</p><p>I also visited a small museum and wandered through different parts of the city.</p><p>One thing I noticed immediately about Aizawl was the discipline on the roads.<br>There was almost no traffic chaos.<br>But what impressed me the most was this:<br>Even when the roads were empty, people still followed traffic rules.</p><p>No unnecessary honking.<br>No reckless driving.</p><p>It showed the mindset of the people.</p><h4 class="font-bold text-xl mt-6 mb-2">Meeting a Stranger from Nepal</h4><p>After roaming around the city for most of the morning, I eventually returned to my stay.<br>Later, I went out again to another viewpoint.</p><p>While I was standing there enjoying the view, a man approached me and started a conversation.<br>He was from Nepal.</p><p>Within a few minutes, we began talking about travel, life, and work. Surprisingly, he told me he was living in Bangalore.</p><p>Just like that, we became friends.<br>Travel has a strange magic — strangers become friends in minutes.</p><p>We exchanged numbers and promised to meet again someday in Bangalore.</p><h4 class="font-bold text-xl mt-6 mb-2">Work, Sunset, and City Walk</h4><p>Around 1:30 PM, I returned to my stay and started my work.<br>That balance between travel and work had become part of my routine now. I continued working until around 4:30 PM.</p><p>In the evening, I had a simple plan.<br>I wanted to see the sunset again from the same viewpoint restaurant I had visited the previous day.<br>The sunset there had been unforgettable.</p><p>So I took a drink and rode toward Aizawl Restaurant, which offers one of the best views of the city.</p><p>The sunset that evening was just as beautiful.<br>The sun slowly dipped behind the mountains while the lights of the city began to glow across the hills.</p><p>I sat there quietly for some time before returning around 6:30 PM.</p><p>Back at the stay, I completed a bit more work.<br>A new traveller had checked in by then, and we started chatting. Soon we decided to go out for dinner together.</p><p>We walked toward Bara Bazaar street again.<br>The streets were calm that evening. We had simple food — samosas and some local snacks.</p><p>Nothing fancy.<br>But the conversation and the night atmosphere made it memorable.</p><p>After returning to the stay, we started planning for the next day.<br>The plan was exciting.<br>We would visit Reiek Village and a sunrise point early in the morning.</p><p>With that plan in mind, we finally went to sleep.</p><p>Day 24 had been a simple day.<br>No long ride.<br>No adventure.<br>Just a quiet city, beautiful views, and meaningful conversations.</p><p>And sometimes, those are the days that help you understand a place the most.</p>', quote: '"Sometimes travel is not about moving. Sometimes it is about sitting still and absorbing where you are."' },
            { type: 'chapter', id: 'ch25', title: 'Sunrise at Reiek and the Day of Small Tests', chapter: 'Ch  25', stats: 'Reiek Peak', image: 'images/chapter-25.jpg', desc: '<p>Aizawl – Reiek Peak – Aizawl</p><p>The day began unusually early.<br>I woke up at 2:30 AM.</p><p>The plan was to reach Reiek Village and Reiek Peak before sunrise. The person I had met the previous day — a traveller from Prayagraj, Uttar Pradesh — had agreed to join me.</p><p>By 3 AM, we walked down to the parking area.</p><p>I unlocked my bike, checked the luggage and ignition like I always do before starting a ride. Everything looked fine.</p><p>But just as I turned the key, I realised something unexpected.<br>I had forgotten to refuel the bike.</p><p>Because I had stayed in Aizawl for two days and hadn’t ridden much, I completely missed it. The ride to Reiek was about 35–40 kilometres, and the roads were steep and winding.</p><p>Still, I decided to try.<br>I told myself we might find a petrol pump somewhere on the way. If not, we would deal with it later.</p><p>So we started the ride.</p><h4 class="font-bold text-xl mt-6 mb-2">The Map That Misled Us</h4><p>I mounted my phone on the bike and started navigation.<br>But after about 4–5 kilometres, something strange happened.</p><p>Google Maps took us into an extremely narrow road — a steep downhill path filled with loose stones. Riding there was already difficult, but after another few kilometres it became clear that this was not even a proper road.</p><p>It was just a trail through bushes.<br>No houses.<br>No lights.<br>No network.</p><p>We stopped.<br>The other traveller looked at me and said, “Maybe we should go back.”</p><p>He was right.</p><p>So we slowly turned the bike around and rode back to the main road.<br>A little later we asked a local person for directions. It was around 3:30 AM, and he pointed us toward the correct road.</p><p>That moment reminded me of something important:<br>In the Northeast, sometimes trusting people is better than trusting maps.</p><h4 class="font-bold text-xl mt-6 mb-2">The Climb to Reiek</h4><p>The road to Reiek was steep and narrow.<br>Because we were riding double and the road had many sharp climbs, I had to ride slowly. The bike engine became quite hot during the climb.</p><p>By around 4:45 AM, we finally reached the parking area near the base point.<br>From there, the peak was still 6 kilometres away.</p><p>Most people take a car up to the trekking point and then walk the last part.<br>But finding a vehicle at that hour wasn’t easy.</p><p>Luckily, one driver agreed to take us along with a few other travellers.<br>He dropped us near the trekking point.<br>From there we started walking.</p><h4 class="font-bold text-xl mt-6 mb-2">The Sunrise</h4><p>We had some biscuits I had carried with me and continued the trek.</p><p>By around 5:20–5:30 AM, we reached the peak.<br>The air was cold and fresh.<br>The view from the top was breathtaking — layers of hills stretching endlessly across Mizoram.</p><p>At 5:45 AM, the sun slowly rose above the mountains.<br>The sky turned golden.<br>The clouds beneath the hills started glowing.</p><p>It was one of those moments when everyone becomes silent.<br>No words.<br>Just the sound of wind and the quiet awe of nature.</p><p>We spent nearly an hour at the peak, taking photographs and exploring nearby viewpoints.<br>Standing there, looking across the mountains, I felt grateful that we had taken the effort to wake up so early.</p><p>Some moments can only be experienced if you chase them.</p><h4 class="font-bold text-xl mt-6 mb-2">Fuel Trouble and a Waterfall Stop</h4><p>Getting a vehicle back down from the peak was not easy either, because most of the cars had already left.<br>Finally we paid a little extra and convinced one driver to drop us back.</p><p>At the base, we had tea and aloo paratha for breakfast.<br>Then reality returned.<br>My bike still had very little fuel.</p><p>When I asked locals about petrol pumps, they told me there were none nearby.<br>Fortunately, someone helped us arrange petrol in a plastic bottle from another place.</p><p>We bought around ₹200 worth of petrol, poured it into the tank, and finally felt relieved.<br>After that we visited a nearby waterfall, spending some time enjoying the peaceful morning.</p><h4 class="font-bold text-xl mt-6 mb-2">A Mechanical Problem</h4><p>But another issue appeared.<br>Because of the steep climbs and engine heat, oil had started leaking slightly from the engine area.<br>I suspected the oil seal or gasket might be damaged.</p><p>Once back in Aizawl, I immediately went looking for a service centre.<br>But it was still holiday season, and most workshops were closed.</p><p>One mechanic told me that service appointments needed to be booked two or three days in advance.<br>That wasn’t possible for me.</p><p>So I called a friend who knew about bikes and sent him pictures.<br>After checking them, he reassured me.</p><p>“You can ride another 200–300 kilometres safely,” he said.<br>“Just top up the engine oil and replace the seal when you find a mechanic.”</p><p>That advice gave me some peace of mind.<br>I topped up around 200 ml of oil and returned to my stay.</p><h4 class="font-bold text-xl mt-6 mb-2">Aizawl Evenings</h4><p>By around 2 PM, I began my regular routine again — working for a few hours.</p><p>Around 5:30 PM, I decided to go out once more to the Aizawl viewpoint restaurant to watch the sunset.</p><p>While returning from there, something interesting happened.<br>Two riders approached me after noticing my bike number plate.<br>They were from Tamilnadu.</p><p>We started talking, and within minutes we realised something funny — they were doing a similar long ride across the Northeast.</p><p>We stood there talking for nearly 30 minutes, exchanging travel stories and route suggestions.<br>It felt nice to meet fellow riders on the road.</p><p>Eventually we said goodbye.<br>I had dinner at the restaurant and returned to my stay.</p><h4 class="font-bold text-xl mt-6 mb-2">Preparing for the Next Ride</h4><p>Since I was leaving early the next morning, I decided to pack everything that night.<br>The traveller sharing my room helped me organise the luggage.<br>We packed the bags and kept them near the door so that leaving early would be easier.</p><p>After a long day that had started at 2:30 AM, I was finally ready to sleep.<br>Before sleeping, we talked for some time about travel and life.</p><p>By around 9:30 PM, I finally lay down.</p><p>The next morning would begin another long ride.<br>And the road, as always, was waiting.</p>', quote: '"Some moments can only be experienced if you chase them."' },
            { type: 'chapter', id: 'ch26', title: 'The Day a Stranger Changed My Route', chapter: 'Ch  26', stats: 'Silchar', image: 'images/chapter-26.jpg', desc: '<p>Aizawl to Silchar</p><p>I woke up early that morning.<br>The plan for the day was simple — ride from Aizawl to Silchar, which was about 260 kilometres away. On paper it looked manageable, though the estimated travel time was almost seven hours, which meant the road conditions were probably not very good.</p><p>After checking my bike one more time, I said goodbye to the traveller who had shared the room with me. We wished each other safe journeys.</p><p>Then I started riding.</p><p>The morning air in Mizoram was fresh and cool. As I rode out of the city, the road twisted through the hills. At one point, I saw a beautiful sunrise glowing through the fog, so I stopped the bike for a few minutes just to watch it.</p><p>Moments like that make long journeys worth it.</p><p>By around 8 AM, I reached the Mizoram–Assam border.<br>There was a small tea stall there, so I stopped for a break because the bike engine had heated up slightly during the hill descent.</p><p>The tea stall was run by a young girl and her family. They spoke to me kindly and shared some local information about the route ahead. Since there was no proper breakfast available, I ate a couple of biscuits and drank tea.</p><p>When I asked how much I owed them, they refused to take any money.<br>They simply said,<br>“You are travelling alone. It’s okay.”</p><p>That small gesture stayed with me.</p><h4 class="font-bold text-xl mt-6 mb-2">Another Road That Tested Me</h4><p>From the border there were two possible routes to Silchar.<br>Both had similar travel times.</p><p>One of the locals suggested a road that passed through forest areas. I trusted the suggestion and took that route.</p><p>Soon I realised it was another difficult road.<br>Extremely dusty.<br>Broken surfaces.<br>Loose stones everywhere.</p><p>Sometimes I could ride only at 10–20 km/h.<br>There was no mobile network, no shops, and very few vehicles passing by.</p><p>The road felt isolated.<br>At times I wondered if I had made the wrong decision again.</p><p>For nearly 50 kilometres, the road remained terrible.<br>I had to stop multiple times because the engine was overheating while climbing slow rocky sections.<br>There were no proper rest areas either.</p><p>At one point I stopped beside the road, ate some biscuits again, and just sat there for a few minutes.</p><p>That 50 kilometre stretch alone took nearly two hours to cross.<br>Finally, around 12:30 PM, I reached closer to Silchar.</p><h4 class="font-bold text-xl mt-6 mb-2">A Stay That Felt Like Home</h4><p>I had already booked a stay there, so I went directly to the place.</p><p>The stay turned out to be surprisingly beautiful and comfortable. The owner welcomed me warmly and immediately showed me where to park my bike safely.</p><p>After travelling through such rough roads, the place felt like a small reward.</p><p>When I went downstairs after freshening up, the owner surprised me.<br>He had prepared home-cooked food.<br>Chicken and rice.</p><p>He insisted that I eat first before doing anything else.</p><p>We sat together and talked for a while. He asked about my journey, encouraged me, and treated me like a guest rather than a customer.<br>That kind of hospitality always makes travel special.</p><h4 class="font-bold text-xl mt-6 mb-2">Realising What I Really Need</h4><p>Later in the afternoon, I went for a short walk around the town.<br>While sitting there, I realised something interesting.</p><p>The more days I travelled, the fewer things I actually needed.</p><p>When I started the journey, I had packed many items and clothes.<br>But after weeks on the road, I understood that I could travel comfortably with very few things.</p><p>Travel simplifies life.<br>You start carrying only what truly matters.</p><h4 class="font-bold text-xl mt-6 mb-2">A Conversation That Changed Everything</h4><p>In the evening, I sat with a few travellers staying at the dormitory.<br>We talked about different places, roads, and travel experiences.<br>I shared my plan for the next day.</p><p>My idea was to ride from Silchar to Imphal in Manipur.<br>The distance was only about 200 kilometres, but the estimated travel time was nearly 14 hours.</p><p>One of the travellers listened carefully and then warned me.<br>He said that road was extremely difficult.</p><p>Not just bad roads — but isolated roads.<br>No petrol pumps.<br>No restaurants.<br>Very few villages.</p><p>In some sections, there would be no help at all if something went wrong.<br>He explained that the road was sometimes barely a road — more like a trail through mountains.</p><p>Listening to him made me rethink my plan.<br>Until that moment, I had assumed that route was manageable.<br>But now I realised it could be risky.</p><p>Sometimes information from experienced locals is more valuable than any map.</p><p>If I had not stayed in Silchar that night, I might never have learned about those conditions.<br>That conversation probably changed the course of my journey.</p><p>So I made a decision.<br>Instead of going to Imphal directly, I would change my route and ride toward Nagaland, to Kohima, the next day.</p><p>It would be longer — around 600 kilometres across multiple stages — but much safer.</p><p>Sometimes changing plans is not weakness.<br>It is wisdom.</p><h4 class="font-bold text-xl mt-6 mb-2">Music Before the Next Ride</h4><p>Later that night, one of the travellers played a guitar and sang a beautiful song.<br>After such an intense day, the music felt peaceful.</p><p>I went outside, checked my bike again, lubricated the chain, and packed my luggage carefully so I could leave early the next morning.</p><p>I said goodbye to the people I had met that day and returned to my room.<br>By the time I lay down to sleep, I felt grateful for something simple:<br>Sometimes the road protects you through the people you meet.</p><p>And that night in Silchar might have been one of those moments.</p><h4 class="font-bold text-xl mt-6 mb-2">Gratitude for the People of Silchar</h4><p>That evening, while sitting with the people in the dormitory, I shared my next plan — riding to Imphal in Manipur the following day.</p><p>On the map it looked simple.<br>Only 200 kilometres.</p><p>But when I said this, one of the travellers immediately stopped me and began explaining the reality of that road.<br>He told me that the distance may be short, but the journey could take 14 hours or more.</p><p>There are long stretches with no petrol pumps, no restaurants, no villages, and sometimes barely even a proper road. In some sections, it is more like a narrow mountain path.</p><p>The more he explained, the more serious the situation sounded.<br>There were a few details he shared that were honestly quite frightening — things I may not even be able to explain fully in words.</p><p>Listening to him carefully, I realised something important.<br>If I had taken that road blindly, without knowing these realities, my journey could have faced serious trouble.</p><p>Maybe I would have been stuck somewhere.<br>Maybe the bike would have broken down.<br>Maybe something worse could have happened.</p><p>At that moment, I felt deeply grateful.<br>Those people in the dormitory were not just fellow travellers.<br>They were guides sent by the road itself.</p><p>Because of them, I changed my plan that night.<br>Instead of riding toward Manipur directly, I decided to go toward Nagaland, to Kohima, the next day.</p><p>Sometimes the right information at the right moment can change the entire direction of a journey.<br>And that night, it probably protected mine.</p><h4 class="font-bold text-xl mt-6 mb-2">The Kindness of the Stay Owner</h4><p>Another person who left a deep impression on me was the stay owner.</p><p>From the moment I arrived, he treated me not like a customer but like a guest.<br>He helped arrange everything for me.<br>He prepared home-cooked food — not once, but three times that day.</p><p>He encouraged me, asked about my ride, and made sure I was comfortable after the long and difficult road.</p><p>The people staying there were also very friendly. Everyone was curious about my journey, and many of them were happy to see someone travelling such a long distance by bike.</p><p>Their warmth made the place feel like home.</p><p>When I think back about it now, I sometimes feel that maybe I reached Silchar for a reason.<br>If I had not stayed there that night, I might never have received the information that changed my route.<br>And maybe the journey could have ended differently.</p><p>Sometimes destiny quietly places the right people in your path.</p><h4 class="font-bold text-xl mt-6 mb-2">Carrying Less, Living More</h4><p>That evening, while organising my luggage for the next day, another thought came to me.</p><p>When I started this journey, I had packed many things.<br>Clothes.<br>Extra items.<br>Things I thought I might need.</p><p>But after travelling for so many days, I realised something simple:<br>The more you travel, the less you actually need.</p><p>Life becomes lighter.<br>You carry fewer clothes.<br>Fewer belongings.<br>And somehow, you feel more peaceful.</p><p>That night, I removed a few unnecessary things from my luggage.<br>Because the road had already taught me a quiet lesson:<br>A simple life is often a freer life.</p><h4 class="font-bold text-xl mt-6 mb-2">Music Before the Next Ride</h4><p>Later that night, one of the travellers picked up a guitar and began singing a beautiful song.<br>The atmosphere became calm and peaceful.</p><p>After the long ride, the difficult roads, and the serious conversations, that music felt like a gentle pause before the next chapter of the journey.</p><p>Before going to sleep, I checked my bike once more, packed my bags near the door so I could leave early, and thanked everyone there.</p><p>Sometimes a journey moves forward not only because of your own courage…<br>but because of the kindness of the people you meet along the way.</p><p>And that night in Silchar was one of those moments.</p>', quote: '"Sometimes changing plans is not weakness. It is wisdom."' },
            { type: 'chapter', id: 'ch27', title: 'A New Year on the Road', chapter: 'Ch  27', stats: '1 Jan • Kohima', image: 'images/chapter-27.jpg', desc: '<p>Silchar to Kohima, Nagaland</p><p>It was the first day of the year.<br>1 January 2026.</p><p>I woke up very early, around 4:30 AM in Silchar. The air was cold and silent. I freshened up, dressed in my riding gear, and carried my luggage downstairs.</p><p>The previous night I had already informed the stay owner that I would be leaving very early. I called him, and within a few minutes he came down and opened the gate for me.</p><p>Before leaving, I thanked him again.<br>He had treated me with kindness, arranged food for me, and helped me more than I expected.</p><p>We exchanged a warm goodbye. I even gave him a hug before starting the bike.<br>Then the road called again.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding into the Fog</h4><p>The morning was extremely foggy.<br>Visibility was low, and the cold wind cut through my riding jacket. The road from Silchar initially was decent, so I rode carefully at around 40–50 km/h.</p><p>After riding for a while, around 6:00 or 6:15 AM, I stopped at a small tea stall.<br>Hot tea in that cold fog felt perfect.</p><p>After a short break, I continued.<br>But the road soon changed.</p><h4 class="font-bold text-xl mt-6 mb-2">Dust and Broken Roads</h4><p>Suddenly the good road disappeared.<br>What followed was one of the worst stretches of road I had encountered.</p><p>There were heavy trucks passing, and the road was filled with two feet of loose dust everywhere. Every time a truck crossed, a massive cloud of dust would cover everything.</p><p>Within seconds, my helmet visor would become completely dirty.<br>Every few hundred meters I had to stop and clean it just to see the road ahead.</p><p>The dust entered everywhere — my jacket, my gloves, even inside the helmet.</p><p>But through all of this, my bike kept going.<br>The road was terrible.<br>The conditions were harsh.<br>Yet the bike never gave up.</p><p>Every bump, every rocky patch, every dusty climb — it carried me forward like a silent companion determined to take me safely to the next town.</p><p>At one point I stopped to clean my helmet and accidentally dropped it.<br>It cracked slightly.</p><p>Later, after another break, I dropped it again and it broke even more.<br>But there was nothing I could do.<br>There were no shops nearby.</p><p>So I continued riding carefully.</p><h4 class="font-bold text-xl mt-6 mb-2">Lunch by the Water</h4><p>After hours of difficult riding, around 1 PM, I reached a small place where water was flowing near the roadside.<br>I stopped there for lunch.</p><p>A few local people were sitting nearby, and we spoke for some time. They were curious about my journey and gave me some information about the road ahead.</p><p>That small break refreshed me.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering Nagaland</h4><p>Around 2:30 PM, I finally reached the Nagaland checkpost.<br>I stopped to ask about the Inner Line Permit, which is usually required to enter Nagaland.</p><p>The police officers there were surprisingly kind and polite.<br>After hearing that I was a solo traveller riding across states, they told me something reassuring.</p><p>“You don’t need to take the permit right now. Just tell them you are exploring Nagaland. It will save your time and money.”</p><p>Their encouragement made me happy.<br>Sometimes the kindness of authorities on the road gives unexpected confidence.</p><p>After thanking them, I continued riding.</p><h4 class="font-bold text-xl mt-6 mb-2">The Last Stretch to Kohima</h4><p>A little ahead, I met another traveller. He helped me take a few photographs and we chatted for a while.<br>Then I continued toward Kohima.</p><p>From there it was about 72 kilometres, and thankfully the road was much better than the earlier dusty stretch.<br>The hills of Nagaland slowly appeared around me.</p><p>By around 3:30 to 4 PM, I finally reached Kohima.</p><h4 class="font-bold text-xl mt-6 mb-2">Finding Familiar Voices</h4><p>I went directly to the hostel where I had planned to stay.<br>After checking in, something unexpected happened.</p><p>I met two travellers who were speaking Kannada.<br>After nearly 26 days of travelling, hearing my own language again felt comforting.</p><p>They were from Karnataka, and within minutes we became friends.<br>It felt like meeting family far away from home.</p><h4 class="font-bold text-xl mt-6 mb-2">A Quiet New Year Night</h4><p>Since it was New Year\'s Day, almost everything in the city was closed.<br>Finding food became a small adventure.</p><p>First we found a tiny place where we could get tea and samosas.<br>Later, around 7:30 PM, we tried to find a restaurant for dinner.<br>Almost every place was closed.</p><p>Finally, one restaurant owner, after hearing that we had been searching for food, kindly opened his kitchen again and prepared dinner for us.<br>That gesture meant a lot.</p><p>After dinner, we returned to the hostel.<br>We sat together, talking about travel, roads, and life for almost an hour.</p><p>By around 9:30 PM, the long day finally caught up with me.</p><p>After riding through fog, dust, broken roads, and mountains on the first day of the year, I felt exhausted.<br>But also grateful.</p><p>Another state.<br>Another story.<br>Another chapter of the road.</p><p>And my bike — dusty, tired, but strong — was still standing outside, ready for whatever the next day would bring.</p>', quote: '"Every bump, every rocky patch, every dusty climb — it carried me forward like a silent companion."' },
            { type: 'chapter', id: 'ch28', title: 'Lessons from Kohima', chapter: 'Ch  28', stats: 'Kohima', image: 'images/chapter-28.jpg', desc: '<p>Trust, Culture, and Quiet Roads</p><p>After many days of waking up at 4:30 AM, Day 28 felt different.<br>That morning I woke up a little late, around 6:30 AM.</p><p>From my hostel window I could see the hills of Kohima slowly waking up. The sky was clear, and the sunrise was beautiful, spreading soft light across the valley.</p><p>I stood there quietly for a few minutes, just watching the morning unfold.</p><p>By that time, my new friends Booty and Shiva had already left. They had been staying there for almost five days and had an early flight to catch, so they had left the hostel around 3:30 AM.</p><p>The hostel felt a little empty after they left.<br>After getting ready, I decided to go out and explore the city.</p><h4 class="font-bold text-xl mt-6 mb-2">The Local Market</h4><p>My first stop was the local market in Kohima.<br>It was unlike any market I had seen before.</p><p>There were small stalls selling things I had never seen in other markets — different kinds of vegetables, forest produce, and even animals that are traditionally consumed in the region.</p><p>For someone coming from the south of India, it felt completely different.<br>The market showed how unique Naga culture and food habits are.</p><p>I spent some time walking through the lanes, observing people and taking photographs.</p><h4 class="font-bold text-xl mt-6 mb-2">An Unpleasant Encounter</h4><p>Later I walked toward a nearby village area.<br>While taking some pictures, a man suddenly approached me.</p><p>He looked drunk and was very rude. He began questioning me aggressively — asking why I was taking pictures and demanding money.<br>He even tried to touch my camera and my bag.</p><p>For a moment I felt uncomfortable and slightly scared.<br>I tried to stay calm, spoke politely, and slowly moved away from the situation.</p><p>Finally I managed to leave that place.<br>The incident left me feeling a little disturbed.</p><p>But after walking further, I met a local girl who explained something important.<br>She told me that some outsiders had misused photographs and videos of villages by posting them online without permission, bringing unnecessary crowds and disturbance.<br>Because of that, a few locals had become sensitive about cameras.</p><p>She reassured me that most people were kind and welcoming, and that the incident I experienced did not represent everyone.<br>Her explanation helped me understand the situation better.</p><p>Sometimes travel teaches you to see beyond a single moment.</p><h4 class="font-bold text-xl mt-6 mb-2">A Shop Built on Trust</h4><p>Soon after, I saw something that completely changed my mood.<br>I found a small self-service shop by the roadside.</p><p>There was no shopkeeper.<br>Just shelves with items — snacks, drinks, and small goods.<br>A board explained the system:<br>You simply take what you need and pay through UPI or leave cash in the box.</p><p>The entire shop functioned purely on trust.<br>Standing there, I felt amazed.</p><p>In a world where people worry about theft and security, here was a place where an entire shop was built on honesty.<br>That moment reminded me of something simple:<br>Trust creates trust.</p><p>If we respect people, their culture, and their way of life, we usually receive the same respect in return.</p><h4 class="font-bold text-xl mt-6 mb-2">The Clean Villages of Nagaland</h4><p>From there I rode toward Khonoma Village and the Naga Heritage Village.<br>The villages in Nagaland surprised me.</p><p>They did not feel like ordinary villages.<br>They were incredibly clean and well maintained.</p><p>Everywhere I looked there were bamboo dustbins instead of plastic.<br>The roads were spotless.<br>There was almost no noise, no unnecessary traffic, no litter.<br>It felt peaceful.</p><p>While exploring the Naga Heritage Village, I met a couple who kindly helped me take some photographs. They also explained the importance of the place and told me about the Hornbill Festival, which celebrates Naga culture and traditions every year.</p><p>Spending time there helped me understand the rich heritage of Nagaland.</p><p>Before leaving, I also met a few students who were curious about my ride. When they heard about the distance I had travelled, they seemed inspired and encouraged me warmly.</p><p>Moments like these make solo travel special.</p><h4 class="font-bold text-xl mt-6 mb-2">Taking Care of My Companion</h4><p>By around 3:30 PM, I returned to Kohima.<br>Before going back to the hostel, I stopped at a shop to buy a few locks and fittings for my bike.</p><p>After all the kilometres we had travelled together, I felt responsible for taking care of it.<br>That bike had carried me across mountains, dust, broken roads, and long distances.<br>Protecting it felt important.</p><p>Back at the hostel, the place felt unusually quiet.<br>Most travellers had left after the Christmas and New Year holidays. Only two or three people remained.</p><h4 class="font-bold text-xl mt-6 mb-2">A Cold Evening in Kohima</h4><p>By evening the temperature had dropped to around 5–6 degrees.<br>In Kohima, most restaurants close very early — around 7 or 7:30 PM.</p><p>Remembering the struggle for food the previous night, I decided to order dinner early so I wouldn’t have the same problem again.<br>Around 7 PM, I sat outside the hostel with my food.</p><p>The air was extremely cold.<br>But the quiet evening felt peaceful.</p><p>After dinner, I went for a short walk to buy medicine, water, and some biscuits for the next day.<br>I had another plan forming in my mind.<br>The famous Dzukou Valley.</p><p>Before sleeping, I spoke with the hostel owner and gathered some information about the trek.<br>He was very friendly and shared useful advice.</p><p>Around 8:30 PM, I returned to the hostel and prepared for the next day’s adventure.</p><p>The hostel was silent.<br>The hills of Nagaland were cold and still.<br>And somewhere outside, my bike rested after another day of exploring the Northeast.<br>Tomorrow would bring another journey.</p>', quote: '"In a world where people worry about theft and security, here was a place where an entire shop was built on honesty."' },
            { type: 'chapter', id: 'ch29', title: 'The Valley That Tested Me', chapter: 'Ch  29', stats: 'Dzukou Valley', image: 'images/chapter-29.jpg', desc: '<p>Dzukou Valley</p><p>That morning I woke up around 6 or 6:30 AM in Kohima.<br>For the first time in many days, I wasn’t rushing anywhere. It was Saturday, and the morning felt slow and peaceful.</p><p>But one thought kept returning again and again.<br>Dzukou Valley.</p><p>I had come all the way to Nagaland, and Dzukou Valley is known as one of the most beautiful valleys in Northeast India. Yet I hesitated.</p><p>The trek was long — almost 30 kilometres round trip — and I would be doing it solo in extremely cold conditions.</p><p>For a moment I wondered if I should skip it.<br>I stepped outside the hostel for a short walk, just ten minutes to clear my mind.</p><p>When I returned, the answer had already formed inside me.<br>If I came this far, I cannot miss this.</p><h4 class="font-bold text-xl mt-6 mb-2">The Journey to Viswema</h4><p>A guy in the hostel had initially said he would join me.<br>But after making me wait almost an hour, he finally told me he wasn’t feeling well and wouldn’t be coming.</p><p>For a moment I thought about cancelling the trek.<br>But something inside pushed me forward.</p><p>Instead of taking my bike to the trailhead at Viswema village, I decided to go by shared taxis. Parking in an unknown village for an entire day felt risky.</p><p>So I took a small taxi for ₹20 to the bus stand and then another shared taxi to Viswema for ₹90.</p><p>While travelling in the shared taxi, I met a beautiful group of travellers. We had a nice conversation during the ride, and they were genuinely happy to see someone travelling solo and exploring Nagaland.</p><p>Those little conversations add warmth to a journey.</p><p>I reached around 10 AM, had breakfast, and bought some snacks and water for the trek.<br>I travelled light — just a 10-litre bag with biscuits, water, and basic things. In cold mountain conditions, carrying heavy luggage becomes a burden.</p><h4 class="font-bold text-xl mt-6 mb-2">Finding the Right Company</h4><p>From Viswema, taxis usually charge ₹1500–₹2500 to reach the trekking base.<br>Since I was alone, I decided to wait.</p><p>After about 20–30 minutes, a group of travellers from Assam arrived.<br>I asked if I could join them.<br>They welcomed me immediately.</p><p>Within ₹250, I reached the trekking base.<br>Sometimes patience brings the right people into your journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Walking Into the Forest</h4><p>The trek began from the checkpost.<br>After paying the entry fee, I started walking into the forest.</p><p>Soon I met Joseph, a local guide who had been hired by a group of trekkers from Kerala. We started talking, and the conversation flowed easily.</p><p>Even though I had come alone, I never felt alone.<br>Everyone at the base camp, every trekker on the trail, slowly became part of the journey. I spoke with almost everyone I met on the way.</p><p>That is the magic of trekking.<br>Strangers become companions.</p><h4 class="font-bold text-xl mt-6 mb-2">A Lighter Kind of Walking</h4><p>The path moved through thick forests and open ridges.<br>Something strange happened during the trek.</p><p>With every step I took, I felt lighter.<br>Not physically lighter — but mentally.</p><p>Usually long treks make you tired.<br>But that day I never felt exhausted.</p><p>Walking alone through the dense forest, listening to the wind move through the trees, felt almost spiritual.<br>At some moments it felt like walking inside a dream.</p><p>Trekking solo in such a forest is a different kind of experience.<br>It is not just about reaching the destination.<br>It is about becoming quiet enough to hear yourself.</p><h4 class="font-bold text-xl mt-6 mb-2">Reaching the Base Camp</h4><p>By afternoon I reached the Dzukou base camp.<br>Trekkers stay there overnight before visiting the main valley early the next morning.</p><p>The tents were charging around ₹1000 per person, which felt expensive.<br>So I waited and spoke to other trekkers.<br>Finally, I managed to share a tent and stay there for ₹200.</p><p>That small victory made me happy.</p><h4 class="font-bold text-xl mt-6 mb-2">Sunset and an Unexpected Surprise</h4><p>Before evening I walked to the sunset viewpoint.<br>The sky slowly turned orange as the sun disappeared behind the endless hills of Dzukou.</p><p>The view was breathtaking.</p><p>I kept my bag aside and walked ahead to enjoy the sunset.<br>But when I returned, something funny had happened.</p><p>Rats had eaten all my snacks.<br>My biscuits and food packets were completely gone.</p><p>For a moment I laughed.<br>Even the animals of the valley had joined my journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Fire, Friends, and Cold</h4><p>By 5:30 PM, darkness arrived quickly.<br>The temperature dropped rapidly.<br>Soon it was around –4°C.</p><p>The cold was intense.</p><p>At the base camp, the organisers lit a bonfire, and everyone gathered around it.<br>People from Mumbai, Delhi, Assam, Kerala, Uttarakhand, and many other places sat together.</p><p>I had arrived alone.<br>But sitting there with everyone, sharing stories and laughter, I didn’t feel like a solo traveller anymore.<br>For that one evening, we were all part of the same temporary family.</p><p>Joseph and the trekkers from Kerala even shared one of their blankets with me when they realised I had forgotten mine.</p><p>That kindness meant a lot.</p><h4 class="font-bold text-xl mt-6 mb-2">A Night That Wouldn’t Let Me Sleep</h4><p>But the cold was brutal.<br>Even with the blanket, sleep was difficult.</p><p>One of my phones died because of the cold and low battery.<br>I kept thinking about the next morning.</p><p>The sunrise over Dzukou Valley.<br>The photographs I wanted to capture.<br>The memories waiting to be created.</p><p>I slept only for short moments.<br>But strangely, I didn’t regret it.</p><p>Because some nights are not meant for comfortable sleep.<br>They are meant to become stories.</p><p>And that freezing night in Dzukou Valley was one of those stories.</p>', quote: '"Because some nights are not meant for comfortable sleep. They are meant to become stories."' },
            { type: 'chapter', id: 'ch30', title: 'The Morning That Proved Everything', chapter: 'Ch  30', stats: 'Dzukou Valley', image: 'images/chapter-30.jpg', desc: '<p>Dzukou Valley – The Coldest Test</p><p>The night before had been brutal.<br>The temperature had dropped to around –4°C, and sleep was almost impossible. Even with the blanket that the Kerala group had shared with me, the cold kept waking me up again and again.</p><p>In total, I might have slept barely one hour.</p><p>By 4:30 AM, I gave up trying to sleep.<br>I stepped outside the tent.<br>The cold hit instantly.</p><p>Without a mask, cap, and gloves, it was almost impossible to stand there. My breath turned into white mist, and the air felt sharp against my skin.</p><p>The water bottle I had kept beside me had become ice cold.<br>Somehow I drank a few sips.</p><p>At 5 AM, I started walking toward the main Dzukou Valley, which was still about 3 kilometres away from the base camp.</p><h4 class="font-bold text-xl mt-6 mb-2">Walking Into the Freezing Morning</h4><p>The trek was harder than I expected.<br>My body was already tired from the previous day’s trek, and with almost no sleep, walking again in freezing temperatures felt like another challenge.</p><p>Luckily, the Kerala traveller joined me.<br>Two other trekkers from Tripura also decided to walk with us.</p><p>We moved slowly through the dark trails toward the valley.<br>Our first stop was the emergency helipad point, where the valley slowly opened before us.</p><p>Even in the early light, the view was breathtaking.<br>Rolling hills stretched endlessly.<br>The valley looked peaceful and untouched.</p><h4 class="font-bold text-xl mt-6 mb-2">When the Cold Tested Me</h4><p>But the cold became stronger as we continued.<br>Within the first kilometre, my hands started going numb.<br>My face and beard were slowly filling with tiny crystals of ice.</p><p>For a moment, I almost stopped.<br>I told myself:<br>"Maybe this is enough."</p><p>But something inside refused to quit.<br>We continued walking.</p><p>Soon we reached a frozen river.<br>The entire stream had turned into ice.<br>It was around 6 AM.</p><p>I stood there for a few minutes, looking at the frozen landscape and clicking a few photos.</p><p>That moment brought a strange realization.<br>When I started this journey from Mysuru, I wasn’t even sure if I could complete it.<br>But now I was standing here, trekking in –4°C, deep inside a valley in Nagaland.</p><p>I smiled quietly.<br>Everything is possible with time and patience.</p><h4 class="font-bold text-xl mt-6 mb-2">The Final Push</h4><p>The two trekkers from Tripura decided to return from that point.<br>But I continued.</p><p>There were still another two kilometres to the main peak.<br>The cold was intense.<br>My fingers felt like they were losing their strength.<br>My beard had frozen.</p><p>The path was slippery and silent.<br>But step by step, slowly, I kept moving.</p><p>Sometimes courage is not loud.<br>Sometimes it is just taking the next step.</p><h4 class="font-bold text-xl mt-6 mb-2">The First One to Reach</h4><p>At around 7:15 AM, I finally reached the highest point of the valley.<br>And something unexpected happened.</p><p>I was the first person to reach there that morning.<br>For a few seconds, I simply stood there.<br>Breathing.<br>Looking at the valley below.</p><p>I couldn’t believe it.<br>One of my long-time dreams had quietly become real.<br>I had reached Dzukou Valley’s peak.</p><p>Not with a group.<br>Not with a guide.<br>But on my own strength.</p><p>It wasn’t easy.<br>It wasn’t comfortable.<br>But it was worth everything.</p><h4 class="font-bold text-xl mt-6 mb-2">Waiting for the Sun</h4><p>Even after reaching the peak, the sun had not risen yet.<br>The cold was still extreme.<br>I stood there waiting.</p><p>Slowly the sky began to glow.<br>After about 30 minutes, sunlight finally touched the valley.</p><p>The ice on the leaves began melting.<br>Tiny drops of water started falling from the frozen plants.<br>The valley slowly woke up.</p><p>That moment felt magical.</p><h4 class="font-bold text-xl mt-6 mb-2">The Walk Back</h4><p>After spending some quiet time at the top, I started walking back.<br>On the way down, I met a few trekkers who had stopped midway because of the cold.<br>We sat together for a while, shared some snacks, clicked photos, and spoke about the trek.</p><p>Then I continued walking back to the base camp.</p><p>When I reached there, I had hot tea, eggs, and biscuits.<br>That simple meal felt like a luxury after the freezing morning.</p><h4 class="font-bold text-xl mt-6 mb-2">The Solo Descent</h4><p>Soon it was time to leave.<br>Some trekkers had already left early.<br>Others were still exploring the valley.</p><p>So I started the descent alone.<br>And strangely, I enjoyed it.</p><p>Walking down through the forests alone felt peaceful.<br>I took many breaks.<br>Captured photos.<br>Sat quietly in a few places.</p><p>Sometimes the best part of trekking is not the peak.<br>It is the journey back, when everything feels calm.</p><h4 class="font-bold text-xl mt-6 mb-2">The Unexpected Struggle</h4><p>By afternoon I reached the checkpost.<br>Luckily, I found a group and joined them to reach the village.</p><p>From there, I took a shared jeep.<br>But the real struggle started after that.</p><p>It was Sunday.<br>There were no taxis on the road.<br>I waited nearly two hours.<br>Nothing came.</p><p>Finally around 5 PM, I requested a local travel guide nearby.<br>He helped arrange a taxi to Kohima.</p><p>But it had to be a full hire, so I had to pay extra.<br>At that moment, it didn’t matter.<br>I just wanted to reach the hostel.</p><h4 class="font-bold text-xl mt-6 mb-2">A Quiet End to a Powerful Day</h4><p>I finally reached my hostel around 6 PM.<br>I took a hot bath.<br>Ordered food.<br>Had dinner quietly.</p><p>After speaking with the hostel owner for some time, I went to bed very early.<br>My body was exhausted.<br>But my mind was peaceful.</p><h4 class="font-bold text-xl mt-6 mb-2">What the Valley Gave Me</h4><p>I had started the trek alone.<br>But by the time I returned, I had spoken to almost everyone who came to the base camp.</p><p>Strangers had become friends.<br>Joseph, the Kerala group, the Tripura trekkers, and many others had all become part of the story.</p><p>One guide even shared snacks with me at the peak.<br>Small gestures.<br>But unforgettable ones.</p><p>Even today, I am still in touch with the Kerala traveller who walked with me that morning.</p><h4 class="font-bold text-xl mt-6 mb-2">An Unforgettable Memory</h4><p>Every step of that trek created a memory.<br>Every moment in the cold valley taught me something.</p><p>Dzukou Valley was not just a destination.<br>It was a test of patience.<br>Of endurance.<br>Of belief.</p><p>And it gave me something I will carry for the rest of my life.<br>An unforgettable moment.</p>', quote: '"Sometimes courage is not loud. Sometimes it is just taking the next step."' },
            { type: 'chapter', id: 'ch31', title: 'A Quiet Day in Kohima', chapter: 'Ch  31', stats: 'Kohima', image: 'images/chapter-31.jpg', desc: '<p>Rest, Friendship, and Preparation</p><p>After the intense experience of Dzukou Valley, Day 31 began gently.<br>I woke up around 6 AM and stepped outside the hostel.</p><p>The morning sky over Kohima was glowing softly. The sun slowly rose over the hills, lighting the city in golden colours.<br>After the freezing night in Dzukou Valley and the long trek the previous day, standing there quietly and watching the sunrise felt peaceful.</p><p>Some mornings don’t need anything else.<br>Just silence and sunlight.</p><h4 class="font-bold text-xl mt-6 mb-2">Taking Care of Things That Matter</h4><p>That morning became a small reset day for me.<br>I washed all my clothes that had become dusty during the trek.</p><p>Then I spent time with my bike.<br>After so many difficult roads, dust, and mountain trails, it deserved some care.</p><p>I cleaned it thoroughly, checked everything carefully, and lubed the chain properly. It felt satisfying to see it shining again.</p><p>My bike had carried me across thousands of kilometres.<br>Taking care of it was not a task.<br>It was respect.</p><p>By around 7:30 AM, everything was done.<br>I had taken a bath, freshened up, and felt ready for the day.</p><h4 class="font-bold text-xl mt-6 mb-2">Meeting Friends Again</h4><p>Later in the morning, a few travellers I had met earlier in the valley — guys from Arunachal Pradesh and Assam — called me.<br>We had crossed paths during the trek and connected well.</p><p>I stepped out and joined them for breakfast.<br>We spent some time together talking about the trek, travel stories, and future plans.</p><p>After breakfast, we took a small city walk around Kohima.</p><p>Sometimes travel friendships are short but meaningful.<br>Even a few hours together can create memories.</p><h4 class="font-bold text-xl mt-6 mb-2">Balancing Travel and Work</h4><p>By late morning, I returned to the hostel.<br>Like many other days of this journey, I had to balance travel and work.</p><p>So I opened my laptop and started working.<br>At the same time, I also began packing my luggage.</p><p>The next day I would leave for Mon district, another beautiful part of Nagaland.<br>Packing after so many days of travel had become easier.</p><p>I had learned something important during this journey:<br>The longer you travel,<br>the fewer things you realise you actually need.</p><h4 class="font-bold text-xl mt-6 mb-2">A Slow Afternoon</h4><p>Work that day was lighter than usual.<br>In the afternoon, I stepped out for a small walk and had lunch outside.<br>I also bought a few snacks for the next day\'s ride.</p><p>Kohima had begun to feel familiar by then.<br>The streets, the people, the small cafés — everything felt comfortable.</p><h4 class="font-bold text-xl mt-6 mb-2">Preparing for the Road Again</h4><p>By around 6:30 PM, my work was finished.<br>I stepped out again, this time to refill my bike’s fuel tank.<br>Before entering remote regions, it’s always safer to carry a full tank.</p><p>After filling fuel, I had dinner outside and returned to the hostel around 7:30 PM.</p><h4 class="font-bold text-xl mt-6 mb-2">A Simple Goodbye Evening</h4><p>Since I was leaving the next day, the hostel staff and a few travellers spent some time talking with me.<br>In a short time, we had become comfortable with each other.</p><p>Travel often creates friendships quickly because everyone understands the same language — the road.</p><p>Later that night, I watched a movie and continued chatting with them.<br>Time passed quietly.<br>By around 11:30 PM, I finally went to sleep.</p><p>The next morning, the journey would begin again.<br>A new road.<br>A new state.<br>And another story waiting somewhere ahead.</p>', quote: '"The longer you travel, the fewer things you realise you actually need."' },
            { type: 'chapter', id: 'ch32', title: 'Riding Into Uncertainty', chapter: 'Ch  32', stats: 'Kohima to Imphal', image: 'images/chapter-32.jpg', desc: '<p>Kohima to Imphal, Manipur</p><p>I woke up early that morning.<br>It was around 5 AM in Kohima.</p><p>Since I had already packed everything the previous night, the morning was simple. I just had to add a few small items — my tank bag and a few essentials.</p><p>By 5:30 AM, I started my bike and left the hostel.</p><p>That day’s destination was Imphal, the capital of Manipur.<br>The distance was only about 135 kilometres, but the expected travel time was nearly five hours. In the Northeast, distance often means very little — it is the road condition that decides how long the journey will take.</p><h4 class="font-bold text-xl mt-6 mb-2">The Road Changes</h4><p>The first part of the ride out of Kohima was smooth.<br>The cold morning air flowed through the hills, and the road was decent enough to ride comfortably.</p><p>But everything changed as I approached the Manipur border.<br>The road suddenly became extremely bad.</p><p>Dust covered the entire road. Trucks were moving slowly through thick clouds of dirt, and every few hundred metres my helmet visor would become completely muddy.<br>I had to stop frequently just to clean it.</p><p>Sometimes the dust was so thick that I could barely see ahead.</p><h4 class="font-bold text-xl mt-6 mb-2">The Military Presence</h4><p>Soon another thing caught my attention.<br>Every hundred metres, there were military personnel standing on the roadside.</p><p>Military trucks.<br>Armed soldiers.<br>Security vehicles.</p><p>I had seen such scenes only in movies and news reports before.<br>But here it was real.</p><p>The atmosphere felt tense.<br>A strange feeling of uncertainty began to grow inside me.</p><p>Just two days earlier, someone had warned me about travelling through Manipur.<br>That memory returned to my mind.</p><p>For a moment I wondered:<br>Did I make a wrong decision coming this way?</p><p>The combination of terrible roads, heavy dust, and constant military presence made the ride feel uncomfortable.<br>But the only way forward was to keep riding.</p><h4 class="font-bold text-xl mt-6 mb-2">A Long Empty Road</h4><p>For almost 135 kilometres, there were hardly any facilities.<br>No restaurants.<br>No proper tea stalls.<br>No petrol pumps.<br>No repair shops.<br>Just broken roads, stones, dust, and military vehicles.</p><p>At one point I found a small place where I thought of stopping, but I decided to continue, hoping to find something better ahead.<br>But nothing appeared.</p><p>It was just road after road of rough terrain.<br>At times I even worried about my bike.<br>If the tyre punctured or the top box broke on those roads, I had no idea where I would find help.</p><h4 class="font-bold text-xl mt-6 mb-2">Finally Reaching Imphal</h4><p>Around 11 AM, after riding nearly 110 kilometres, the road slowly became better.<br>“Better” in the Northeast still means rough, but at least it was manageable.</p><p>Soon I reached Imphal.<br>I already knew about a hostel there, so I rode directly to it.</p><p>After parking my bike and checking in, the first thing I did was take a bath.<br>The dust from the road had covered my clothes, my jacket, and even my face.<br>It felt good to finally wash everything away.</p><h4 class="font-bold text-xl mt-6 mb-2">A Familiar Face</h4><p>Then something unexpected happened.<br>At the hostel, I saw a French traveller whom I had met earlier in Nagaland.</p><p>Seeing a familiar face in a new city felt comforting.<br>We spoke for a while and shared stories from the road.</p><p>Later in the afternoon, we went out together to explore a nearby market.</p><h4 class="font-bold text-xl mt-6 mb-2">Life Continues Normally</h4><p>By evening I finished my work and stepped out again.<br>I went for tea and then visited a Vishnu Temple nearby.</p><p>One thing I noticed inside the temple surprised me.<br>There were more military personnel than ordinary visitors.<br>It reminded me again how different life here was compared to other parts of India.</p><p>After visiting the temple, I stopped at a small exhibition nearby, spent some time there, and returned to the hostel around 7:30 PM.</p><h4 class="font-bold text-xl mt-6 mb-2">Cooking Together</h4><p>That evening became special in a simple way.<br>The French traveller and I decided to cook dinner ourselves.</p><p>We went to a nearby market and bought some vegetables before the shops closed.<br>Back at the hostel, I cooked tomato rice.<br>Another traveller from Tripura joined us.</p><p>Soon the hostel kitchen turned into a small gathering place.<br>We all sat together eating, talking, and sharing stories.<br>Even the hostel owner joined us. He was extremely friendly and welcoming.</p><h4 class="font-bold text-xl mt-6 mb-2">Conversations Late Into the Night</h4><p>Travellers from Tripura, Assam, France, and other places sat together that night.<br>The conversation flowed naturally.</p><p>We spoke about travel, life, culture, and the roads we had taken to reach this place.<br>Time passed quickly.<br>Before we realised it, it was already 11:30 PM.</p><h4 class="font-bold text-xl mt-6 mb-2">Understanding Manipur</h4><p>When I first entered Manipur that morning, I had felt fear.<br>The roads.<br>The military presence.<br>The tension.</p><p>At one point I had even heard about a bomb blast incident earlier that day, which made the atmosphere feel even more unsettling.</p><p>But as the day passed, the people around me explained something important.<br>For them, this was normal life.<br>Security forces being present everywhere was part of daily reality.</p><p>In our cities, seeing military vehicles or armed soldiers is rare.<br>But here, it was simply how things worked.</p><p>Once I understood that, my fear slowly disappeared.<br>Confidence replaced it.</p><p>And I realised something again:<br>Every place has its own story.<br>You just have to stay long enough to understand it.</p><p>That night, I slept peacefully in Imphal.<br>The day had started with uncertainty and fear.<br>But it ended with friendship, food, and conversation.</p><p>Another reminder that on the road, things can change quickly.<br>Sometimes all it takes is one day and a few good people.</p>', quote: '"Every place has its own story. You just have to stay long enough to understand it."' },
            { type: 'chapter', id: 'ch33', title: 'The Market of Mothers', chapter: 'Ch  33', stats: 'Imphal', image: 'images/chapter-33.jpg', desc: '<p>Exploring Imphal</p><p>After the long and dusty ride into Manipur the previous day, Day 33 began peacefully.<br>I woke up around 6 AM in the morning.</p><p>The air in Imphal was cold but calm. Before anything else, I stepped outside and looked at my bike. It was still covered with dust from the rough roads I had travelled the day before.</p><p>So the first task of the day was simple.<br>I cleaned my bike carefully, wiping away the dust from the body and the mirrors. After so many kilometres together, taking care of the bike had become almost like a morning ritual.</p><p>After that I took a bath and freshened up, and by around 7 AM I was ready to step out.</p><h4 class="font-bold text-xl mt-6 mb-2">Morning in Imphal</h4><p>One thing I had noticed in the Northeast was how early the day begins.<br>By 5 or 6 AM, people are already walking on the streets, opening small shops, or going about their daily routines.<br>Life starts early here.</p><p>That morning I initially thought of riding to a sunrise point, but the cold weather made me change my plan.<br>Instead, I decided to explore one of the most unique places in Manipur.</p><p>Ima Keithel Market.</p><h4 class="font-bold text-xl mt-6 mb-2">Ima Keithel — The Mothers’ Market</h4><p>I rode my bike to Ima Keithel, also known as the Mother’s Market.</p><p>The moment I entered the market area, I realised this place was something truly special.<br>Ima Keithel is one of the largest markets in the world run entirely by women.</p><p>Everywhere I looked, I saw women vendors managing shops, selling vegetables, fish, clothes, handmade goods, spices, and traditional items.<br>There were hundreds of small stalls.</p><p>And each stall had a woman sitting proudly behind it, running her business.</p><p>The market is not just a place of trade.<br>It is a symbol of women’s strength and independence in Manipur.</p><p>Walking through the market felt like walking through a living tradition.</p><h4 class="font-bold text-xl mt-6 mb-2">Breakfast in the Market</h4><p>Around 8 AM, I found a small restaurant inside the market itself and had breakfast there.</p><p>After eating, I spent almost an hour exploring the market lanes.<br>There were sections for vegetables, fish markets, clothes, and traditional handicrafts.<br>The fish market in particular was fascinating — rows of vendors selling fresh fish and seafood.</p><p>I also bought a casual pant and T-shirt, something comfortable for daily use during the journey.<br>Sometimes small purchases like that become part of travel memories.</p><h4 class="font-bold text-xl mt-6 mb-2">Exploring the City</h4><p>After the market, I visited a few nearby places including a war memorial and a historic fort area.<br>I spent the entire morning exploring different parts of Imphal.</p><p>By around 12:30 PM, I returned to the hostel.</p><h4 class="font-bold text-xl mt-6 mb-2">Work and Travel</h4><p>Like many other days of this journey, the afternoon was a balance between travel and work.<br>I opened my laptop and worked until around 3 PM.<br>After finishing some tasks, I stepped out again for lunch.</p><h4 class="font-bold text-xl mt-6 mb-2">The Market in the Afternoon</h4><p>When I returned to Ima Keithel in the afternoon, the atmosphere had completely changed.<br>The market was now crowded and lively.<br>Hundreds of women were selling their goods, customers were bargaining, and the entire place was buzzing with activity.</p><p>I spent some time again exploring different sections of the market.<br>Seeing a market run entirely by women felt inspiring.</p><p>It was not just commerce.<br>It was community, tradition, and resilience.</p><p>I had lunch there and sat for a while simply observing the rhythm of the place.</p><h4 class="font-bold text-xl mt-6 mb-2">A Quiet Evening at the Hostel</h4><p>After lunch, I returned to the hostel and completed my remaining work.<br>In the evening, the familiar hostel routine returned.</p><p>That night we cooked egg rice together.<br>The French traveller and the traveller from Tripura joined again, and we shared dinner while talking about our journeys.</p><p>Travel stories always sound better when shared with people who understand the road.</p><h4 class="font-bold text-xl mt-6 mb-2">Conversations with the Host</h4><p>Later in the evening, I spent some time talking with the hostel owner.<br>He had become very friendly with me during my stay.<br>We spoke about Manipur, the local culture, the situation in the region, and also about the places I was planning to visit next.</p><p>He suggested a few places and helped me plan my next ride.</p><p>The next destination I was considering was Loktak Lake and Moirang, which was about 40 kilometres from Imphal.<br>It would only take around 45 minutes to reach, so I decided to leave that decision for the next morning.</p><p>If I felt ready, I would go.<br>Otherwise, I could stay another day in Imphal.</p><h4 class="font-bold text-xl mt-6 mb-2">Preparing for the Next Day</h4><p>That evening I also washed my clothes again because the dust from the previous days had settled everywhere.<br>Before sleeping, I packed my bags so that the next morning would be easier.</p><p>The hostel felt warm and comfortable.<br>Good conversations, simple food, and the quiet city outside created a peaceful end to the day.</p><p>After spending some time chatting with everyone at the hostel, I finally went to sleep.</p><p>Another day in Manipur had passed.<br>And the road ahead was still waiting.</p>', quote: '"It was not just commerce. It was community, tradition, and resilience."' },
            { type: 'chapter', id: 'ch34', title: 'A Home by the Lake', chapter: 'Ch  34', stats: 'Loktak Lake', image: 'images/chapter-34.jpg', desc: '<p>Loktak Lake, Manipur</p><p>The next morning felt relaxed.<br>I woke up around 7 AM.</p><p>Unlike most days of the journey, I didn’t have a long ride ahead. My destination that day was Loktak Lake, one of the most beautiful and unique lakes in Northeast India, located only about 45 minutes from Imphal.</p><p>Since the distance was short, there was no rush.<br>After getting ready and saying goodbye to the hostel owner and the other travellers, I started my bike around 8 AM.</p><h4 class="font-bold text-xl mt-6 mb-2">Riding Slowly Toward the Lake</h4><p>The road to Moirang and Loktak Lake was calm and scenic.<br>In the middle of the ride, I stopped at a small place for breakfast.</p><p>That morning I rode slowly.<br>There was no hurry.<br>Sometimes the best rides are the ones where you simply move forward and enjoy every moment.</p><p>By around 10 AM, I reached Moirang town.<br>I spent some time exploring the local market and looking around the area. From there I could already see glimpses of the famous Loktak Lake.</p><p>The wide water, the floating vegetation, and the quiet atmosphere made the place feel special.</p><h4 class="font-bold text-xl mt-6 mb-2">A Homestay by the Water</h4><p>I had already booked a homestay near the lake, and after reaching there I immediately realised it was the perfect choice.</p><p>The house was located right beside the lake, just a few metres from the water.<br>Standing outside, I could see the calm lake stretching into the distance.</p><p>The view was beautiful.</p><p>After parking my bike and settling into the room, I sat quietly for a few minutes just watching the lake.<br>Sometimes silence itself becomes the best travel experience.</p><h4 class="font-bold text-xl mt-6 mb-2">Work by the Lake</h4><p>Even though I was travelling, I still had some work to complete.<br>So I opened my laptop and started working while sitting in that peaceful environment.</p><p>Around 2 PM, the owner called me for lunch.<br>The moment I entered the kitchen area, I realised something.</p><p>This didn’t feel like a homestay.<br>It felt like a home away from home.</p><p>Instead of eating separately, we all sat together in the kitchen and shared the meal.<br>We talked about many things — travel, life, culture, and the region.<br>The warmth of the family made the experience even more special.</p><h4 class="font-bold text-xl mt-6 mb-2">Watching the Sunset</h4><p>After finishing work later in the afternoon, the owner suggested I visit a nearby viewpoint hill from where I could see the sunset over Loktak Lake.</p><p>So I rode up to the viewpoint.<br>The view from the top was breathtaking.<br>Loktak Lake looked enormous from there.</p><p>One of the most fascinating things about the lake are the floating islands, known locally as phumdis — circular patches of vegetation floating on the water.<br>Seeing them from above was mesmerizing.</p><p>As the sun slowly began to set, the entire lake turned golden.<br>It was one of the most peaceful sunsets of my journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Conversations by the Lake</h4><p>Later in the evening, I met a few other travellers who were also staying in the same homestay.<br>The owner’s husband joined us as well.</p><p>He was extremely knowledgeable and spoke in detail about Manipur’s culture, traditions, politics, and daily life.<br>Listening to him was like attending a small informal lecture about the region.</p><p>Through his stories, I began to understand the place more deeply.<br>Travel becomes meaningful when you learn from the people who live there.</p><h4 class="font-bold text-xl mt-6 mb-2">A Dinner That Felt Like Family</h4><p>That night, five of us sat together for dinner.<br>The atmosphere felt warm and relaxed.</p><p>We spoke about festivals, marriage traditions, local customs, and our travel experiences.<br>The conversation flowed naturally.</p><p>After dinner, we went for a short walk near the lake.<br>The night air was cold, but the silence of the lake made the moment beautiful.</p><p>Standing there, with the dark water stretching into the distance, I felt calm.</p><h4 class="font-bold text-xl mt-6 mb-2">A Peaceful End to the Day</h4><p>By around 11 PM, we returned to the house.<br>The cold weather and the peaceful environment made me feel sleepy.<br>So I went to bed.</p><p>That night, as I fell asleep beside Loktak Lake, one thought stayed with me:<br>Sometimes the road gives you adventure.<br>Sometimes it gives you peace.</p><p>And that day, Loktak Lake gave me both.</p>', quote: '"Sometimes the road gives you adventure. Sometimes it gives you peace."' },
            { type: 'chapter', id: 'ch35', title: 'Walking on Water', chapter: 'Ch  35', stats: 'Keibul Lamjao', image: 'images/chapter-35.jpg', desc: '<p>Keibul Lamjao & Loktak Lake</p><p>I woke up very early that morning, around 5 AM.<br>The air around Loktak Lake was still and cold. The lake looked calm in the early light, and the entire area felt peaceful.</p><p>That day I had a simple plan.<br>I wanted to visit Keibul Lamjao National Park, the only floating national park in the world, located near Moirang.</p><p>Since the park opens at 6 AM, I started early from the homestay.</p><h4 class="font-bold text-xl mt-6 mb-2">Morning by the Lake</h4><p>While riding slowly along the lakeside road, I noticed people already awake and active.<br>Some were kayaking on the lake, while others were practicing morning exercises near the water.</p><p>The quiet morning energy of the place was beautiful.<br>I slowed down my bike and spent a few minutes watching them.</p><p>Moments like these remind you that travel is not just about destinations.<br>It is about observing life as it happens.</p><p>The park was only about 7 kilometres from my stay, so the ride was short.</p><h4 class="font-bold text-xl mt-6 mb-2">The Floating National Park</h4><p>When I reached Keibul Lamjao National Park, I realised something surprising.<br>I was the only visitor there.</p><p>The ticket counter wasn’t even open yet, so I waited for some time until the staff arrived.<br>Inside the park, a guide is mandatory, so I hired one.</p><p>The guide turned out to be a very friendly person. He didn’t demand any fixed amount and simply said I could give whatever I felt was appropriate.<br>That simplicity made the experience feel genuine.</p><p>He took me inside the park and explained its uniqueness.</p><h4 class="font-bold text-xl mt-6 mb-2">Searching for the Sangai</h4><p>Keibul Lamjao is famous for a rare and beautiful animal.<br>The Sangai deer, also known as the brow-antlered deer or the dancing deer of Manipur.</p><p>This deer lives only in this region and survives on the floating vegetation of the lake.</p><p>With binoculars and a small telescope, we slowly searched the wetlands.<br>After some waiting, we finally spotted a few Sangai deer moving gracefully in the distance.</p><p>Watching them in their natural habitat felt special.<br>The guide explained how fragile their ecosystem is and how important this park is for their survival.</p><h4 class="font-bold text-xl mt-6 mb-2">Floating on the Lake</h4><p>Inside the park there was also a small boat ride, which the guide suggested.<br>We took a boat and moved through the floating vegetation.</p><p>After about a kilometre, the guide told me to step out.<br>At first I was confused.<br>But when I stepped down, I realised something incredible.</p><p>I was standing on floating ground.<br>The entire surface was made of thick layers of mud, roots, and vegetation called phumdis, floating on the lake.</p><p>It felt like walking on water.<br>I even tried jumping lightly and laughing like a child.<br>It was one of the most unusual experiences I had ever had.</p><p>And the most surprising part?<br>I was the only visitor in the entire national park that morning.</p><h4 class="font-bold text-xl mt-6 mb-2">The Reality of Tourism</h4><p>While walking through the park, the guide told me something a little sad.</p><p>Even though the park has good facilities and is a unique natural wonder, very few tourists visit nowadays.<br>Due to the situation in Manipur, many people avoid travelling here.<br>Sometimes only one or two visitors come in an entire day.</p><p>Listening to that made me realise how many beautiful places remain unseen simply because of perception or fear.</p><h4 class="font-bold text-xl mt-6 mb-2">History in Moirang</h4><p>After spending almost two hours in the park, I thanked the guide and left.<br>Nearby, I had a cup of coffee in a small shop and then continued toward Moirang town.</p><p>My next stop was the historic INA (Indian National Army) Headquarters, where Netaji Subhas Chandra Bose\'s INA flag was first hoisted on Indian soil in 1944.<br>The place holds deep historical significance.</p><p>I also visited the INA Museum, which preserves many memories of India’s freedom struggle.<br>Interestingly, the museum was officially closed that day because of a holiday.<br>But when I spoke to a staff member there, she kindly allowed me to enter and personally explained many things about the history and exhibits.</p><p>She didn’t charge anything.<br>She simply said it was nice to see someone travelling so far to learn about the place.</p><p>That small gesture meant a lot.</p><h4 class="font-bold text-xl mt-6 mb-2">An Afternoon on Loktak Lake</h4><p>By around 12 PM, I returned to the homestay and started my work.<br>Later in the afternoon, around 3 PM, I went for a boat ride on Loktak Lake.</p><p>The boat took me to one of the floating houses built in the middle of the lake.<br>The experience was surreal.</p><p>Sitting there, surrounded by water and floating vegetation, felt peaceful beyond words.<br>I spent almost two hours there, enjoying the quiet beauty of the lake.</p><h4 class="font-bold text-xl mt-6 mb-2">A Night of Stories</h4><p>By evening, around 7 PM, I returned to the homestay.<br>After finishing my work meeting, I packed my luggage since I would be leaving the next morning.</p><p>At around 9 PM, dinner was ready.<br>That night we all sat together again — the host family and the travellers.</p><p>The conversation turned into storytelling.<br>They shared funny stories, life experiences, and even some tragic and emotional tales from the region.</p><p>One story stayed with me.<br>A man from Bangalore had once fallen in love with a girl he met there. She had told him she was from Manipur, but later he discovered she was actually from Myanmar.<br>He had travelled all the way searching for her.</p><p>With the help of the homestay owner, he eventually found her.<br>It was a complicated story filled with emotion, truth, and unexpected turns.<br>Listening to it felt like watching a movie.</p><h4 class="font-bold text-xl mt-6 mb-2">More Than a Homestay</h4><p>By the end of the night, one thing had become very clear to me.<br>This place was not just a homestay.<br>It felt like staying with relatives.</p><p>The owners treated me with warmth, respect, and care.<br>The house itself was simple.<br>But the hospitality felt luxurious.</p><p>Sometimes luxury is not about expensive rooms.<br>It is about how people treat you.</p><p>And in that house beside Loktak Lake, I truly felt welcomed.</p>', quote: '"Sometimes luxury is not about expensive rooms. It is about how people treat you."' },
            { type: 'chapter', id: 'ch36', title: 'Three States in One Day', chapter: 'Ch  36', stats: 'Assam', image: 'images/chapter-36.jpg', desc: '<p>Loktak → Kohima → Dimapur → Assam</p><p>I woke up very early that morning, around 5 AM.</p><p>Most of my packing had already been done the previous night, so there was very little left to prepare. I quietly packed the last few small things, checked my bike, and got ready to leave.</p><p>By the time I finished, the uncle from the homestay had also woken up.<br>I thanked him for everything. In just two days, that house by Loktak Lake had begun to feel like a relative’s home rather than a place I had booked online.</p><p>Before leaving, we took a photograph together.<br>I gave him a warm hug, said my last goodbye, and started my ride.</p><h4 class="font-bold text-xl mt-6 mb-2">The Cold Morning Ride</h4><p>The morning air was extremely cold.<br>For the first few kilometres I had to ride slowly just to let my body adjust to the temperature. The road was quiet, and the lake slowly disappeared behind me as I continued toward Imphal.</p><p>By around 7:15 AM, I reached the city again.<br>I was already hungry, so I stopped at a small roadside shop and had tea and poori for breakfast.<br>After that, the journey continued.</p><h4 class="font-bold text-xl mt-6 mb-2">The Dusty Road Again</h4><p>Soon the same dusty roads I had travelled earlier returned.<br>But this time I had more confidence.<br>I already knew what to expect.</p><p>I understood how the road behaved — where the loose mud was, where the dust clouds formed, and how to control the bike through the rough patches.</p><p>Still, the road remained difficult.<br>In a few places, the dust made the road slippery and my bike slipped slightly, but I managed to balance it carefully.<br>That stretch demanded patience and concentration.</p><h4 class="font-bold text-xl mt-6 mb-2">Returning to Nagaland</h4><p>By around 12 PM, I reached Kohima again.<br>Seeing the familiar city fel
