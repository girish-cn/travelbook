<head>

    <style>
        /* Chart Container Rules as per requirements */
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px; /* Tailwind max-w-xl is approx 576px, explicit generic limit here */
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 400px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }

        /* Custom Scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f5f5f4; 
        }
        ::-webkit-scrollbar-thumb {
            background: #d6d3d1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a29e; 
        }

        /* Fade transition */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .active-tab {
            border-bottom: 2px solid #ea580c; /* orange-600 */
            color: #ea580c;
            font-weight: 600;
        }
    </style>
    <!-- Chosen Palette: Warm Neutrals (Sand/Stone) with Burnt Orange Accent -->
    <!-- Application Structure Plan: 
         1. Hero Section: Title and aggregate stats to set the scope.
         2. Interactive Dashboard: Split view. Left side is the 'Journey Log' (timeline navigation). Right side is the 'Mindset Monitor' (Context + Charts).
         3. Why: The report is a narrative of internal change. A linear text dump is boring. A dashboard allows the user to 'click through' the chapters and see the emotional data change, reinforcing the "Internal vs External" theme. 
         4. Flow: User starts at Chapter 1. They read the summary, see the 'Confusion' heavy chart. They click Chapter 3, they see the 'Commitment' spike. 
    -->
    <!-- Visualization & Content Choices:
         1. Line Chart (The Emotional Altimeter): Goal: Show the non-linear path of confidence. Interaction: Static overview but updates highlights. Justification: Shows trends over time perfectly.
         2. Doughnut Chart (Headspace Composition): Goal: Show the mix of emotions at each stage. Interaction: Updates dynamically when a chapter is selected. Justification: Best for part-to-whole comparisons of abstract feelings.
         3. Text Cards: Goal: Deliver the narrative payload. Interaction: Show/Hide based on selection.
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->
</head>

        let currentIndex = 0;
        let isAudioPlaying = false;
        
        // Create the background audio player globally using a single music file
        // Make sure to place "background-music.mp3" in the same folder as this HTML file!
        const audioPlayer = new Audio('background-music.mp3');
        audioPlayer.loop = true;
        audioPlayer.volume = 0.15; // Keep it soft so it acts as background ambience

        // --- DOM ELEMENTS ---
        const navContainer = document.getElementById('chapter-nav');
        const journalBox = document.getElementById('journal-box');
        const realizationsGrid = document.getElementById('realizations-grid');

        // --- INITIALIZATION ---
        function initApp() {
            renderNavigation();
            renderRealizations();
            loadChapter(0); // Load first chapter
        }

        // --- RENDER FUNCTIONS ---

        function renderNavigation() {
            navContainer.innerHTML = '';
            appData.forEach((chapter, index) => {
                const btn = document.createElement('button');
                btn.className = `w-full text-left p-4 rounded-xl border transition-all duration-200 flex items-center group hover:shadow-md ${index === currentIndex ? 'border-orange-500 bg-orange-50 ring-1 ring-orange-500' : 'border-stone-200 bg-white hover:border-orange-300'}`;
                btn.onclick = () => loadChapter(index);
                
                // Content of button
                btn.innerHTML = `
                    <div class="bg-stone-200 text-stone-600 font-bold w-8 h-8 rounded-full flex items-center justify-center mr-4 group-hover:bg-orange-200 group-hover:text-orange-800 transition-colors shrink-0">
                        ${index + 1}
                    </div>
                    <div>
                        <h4 class="font-bold text-stone-800 group-hover:text-orange-900">${chapter.title}</h4>
                        <div class="text-xs text-stone-500 flex items-center mt-1">
                            <span class="mr-2">📍 ${chapter.route}</span>
                        </div>
                    </div>
                `;
                navContainer.appendChild(btn);
            });
        }

        function renderRealizations() {
            realizationsGrid.innerHTML = '';
            appData.forEach(chapter => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-stone-200 hover:shadow-md transition-shadow";
                card.innerHTML = `
                    <div class="text-orange-600 font-bold text-xs uppercase mb-2">Chapter ${chapter.id} Insight</div>
                    <p class="text-stone-800 font-serif italic mb-3">"${chapter.keyLesson}"</p>
                    <p class="text-xs text-stone-500">${chapter.quote}</p>
                `;
                realizationsGrid.appendChild(card);
            });
        }

        function loadChapter(index) {
            currentIndex = index;
            const data = appData[index];

            // 1. Update Navigation Styling
            renderNavigation(); // Re-render to update active state classes

            // 2. Update Journal Box
            journalBox.innerHTML = `
                <div class="fade-in grow flex flex-col">
                    <div class="absolute top-0 left-0 w-2 h-full bg-orange-600 rounded-l-2xl"></div>
                    
                    <div class="text-orange-700 text-xs font-bold tracking-widest uppercase mb-4">Chapter ${data.id} • ${data.date}</div>
                    
                    <h2 class="text-3xl md:text-4xl font-serif font-bold text-stone-900 mb-6 leading-tight">${data.title}</h2>
                    
                    <div class="flex items-center justify-between text-sm font-sans text-stone-500 mb-8 pb-4 border-b border-stone-200">
                        <span class="flex items-center"><svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg> ${data.route}</span>
                        
                        <button id="audio-toggle-btn" onclick="toggleAudio()" class="flex items-center px-3 py-1 text-xs rounded-full border border-stone-300 hover:bg-stone-100 transition-colors ml-auto">
                            <span class="mr-2">🎵</span> Play Score
                        </button>
                    </div>
                    
                    <div class="prose prose-stone prose-lg max-w-none grow text-stone-700 leading-relaxed mb-6 font-serif text-lg">
                        ${data.fullText}
                    </div>

                    <blockquote class="mt-8 border-l-4 border-orange-300 pl-6 py-2">
                        <p class="text-stone-800 italic font-medium text-xl font-serif">"${data.quote}"</p>
                    </blockquote>
                </div>
            `;
            
            // Re-sync UI button state (the track no longer restarts when clicking chapters)
            updateAudioUI();
        }

        // --- AUDIO FUNCTIONS ---
        function toggleAudio() {
            if (isAudioPlaying) {
                audioPlayer.pause();
                isAudioPlaying = false;
            } else {
                audioPlayer.play().catch(e => {
                    console.log("Audio playback blocked:", e);
                });
                isAudioPlaying = true;
            }
            updateAudioUI();
        }

        function updateAudioUI() {
            const btn = document.getElementById('audio-toggle-btn');
            const globalBtn = document.getElementById('global-audio-btn');
            
            if (isAudioPlaying) {
                if (btn) {
                    btn.innerHTML = '<span class="mr-2">⏸</span> Pause Score';
                    btn.className = 'flex items-center px-3 py-1 text-xs font-bold rounded-full border border-orange-400 bg-orange-100 text-orange-800 transition-colors ml-auto shadow-sm';
                }
                if (globalBtn) {
                    globalBtn.innerHTML = '<span class="mr-2">⏸</span> Pause Soundtrack';
                    globalBtn.className = 'inline-flex items-center px-5 py-2 text-sm font-bold rounded-full border border-orange-400 bg-orange-100 text-orange-800 transition-colors shadow-sm mx-auto';
                }
            } else {
                if (btn) {
                    btn.innerHTML = '<span class="mr-2">🎵</span> Play Score';
                    btn.className = 'flex items-center px-3 py-1 text-xs rounded-full border border-stone-300 bg-white text-stone-600 hover:bg-stone-100 transition-colors ml-auto';
                }
                if (globalBtn) {
                    globalBtn.innerHTML = '<span class="mr-2">🎵</span> Play Soundtrack';
                    globalBtn.className = 'inline-flex items-center px-5 py-2 text-sm rounded-full border border-stone-300 bg-white text-stone-600 hover:bg-stone-100 transition-colors shadow-sm mx-auto';
                }
            }
        }

        // Run Init
        window.addEventListener('DOMContentLoaded', initApp);

    </script>
