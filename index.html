    <script>
        const bookData = [
            { type: 'cover', title: 'Miles of Silence', subtitle: 'A Solo Ride Across India', author: 'By Girish' },
            { type: 'chapter', id: 'author', title: 'About the Author', chapter: 'Prologue', stats: 'Girish', image: 'images/author.jpg', desc: '<p>Girish is a traveler at heart and a software engineer by profession. Born and raised in Mysuru, Karnataka, he has always believed that the best way to understand life is by stepping outside comfort zones and exploring the unknown.</p><p>Over the years, Girish has traveled extensively across India on his motorcycle, covering tens of thousands of kilometers through mountains, forests, deserts, villages, and highways.</p><p>But this journey was different.</p><p>In a 50-day solo ride across India, he traveled thousands of kilometers through the North-East, the Himalayas, remote villages, and unfamiliar roads. Along the way he faced mechanical breakdowns, freezing temperatures, unexpected challenges, and countless beautiful moments with strangers who became friends.</p><p>What started as a ride across the country slowly turned into a journey within.</p><p>Through silence, solitude, and endless roads, Girish discovered something deeper — courage, clarity, humility, and the simple joy of living in the present moment.</p><p>This book is not just a travel story.<br>It is a reflection of the road, the people, the struggles, and the lessons that transformed him along the way.</p>', quote: '"What started as a ride across the country slowly turned into a journey within."' },
            { type: 'chapter', id: 'map', title: 'The Journey at a Glance', chapter: 'Overview', stats: '10,300 KM', image: 'images/map.jpg', desc: '<p><strong>Duration:</strong> 52 Days<br><strong>Mode:</strong> Solo Motorcycle Ride<br><strong>Total Distance:</strong> Thousands of kilometers across India<br><strong>Starting Point:</strong> Mysuru, Karnataka<br><strong>Ending Point:</strong> Mysuru, Karnataka</p><p><strong>Major Regions Covered:</strong><br>South India ↓ Central India ↓ North India ↓ North-East India ↓ Arunachal Pradesh ↓ Return through East & Central India ↓ Back to Karnataka.</p><p><strong>Some Major Places in the Journey:</strong><br>Mysuru, Bangalore, Madhya Pradesh, Varanasi, Bihar, West Bengal, Assam, Nagaland, Manipur, Arunachal Pradesh, Tawang, Kaziranga, Siliguri, Patna, Rewa, Nagpur, Maharashtra, Karnataka, Mysuru (Return).</p><p>This map represents more than locations.<br>It represents memories, people, and moments that shaped the journey.</p>', quote: '"This map represents more than locations. It represents memories, people, and moments that shaped the journey."' },
            { type: 'chapter', id: 'ch1', title: 'Before the Road Began', chapter: 'Ch  1', stats: 'Mysuru', image: 'images/chapter-1.jpg', desc: '<p>Long journeys rarely begin on the road.<br>They begin quietly — inside the mind.</p><p>For months before December, the idea of travelling had been circling somewhere within me. It wasn’t a clear plan. There was no map pinned on the wall, no detailed itinerary, no fixed dates.</p><p>It was just a feeling.</p><p>Sometimes while working, sometimes during quiet evenings, sometimes while looking at my bike parked outside — a thought would appear:<br>What if I just start riding?</p><p>Not for a weekend trip.<br>Not for a few hundred kilometres.<br>But for something longer. Something uncertain.</p><p>Still, the thought remained only a thought. Life continued as usual. Work, routine, responsibilities — everything moved in its normal rhythm.</p><p>Until 6th December.</p><p>That morning I packed my bags.<br>Not with excitement.<br>Not with heroic determination.<br>With confusion.</p><p>There was no grand announcement, no dramatic farewell, no clear promise to myself that I would ride across the country. Even while packing, my mind kept asking simple questions:<br>Why am I doing this?<br>Is this even necessary?<br>Maybe I will ride for a day and come back.</p><p>When I finally started the bike and rode out of Mysuru, it didn’t feel like the beginning of a great adventure.</p><p>It felt temporary.<br>Almost like a test.</p><p>Twenty kilometres later, the first pause happened.<br>I realised something important — I had forgotten my driving licence, RC, and PUC documents.</p><p>I stopped the bike by the roadside.<br>Removed my helmet.<br>And just sat there for a moment.</p><p>The road was quiet.<br>Inside my mind, another thought appeared:<br>Maybe this is a sign.<br>Was I meant to return?<br>Or was I subconsciously looking for an excuse to turn back?</p><p>After a few minutes, I turned the bike around and rode back home. I picked up the documents, repacked everything, and started again.</p><p>But that moment had already revealed something.<br>I wasn’t fully committed yet.</p><p>The road ahead was familiar. My first destination was Davangere, where a friend’s wedding was taking place.<br>Externally, it looked simple — a man riding to attend a marriage.</p><p>Internally, it felt different.<br>It felt like I was standing at the edge of something undefined.</p><p>The questions kept returning while riding.<br>Why am I doing this?<br>What am I looking for?<br>Am I escaping something? Or searching for something?</p><p>By evening, I reached Davangere.<br>Unexpectedly, I met a group of friends there — people I had earlier met during a solo trekking trip. They welcomed me warmly, offered me a place to stay, and took care of me without asking many questions.</p><p>On a day filled with doubt, their warmth felt reassuring.</p><p>The wedding was joyful.<br>Music, laughter, celebration — everything a wedding should be.</p><p>But even while smiling and talking with friends, a quiet voice inside continued whispering:<br>You don’t have to continue.</p><p>That night, after returning close to 1 AM, I lay awake longer than usual.</p><p>Technically, the journey had already begun.<br>But emotionally…<br>I was still at the starting line.</p>', quote: '"Internally, it felt different. It felt like I was standing at the edge of something undefined."' },
            { type: 'chapter', id: 'ch2', title: 'The Safety of the Known', chapter: 'Ch  2', stats: 'Hubli', image: 'images/chapter-2.jpg', desc: '<p>The wedding ended beautifully.<br>There was food, conversation, and the familiar comfort of community. For a moment, life felt simple.</p><p>After meeting another college friend, I made a safe decision.<br>I would ride to Hubli.</p><p>Not because it was part of a master plan.<br>But because a close friend lived there.<br>Somewhere familiar. Somewhere grounding.</p><p>The ride did not feel adventurous. It felt like extending a visit rather than beginning an expedition.</p><p>When I reached Hubli, there was warmth again — home-cooked food, effortless conversations, the kind of silence that doesn’t need explaining.</p><p>And slowly, a thought grew stronger:<br>Why go further?<br>I was comfortable.<br>Why choose uncertainty?</p><p>That night, stopping the journey didn’t feel like failure.<br>It felt practical.</p>', quote: '"I was comfortable. Why choose uncertainty?"' },
            { type: 'chapter', id: 'ch3', title: 'The Pause That Changed Everything', chapter: 'Ch  3', stats: 'Hubli', image: 'images/chapter-3.jpg', desc: '<p>The next day, I did not start.<br>The bike remained parked.<br>The luggage stayed tied.<br>But I stayed.</p><p>It was a Tuesday. I remember that clearly. The day moved slowly.<br>I bought a new SIM card. Ran small errands. Spent time quietly.</p><p>Nothing extraordinary happened.<br>But internally, everything shifted.</p><p>When you stop moving physically, your thoughts move faster.<br>What am I proving?<br>Do I really want this?<br>Or did I romanticise the idea of a long ride?</p><p>For two days in Hubli, I lived in between — not returning, not moving forward.</p><p>I realised something uncomfortable:<br>I was not afraid of distance.<br>I was afraid of commitment.</p><p>If I continued, this would no longer be a “short ride.”<br>If I stopped, I would always wonder — what if?</p><p>Those two days were necessary.<br>They removed excitement.<br>They removed fantasy.<br>What remained was honesty.</p><p>By the end of the second day, something settled inside me.<br>Not motivation.<br>Not adrenaline.<br>Just acceptance.</p><p>No rushing.<br>No forcing.<br>No ego.</p><p>If I feel uncomfortable, I will return.<br>If I feel steady, I will continue.</p><p>That promise changed everything.</p>', quote: '"I was not afraid of distance. I was afraid of commitment."' },
            { type: 'chapter', id: 'ch4', title: 'The Two Days That Looked Like Nothing', chapter: 'Ch  4', stats: 'Hubli', image: 'images/chapter-4.jpg', desc: '<p>Sunday evening, after the wedding, I reached my friend’s house in Hubli.<br>It was supposed to be just a stop.<br>Instead, it became a pause.</p><p>Monday passed.<br>Then Tuesday.<br>I did not start.</p><p>The bike remained parked outside, silent. My luggage stayed packed, untouched. Every morning I woke up with the same thought: Should I continue?</p><p>But I didn’t move.<br>Outwardly, it looked like rest.<br>Internally, it was negotiation.</p><p>There is a special kind of tension when you are not forced to decide. No one was asking me to continue. No one was stopping me either.</p><p>The choice was entirely mine.<br>And that is heavier than pressure.</p><p>I questioned everything.<br>Was this trip necessary?<br>Was I running away from routine?<br>Was I over-romanticising a long ride?</p><p>Comfort is powerful. My friend’s home was warm. The food was familiar. The conversations were easy. Life felt stable.<br>And stability makes uncertainty look foolish.</p><p>But somewhere inside, a small voice refused to quiet down.<br>If you stop now, will you regret it?</p><p>Those two days were not about laziness.<br>They were about honesty.</p><p>The excitement of departure had faded. The fantasy of “52 days” did not exist yet. There was no big dream in my head.<br>Just a simple decision waiting to be made.</p><p>By Tuesday night, something shifted.<br>Not dramatically.<br>But clearly.</p><p>I didn’t feel fear anymore.<br>I felt responsibility toward my own choice.</p>', quote: '"Comfort is powerful... And stability makes uncertainty look foolish."' },
            { type: 'chapter', id: 'ch5', title: 'Wednesday – The Real Departure', chapter: 'Ch  5', stats: 'Vijayapura', image: 'images/chapter-5.jpg', desc: '<p>On Wednesday morning, I woke up early.<br>This time, I did not debate.</p><p>I packed properly. Checked everything twice. There was no forgotten document. No symbolic return.</p><p>When I started from Hubli toward Vijayapura, it felt different from the day I left Mysuru.</p><p>That first departure had doubt.<br>This one had acceptance.</p><p>There was no rush. No dramatic music playing in my head. No feeling of conquering the world.<br>Just calm.</p><p>The early morning air was cold. Highways were empty. The engine sounded steady beneath me.</p><p>For the first time, I wasn’t thinking about whether I would return.<br>I was thinking about what the road might show me.</p><p>Somewhere deep inside, I carried a quiet hope — maybe this journey would take me to Varanasi. That city had touched something inside me during my last visit. I didn’t know why, but it felt like unfinished business.</p><p>But I wasn’t chasing it.<br>I was allowing the road to unfold.</p><p>That ride to Vijayapura was not dramatic.<br>But it was powerful.<br>Because it marked the true beginning.</p><p>The journey did not start when I left Mysuru.<br>It started when I left Hubli.</p><p>That Wednesday morning was not just a continuation.<br>It was a commitment.</p>', quote: '"The journey began when I stopped doubting myself."' },
            { type: 'chapter', id: 'ch6', title: 'Flow Without Pressure', chapter: 'Ch  6', stats: 'Latur', image: 'images/chapter-6.jpg', desc: '<p>The next morning, I woke up at 4:30 AM.<br>There was no resistance in getting ready. Packing felt natural. Starting early felt right.</p><p>The highway toward Latur was smooth and peaceful. Cold wind. Empty stretches. Sunrise unfolding slowly behind me.</p><p>I covered nearly 350 kilometres before 11 AM.<br>Earlier in the journey, distance felt intimidating.<br>Now, it felt effortless.</p><p>When I reached Latur, I found a decent dormitory — nothing luxurious, nothing uncomfortable. Just enough.</p><p>After settling in, I stepped out to buy small essentials — oats for breakfast, a pair of earphones, little practical things that make long travel sustainable.<br>These purchases felt symbolic.</p><p>This was no longer spontaneous.<br>It was lifestyle.</p><p>Afternoon work. Calls. Emails. Focus.<br>And in the evening, another calm walk through the city.</p><p>Latur was quieter than I expected. The streets carried a simplicity that felt grounding.</p><p>As I walked, I realised something important:<br>The question “Should I stop?” had completely disappeared.</p><p>The journey wasn’t heavy anymore.<br>It had blended into me.</p>', quote: '"The journey wasn’t heavy anymore. It had blended into me."' },
            { type: 'chapter', id: 'ch7', title: 'A Stranger in Yavatmal', chapter: 'Ch  7', stats: 'Yavatmal', image: 'images/chapter-7.jpg', desc: '<p>The following morning, I left early again — this time toward Yavatmal.<br>The ride was steady, uneventful, peaceful.</p><p>But reaching Yavatmal tested my patience slightly.<br>Finding a budget stay was not easy.<br>I searched multiple places. Asked around. Checked prices.</p><p>For a brief moment, irritation tried to surface.<br>But this time, I didn’t overreact.<br>Eventually, I found a simple room.<br>Enough.</p><p>After settling in, something unexpected happened.<br>A man approached me after noticing my Karnataka number plate.<br>He began speaking fluent Kannada.<br>In Maharashtra.</p><p>I was surprised.<br>He was originally from Gujarat, yet he spoke Kannada effortlessly. That small connection felt comforting — like finding familiarity in an unfamiliar place.</p><p>We spoke for some time. Shared numbers. Laughed about how language connects strangers.</p><p>It was a small moment.<br>But on a long solo journey, small human interactions carry weight.</p><p>That afternoon, I worked. Washed my clothes. Organised my luggage.<br>In the evening, I went for a quiet walk.</p><p>Yavatmal was calm. Almost meditative.<br>For three days now, there had been no dramatic incidents.<br>No emotional breakdowns.<br>No intense highs.</p><p>Just balance.<br>Work and travel.<br>Movement and stillness.<br>Solitude and occasional connection.</p><p>And I understood something:<br>Not every phase of transformation is loud.<br>Some phases are about building endurance.</p><p>These were not adventure days.<br>They were foundation days.</p>', quote: '"Not every phase of transformation is loud. Some phases are about building endurance."' },
            { type: 'chapter', id: 'ch8', title: 'A Freedom Ride to Jabalpur', chapter: 'Ch  8', stats: 'Jabalpur', image: 'images/chapter-8.jpg', desc: '<p>13 December – Yavatmal to Jabalpur</p><p>I woke up at 6 AM.<br>The room was quiet. My bike stood outside, slightly dusty from the previous days, but steady. Every morning before starting, I would look at him for a second — not as metal, but as a companion.</p><p>I packed slowly.<br>Checked the luggage straps.<br>Touched the tank lightly.<br>And we rolled out.</p><p>That day was a freedom ride.<br>No rush. No pressure to reach at a fixed time. Just open highway and a calm mind. As we crossed into Madhya Pradesh, the roads felt smoother, and so did my thoughts.</p><p>I took multiple breaks.<br>Sometimes to stretch.<br>Sometimes to sip tea.<br>Sometimes just to look back at the bike standing under the sun — as if we were both adjusting to the rhythm of long travel.</p><p>Breakfast somewhere on the way.<br>Lunch at a roadside dhaba near Jabalpur around 1 PM. The owner was friendly, curious about the number plate, asking how far I had come.</p><p>By 2:30 PM, we reached Jabalpur.<br>I checked into a dormitory. Parked him carefully. Covered him lightly. Bought fresh engine oil in the evening — a small gesture of respect.</p><p>He had carried me across states without complaint.<br>Maintenance wasn’t responsibility.<br>It was gratitude.</p><p>The evening was calm. A slow city walk. Local food. Mild winter air.</p><p>That night, I slept knowing something had shifted.<br>The ride wasn’t heavy anymore.<br>It had become partnership.</p>', quote: '"Maintenance wasn’t responsibility. It was gratitude."' },
            { type: 'chapter', id: 'ch9', title: 'Warmth in Prayagraj', chapter: 'Ch  9', stats: 'Prayagraj', image: 'images/chapter-9.jpg', desc: '<p>14 December – Jabalpur to Prayagraj</p><p>The morning began slowly.<br>Before leaving, I had a conversation with a Kashmiri traveler in the hostel. Within minutes, we connected deeply — the kind of connection that only happens when two travelers share road stories.</p><p>When I packed and came downstairs, the hostel staff wished me safe travels.<br>It’s strange how strangers start caring about your journey.</p><p>We left around 8 AM.<br>The road to Prayagraj felt steady. Breakfast near Rewa. Long stretches of highway. Cold wind brushing against the visor.</p><p>By 3:40 PM, we reached Prayagraj.<br>As I entered my friend’s house compound, I felt something soften.</p><p>His father welcomed me warmly.<br>Not formally. Not politely.<br>Genuinely.<br>There is a difference.</p><p>He checked if I was comfortable, asked about the ride, looked at the bike with curiosity and respect. His mother ensured I ate well.</p><p>Care came naturally from them.</p><p>That evening, I went out to explore the city.<br>The winter cold was sharp. I bought a few warm clothes. Walked through parks. Let the silence of Prayagraj settle inside me.</p><p>When I returned home, dinner was shared.<br>Conversations flowed.<br>I wasn’t a traveler passing through.<br>I was treated like family.</p><p>And my bike rested outside quietly — as if he, too, had found temporary shelter.</p>', quote: '"I wasn’t a traveler passing through. I was treated like family."' },
            { type: 'chapter', id: 'ch10', title: 'The Sangam Morning', chapter: 'Ch  10', stats: 'Prayagraj', image: 'images/chapter-10.jpg', desc: '<p>15 December – Prayagraj</p><p>I woke up early.<br>The cold was intense.</p><p>My friend’s cousin took me to the Sangam. The air was misty, sacred, silent.</p><p>Before stepping into the water, I looked back once — at my bike parked at a distance.<br>He had brought me here.<br>From Mysuru.<br>Through doubt.<br>Through hesitation.<br>Through uncertainty.</p><p>Now he stood quietly, as I stepped into something bigger than travel.</p><p>The water was freezing.<br>At least it should have been.<br>But when I immersed myself, I didn’t feel the cold in the way I expected.</p><p>Instead, I felt presence.<br>Complete awareness.<br>No overthinking.<br>No future plans.<br>No kilometre calculations.</p><p>Just breath.<br>Just water.<br>Just existence.</p><p>It shocked me.<br>How could something so cold feel so alive?</p><p>After the dip, we visited a temple. Walked through old streets. Ate authentic local food — dahi jalebi, kachori — flavours deeply rooted in the city’s culture.</p><p>Back home, I worked for a while.<br>In the evening, knowing I would leave the next day, my friend’s father took me on a city ride.<br>He showed me the old city, the local markets, the bazaars — not as tourist attractions, but as memories.</p><p>He wanted me to see his Prayagraj.<br>That gesture stayed with me.</p><p>When I returned and parked my bike for the night, I felt gratitude.<br>For the road.<br>For the people.<br>For the machine that carried me.</p><p>This journey was no longer about reaching Varanasi someday.<br>It was about living each city fully.</p><p>And that night, as I lay down to sleep, I realised:<br>He was not just taking me places.<br>He was witnessing me change.</p>', quote: '"No overthinking. No future plans. No kilometre calculations. Just breath. Just water. Just existence."' },
            { type: 'chapter', id: 'ch11', title: 'Through Fog to Ayodhya', chapter: 'Ch  11', stats: 'Ayodhya', image: 'images/chapter-11.jpg', desc: '<p>16 December – Prayagraj to Ayodhya</p><p>I woke up around 7 AM.<br>My friend’s father and mother had already made coffee. The warmth in that house was difficult to leave. Before starting, I took their blessings.</p><p>Outside, the world was white.<br>Dense fog.<br>Sharp cold.</p><p>Even though Ayodhya was not far, the visibility was poor. The road looked shorter on the map than it felt in reality.</p><p>I started slightly late.<br>The bike moved cautiously through the fog. Headlight cutting through mist. Every few kilometres, I had to slow down. Sometimes almost stop.</p><p>The cold air entered through my gloves. My visor gathered moisture. Trucks appeared suddenly and disappeared just as fast.</p><p>It wasn’t a difficult ride in distance.<br>It was a difficult ride in patience.</p><p>By 11:45 AM, I reached Ayodhya.<br>But the first small challenge waited there.</p><p>The stay I had booked was full.<br>For a moment, irritation tried to rise. But the owner quickly arranged another property nearby — closer to the temple.</p><p>And strangely, it turned out better.<br>Sometimes what doesn’t work is redirection.</p><p>The new stay was clean. The owner was extremely polite. It was near the temple — a blessing in disguise.</p><p>After checking in, I began my work. Balance continued.<br>In the afternoon, I stepped out for lunch and bought new clothes — I had run out. Walking through Ayodhya felt different from other cities.</p><p>There was devotion in the air.<br>Even the silence felt sacred.</p><p>In the evening, I took another walk. The lights near the temple glowed softly in the winter fog.</p><p>When I parked my bike that night, I looked at it differently.<br>It had brought me here.<br>Not just to a city.<br>But to something deeper.</p>', quote: '"It wasn’t a difficult ride in distance. It was a difficult ride in patience."' },
            { type: 'chapter', id: 'ch12', title: 'Faith in Stone and Silence', chapter: 'Ch  12', stats: 'Ayodhya', image: 'images/chapter-12.jpg', desc: '<p>The next morning in Ayodhya, I woke up early.<br>The air was cold but clear. I walked toward the Ram Mandir around 6:30 AM.</p><p>Security was tight. Discipline everywhere. Devotion in every face.<br>And when I entered…</p><p>For a moment, it didn’t feel real.<br>The structure, the scale, the atmosphere — it felt cinematic. Like stepping into a historical epic. Yet it was alive, breathing, sacred.</p><p>The energy inside the temple was powerful but controlled. No chaos. No shouting. Just focused devotion.</p><p>When I stood there for darshan, I felt something quiet inside me align.</p><p>Afterward, I visited Hanuman Garhi temple. The climb, the chants, the view — everything carried depth. Ayodhya wasn’t just a city. It felt layered with time.</p><p>Later, I had breakfast at Bengaluru Café — warm food in cold weather. A simple meal that felt grounding after the intensity of the temple.</p><p>Then came the queue for the Mangala Aarti pass.<br>That’s where I met him.<br>A sadhu from Ujjain.</p><p>We began talking casually. Within minutes, the conversation turned deep.<br>He had lived on the road. His knowledge wasn’t theoretical — it was experiential. He spoke about solo travel as a form of discipline. About fear not being the enemy, but a teacher. About how journeys strip ego quietly.</p><p>His wisdom felt ocean-like — calm but vast.<br>Standing in that queue, sharing stories with a wandering monk, I felt humbled.</p><p>We were both travelers.<br>Different directions. Same road.</p><p>After completing KYC verification and receiving the pass for the 3 AM Mangala Aarti, I walked back slowly through the streets.</p><p>The rest of the day was peaceful.<br>I worked for a while. Took long walks through Ayodhya. Observed people. Sat with tea. Watched the evening lights near the temple glow through winter mist.</p><p>That night, I felt anticipation.<br>Tomorrow would be sacred.</p>', quote: '"About fear not being the enemy, but a teacher. About how journeys strip ego quietly."' },
            { type: 'chapter', id: 'ch13', title: 'The Night of Fire and the Road to Kashi', chapter: 'Ch  13', stats: 'Varanasi', image: 'images/chapter-13.jpg', desc: '<p>I woke up at 2:30 AM.<br>Cold water bath. Layers of clothing. Silent streets.</p><p>The Mangala Aarti at 3 AM was intimate. Limited people. Focused chants. Lamps moving rhythmically in the darkness.</p><p>It didn’t feel like an event.<br>It felt like participation.</p><p>By 4:30 AM, I returned to my stay. Rested briefly. And by 7 AM, I started toward Varanasi.<br>Only 130 kilometres.<br>But fog made it feel longer.</p><p>Till Sultanpur, the road was slippery. Visibility low. Every kilometre demanded alertness.</p><p>Around 70 kilometres before Varanasi, I made a mistake.<br>I stopped on the roadside to send a work email.</p><p>Within minutes, a few men arrived in a car.<br>At first, casual questions.<br>“Where are you from?”<br>“How much does the bike cost?”</p><p>Then one of them picked up my helmet.<br>Another suggested I sit in their car while someone else “checked” the bike.</p><p>The tone changed.<br>It wasn’t loud.<br>But it wasn’t comfortable.</p><p>In that moment, my instincts activated.<br>Thankfully, another rider approached and sensed something was off. His presence shifted the atmosphere.</p><p>He calmly told me later, “Never stop like this in isolated stretches. If you need to work, stop at a dhaba or petrol bunk.”</p><p>I nodded.<br>That moment was unsettling.<br>The road had just reminded me — awareness must never drop.</p><p>I continued carefully and reached Varanasi by afternoon.</p><p>Then began the search.<br>Finding a stay with safe parking was extremely difficult.<br>Narrow gallis. Confusing lanes. Parking chaos near the ghats. Everywhere I asked, either no parking or unsafe open space.</p><p>I refused to compromise.<br>He had carried me safely this far.<br>I would not leave him vulnerable.</p><p>After searching through multiple lanes, I found a stay near the ghats with parking — but expensive.<br>The parking charge was almost equal to my room rent.</p><p>I paid.<br>Without regret.<br>Because safety is not an expense.<br>It is respect.</p><p>After settling in, I walked toward the ghats.<br>Visited Annapoorna Temple.<br>Then toward Kashi Vishwanath.<br>And then the evening unfolded.</p><p>The Ganga Aarti.<br>No photograph can explain it.<br>No video captures it fully.</p><p>The river was dark, endless.<br>Priests stood in synchronized formation.</p><p>The first bell rang.<br>Then chants.<br>Then flames.</p><p>Large lamps moving in perfect rhythm.<br>Smoke rising like prayer.<br>The fire reflected in the water.<br>The air vibrated.</p><p>I stood there — speechless.<br>Not emotional in a dramatic way.<br>But overwhelmed.</p><p>It felt ancient.<br>Timeless.<br>Like centuries of devotion condensed into one evening.</p><p>People were singing softly. Some were playing instruments. Boats floated slowly, carrying silent observers.</p><p>I didn’t record much.<br>I didn’t want to.<br>Some moments are meant to live inside memory.</p><p>I sat by the river till almost 11 PM.<br>Watching.<br>Listening.<br>Breathing.</p><p>That evening became one of those rare memories I know I will carry my whole life.</p><p>When I finally walked back at 11:30 PM and saw my bike parked safely, I smiled.</p><p>From doubt in Mysuru…<br>To the fire of Kashi.</p><p>The journey had changed shape.<br>And so had I.</p>', quote: '"From doubt in Mysuru… To the fire of Kashi. The journey had changed shape. And so had I."' },
            { type: 'chapter', id: 'ch14', title: 'Living Kashi', chapter: 'Ch  14', stats: 'Varanasi', image: 'images/chapter-14.jpg', desc: '<p>I woke up at 6:30 AM.<br>The city was still waking up.</p><p>Without rushing, I walked toward the ghats. The air was crisp. The river calm. Morning light just beginning to touch the surface of the Ganga.</p><p>I took a small boat ride.<br>It was surprisingly inexpensive — but priceless in experience.</p><p>Sitting on that wooden boat, watching the ghats from the water, I felt something shift again. From the river, Kashi looks different.</p><p>More ancient.<br>More layered.<br>More eternal.</p><p>The weather was chill. The water moved gently. People were bathing, praying, sitting quietly.</p><p>After spending time on the riverbank, I returned around 8 AM, freshened up, and decided to explore further.</p><p>I went toward BHU — Banaras Hindu University.<br>Since my bike was parked inside the narrow lanes near the ghats, I had to walk a few kilometres before finding transport. Eventually, I took a bike taxi.</p><p>The campus felt spacious, calm — a contrast to the intensity of the ghats.</p><p>I visited the New Kashi Vishwanath Temple inside BHU. The architecture was clean and serene. Devotion there felt quieter, less crowded, more reflective.</p><p>By afternoon, I returned, had breakfast, and resumed work around 12:30 PM.<br>Even in Kashi, work continued.</p><p>But something interesting happened later.<br>Around 2:30 PM, I saw people distributing food. Without planning, I joined. I accepted prasad and walked along the ghats — nearly 2 to 4 kilometres.</p><p>That walk felt grounding.<br>No rush.<br>Just steps.<br>River.<br>People.<br>Life unfolding.</p><p>I returned around 5:30 PM, rested briefly, and stepped out again.</p><p>The Ganga Aarti pulled me back.<br>Even though I had seen it the previous evening, I wanted to experience it again.<br>It was just 200 meters from my stay.</p><p>This time, I stood differently.<br>Not overwhelmed.<br>Not shocked.<br>But aware.</p><p>The flames rose again.<br>The chants echoed.<br>The bells rang.</p><p>And I understood why people return again and again.</p><p>Afterward, I went to Kashi Vishwanath Temple once more.<br>Inside, I met a few people — strangers who quickly became companions in conversation. Among them was a girl who stood quietly for nearly 45 minutes, just observing the rituals. We spoke briefly about faith, about presence, about how some places silence you without effort.</p><p>Around 9 PM, I stepped out.<br>Went to Annapoorna Temple for dinner.<br>Simple food. Sacred space.</p><p>Then something unexpected — near the temple area, in the narrow, chaotic lanes, I met a group of Kannada-speaking men from North Karnataka.<br>In Kashi.<br>Thousands of kilometres from home.</p><p>We spoke like old friends.<br>They were proud to see someone riding solo from Karnataka. Their energy felt familiar. Encouraging.<br>We took a few photos. Laughed.</p><p>That random encounter felt comforting.</p><p>Later, I grabbed tea and walked back toward the ghats.<br>Some young men were playing guitar, singing softly near the river. I sat with them. No introduction needed.</p><p>Music under the open sky.<br>Ganga flowing beside.<br>Night air cool.</p><p>Time dissolved.<br>I stayed there till around 11 PM.<br>Even after that, I took a long walk alone.</p><p>By the time I returned to my stay, it was nearly 1 AM.</p><p>That day wasn’t about riding.<br>It wasn’t about distance.<br>It was about belonging.</p><p>Kashi didn’t feel like a destination anymore.<br>It felt like a conversation.</p><p>And for the first time since the journey began, I felt fully present.<br>Not chasing the next state.<br>Not thinking about the next kilometre.<br>Just living.</p>', quote: '"Kashi didn’t feel like a destination anymore. It felt like a conversation."' },
            { type: 'chapter', id: 'ch15', title: 'Leaving Kashi, Arriving at Silence', chapter: 'Ch  15', stats: 'Bodh Gaya', image: 'images/chapter-15.jpg', desc: '<p>I woke up around 6:30 AM in Kashi.<br>There was no urgency.<br>But there was resistance.</p><p>I’ve left many cities without looking back. But that morning felt different. From 6:45 to around 7:30, I walked along the ghats one last time.</p><p>The river was calm.<br>Morning light was soft.<br>Fewer voices. More truth.</p><p>I didn’t want to leave.<br>Not because I hadn’t seen enough.<br>But because I had felt enough.</p><p>Kashi wasn’t just a place I visited.<br>It felt like a place that had read me.</p><p>For a few minutes, I stood there thinking — stay one more day.</p><p>I called a friend.<br>Bihar came into the conversation. Bodh Gaya appeared in my mind like a quiet whisper.</p><p>And just like that, the road called again.<br>Still, leaving felt like pulling myself away from something unfinished.</p><p>At 8:30 AM, everything was packed.<br>I stood beside my bike in that narrow lane one last time.<br>He had rested safely there.<br>I touched the tank lightly.<br>We rolled out around 9 AM.</p><p>The first stretch was silent. Not external silence — internal.<br>After a tea break, I opened the map.<br>Bodh Gaya.</p><p>The decision felt intuitive.<br>I turned.</p><p>By afternoon, I reached Bodh Gaya.<br>Immediately, the atmosphere felt different from Kashi.</p><p>Kashi vibrates.<br>Bodh Gaya breathes.</p><p>The town moved slower. Monks walked in quiet rhythm. Foreign travelers sat cross-legged beneath trees.<br>I found a peaceful stay — clean, minimal, calm.</p><p>The owner welcomed me warmly.<br>We began talking casually — about where I came from, about the ride, about covering 10,000+ kilometres.</p><p>As I shared my journey, something changed in his expression.<br>He wasn’t just listening politely.<br>He was inspired.</p><p>Later that evening, our conversation deepened.<br>He told me about his own journey.</p><p>He had once been a businessman. Well connected. Successful. Involved in larger ventures.<br>Life shifted.<br>Loss happened.<br>And now, he was running a small stay business.</p><p>But there was no bitterness in him.<br>Only rebuilding.</p><p>When he heard about my ride, he began discussing ideas — riding services, travel collaborations, experiential tourism models, project concepts.</p><p>We discussed possibilities.<br>Not fantasy talk.<br>Real ideas.<br>Structured thoughts.</p><p>He showed me documents. Spoke about networks he still had. Explained how he wanted to rebuild, not just survive.</p><p>We sat talking till almost 11:30 PM.<br>Two men in transition.<br>One rebuilding externally.<br>One rebuilding internally.</p><p>His resilience moved me.<br>Success had once been his identity.<br>Now humility was.</p><p>And yet, his eyes still carried ambition — but grounded.</p><p>Before sleeping, I realised something quietly powerful:<br>The road connects you to places.<br>But it also connects you to people who are rewriting themselves.</p><h4 class="font-bold text-xl mt-6 mb-2">The Temples of Stillness</h4><p>After freshening up, I stepped out toward the Mahabodhi Temple complex.<br>If Kashi was intensity, Bodh Gaya was meditation.</p><p>The Mahabodhi Temple stood tall yet calm.<br>Monks sat in silence.<br>Prayer flags moved lightly.<br>No shouting.<br>No rush.</p><p>I visited the Thai Temple — golden and graceful.<br>The Japanese Temple — minimal, disciplined.<br>The Chinese Temple — detailed and serene.</p><p>Each temple reflected silence in a different language.</p><p>Later, I walked toward the museum.<br>It was closed.</p><p>I stood there for a moment, slightly disappointed.<br>A staff member noticed me.<br>We spoke briefly.<br>He looked at my riding jacket, asked where I came from.</p><p>When I told him, something softened.<br>He quietly opened the gate and allowed me inside for a short visit.</p><p>No drama.<br>No expectation.<br>Just kindness.</p><p>That small gesture touched me deeply.</p><p>Inside, ancient statues stood in stillness.<br>Centuries of patience carved into stone.</p><p>I walked slowly.<br>Absorbing.</p><p>That evening, Bodh Gaya didn’t overwhelm me.<br>It steadied me.</p><p>Dinner was simple.<br>Conversations deep.<br>Silence comfortable.</p><p>Around midnight, lying in that small peaceful room, I realised:<br>Ayodhya gave devotion.<br>Kashi gave intensity.<br>Bodh Gaya gave balance.</p><p>And maybe that balance was necessary before the road tested me again.</p>', quote: '"Ayodhya gave devotion. Kashi gave intensity. Bodh Gaya gave balance."' },
            { type: 'chapter', id: 'ch16', title: 'Six Hundred Kilometres of Trust', chapter: 'Ch  16', stats: 'Siliguri', image: 'images/chapter-16.jpg', desc: '<p>Bodh Gaya to Siliguri</p><p>I woke up at 5:00 AM.<br>It was still dark.</p><p>Bodh Gaya was silent — monks not yet out, streets empty, air slightly cold. I packed quietly. The stay owner came out to check if I was leaving safely. He asked me to call once I reached.</p><p>There was something comforting about that.</p><p>Before starting, I stood beside my bike for a moment.<br>600+ kilometres.<br>One stretch.<br>No major sightseeing.<br>Just road.</p><p>I tightened the luggage straps carefully. Checked the chain. Looked at the tyres. Tapped the tank lightly.</p><p>This wasn’t just a machine.<br>He was about to carry me across an entire state line and beyond in a single day.</p><p>We started before sunrise.<br>The first light broke slowly as we moved.</p><p>The roads around Rajgir were surprisingly good. I decided to take a shortcut that would save around 50–60 kilometres. It felt like a small strategic victory — something I would not have attempted in the early days when doubt controlled me.</p><p>Now, I trusted my navigation.<br>And I trusted him.</p><p>Somewhere mid-morning, I stopped for breakfast.<br>Simple food.<br>Stretching my legs.<br>Watching trucks move slowly past.</p><p>There’s something meditative about long-distance riding.<br>Helmet on.<br>Music low.<br>Engine humming steadily.</p><p>The world narrows to throttle control and road awareness.</p><p>After breakfast, the landscape changed slightly — forest stretches began appearing. Long quiet patches with barely any restaurants or petrol pumps.</p><p>For a while, there were no proper stops.<br>Only a small dhaba where I had lunch.<br>Simple rice and curry.<br>Nothing fancy.<br>But fuel — for both of us.</p><p>When you ride 600 kilometres in a day, conversation disappears.<br>Thoughts become rhythm.<br>You stop analysing.<br>You just move.</p><p>By around 3 PM, I entered West Bengal.<br>That moment felt significant.<br>Not dramatic.<br>But symbolic.</p><p>Last time I had come through the Siliguri corridor, it had felt different. Back then, I was travelling with a different emotional state. This time, I was alone — but not lonely.</p><p>The Siliguri stretch felt familiar, almost nostalgic.<br>The road was steady.<br>Traffic slightly heavier.<br>But my bike moved confidently.</p><p>No complaints.<br>No vibration anxiety.<br>Just steady hum.</p><p>And somewhere inside, I felt gratitude.<br>Because 600 kilometres is not easy on a machine.<br>Nor on a rider.</p><p>Around 6 PM, I reached Siliguri.<br>The city lights were already on.</p><p>I parked him carefully.<br>Turned off the engine.<br>Silence.</p><p>That silence after a long ride feels earned.</p><p>A friend had come for an exam in the city, and we met.<br>We stepped out for dinner.<br>Simple food.<br>Easy conversation.</p><p>I later went to a supermarket to buy essentials for the next stretch.<br>Standing in that aisle, holding random supplies, I realised how normal this life had started to feel.</p><p>Ride.<br>Work.<br>Eat.<br>Move.</p><p>Back at the stay, I looked once more at my bike parked outside.<br>Dust-covered.<br>Road-worn.<br>Faithful.</p><p>600+ kilometres in a single day.<br>No breakdown.<br>No complaint.<br>No hesitation.</p><p>That night, around 10 PM, as I lay down to sleep, I felt something very clear:<br>We had crossed from exploration into endurance.</p><p>The journey was no longer just about places.<br>It was about consistency.<br>And consistency builds character.</p>', quote: '"The journey was no longer just about places. It was about consistency. And consistency builds character."' },
            { type: 'chapter', id: 'ch17', title: 'Fog, a Grandmother, and the Road to Meghalaya', chapter: 'Ch  17', stats: 'Shillong', image: 'images/chapter-17.jpg', desc: '<p>Siliguri to Shillong – 600+ Kilometres</p><p>I woke up at 5:15 AM.<br>It was still dark in Siliguri.</p><p>The air carried that early-morning dampness. I packed slowly, methodically. Checked the luggage straps again. Cleaned and lubricated the chain carefully. On a 600-kilometre day, small negligence becomes big regret.</p><p>A young boy staying in the same room helped me carry my luggage downstairs. He was kind, smiling without reason. We exchanged numbers before I left. Travel has a strange way of making temporary connections feel genuine.</p><p>At 5:45 AM, I started.<br>Within 30 minutes, everything changed.</p><p>Fog.<br>Not light mist.<br>Dense, thick, suffocating fog.</p><p>Visibility dropped to barely 3–4 feet.<br>I couldn’t see the road clearly. Headlight beams bounced back at me. Trucks appeared like shadows and disappeared just as fast.</p><p>I had to slow down to 20–30 km/h.<br>My gloves were cold. My visor wet. My body started shivering.</p><p>After around 50–60 kilometres of riding like that, I couldn’t continue safely.<br>I spotted a tiny tea stall on the side.<br>It was run by an elderly grandmother.</p><p>I parked carefully. Removed my helmet. My hands were shaking.<br>She looked at me once — and immediately understood.</p><p>“Cold?” she asked gently.<br>I nodded.</p><p>She gave me hot coffee and a packet of biscuits. I sat there for almost 30 minutes, just warming up.</p><p>That tea stall wasn’t fancy. It wasn’t even fully covered.<br>But in that moment, it felt like protection.</p><p>When I went to pay, she refused.<br>I insisted.<br>She refused again.</p><p>She put chocolates in my hand and said softly,<br>“You are like my son. Don’t pay.”</p><p>For a second, I didn’t know what to say.<br>I had stopped as a customer.<br>I was leaving as someone she cared about.</p><p>Standing there, a stranger on a long ride, shivering in fog, being treated like family by a grandmother I had never met before — it humbled me.</p><p>That moment taught me something the road keeps repeating:<br>Kindness travels faster than distance.</p><p>I left that place with warmth — not just in my body, but in my heart.</p><h4 class="font-bold text-xl mt-6 mb-2">Into Assam</h4><p>After the fog slowly cleared, I resumed.<br>The road began opening up.</p><p>Every kilometre, I kept mentally checking on my bike.<br>How is the engine sound?<br>Is the throttle response smooth?<br>Any unusual vibration?</p><p>But he was flawless.<br>Even when the road patches turned rough, even when traffic slowed, even when I pushed him steadily for hours — he carried me without complaint.</p><p>Somewhere around another 150–200 kilometres later, I entered Assam.<br>The landscape subtly changed.<br>Green stretches.<br>Wider skies.<br>Different energy.</p><p>But soon came a traffic jam — nearly 10–15 kilometres of it.<br>For about 30 minutes, I crawled forward slowly, sometimes edging carefully through gaps.</p><p>Even in the jam, he behaved calmly.<br>No overheating.<br>No struggle.<br>Just steady presence.</p><p>Around 11 AM, I stopped for breakfast.<br>While waiting for food, the stall owner started speaking to me about riding. Then he casually mentioned his YouTube channel. He showed me his work — he was already earning from it.</p><p>I was surprised.<br>The road keeps showing new possibilities.<br>We exchanged numbers.<br>And I continued.</p><h4 class="font-bold text-xl mt-6 mb-2">Toward Guwahati and the Climb to Shillong</h4><p>By around 2:30–3 PM, I reached Guwahati.<br>The city felt energetic. I rode through it briefly — noticing how the culture had subtly shifted.</p><p>At 4 PM, I started toward Shillong.<br>The road changed again.<br>Smooth.<br>Curvy.<br>Elevated.</p><p>But as evening approached, darkness came faster than expected.<br>By 4:30–5 PM, it was already getting dark.<br>The road was good but narrow.<br>I reduced speed.<br>Rode carefully.<br>Shared my live location with my friend in Shillong.</p><p>Every turn felt new.<br>Every climb felt symbolic.</p><p>After nearly 600+ kilometres in one day — fog, jam, cold, highways, hills — we were still moving strong.</p><p>There were moments when I mentally thanked my bike.<br>“Good job,” I would whisper inside my helmet.<br>Every stretch.<br>Every vibration.<br>Every uphill pull.</p><p>He was not just transporting me.<br>He was proving something.</p><p>By around 7 PM, I finally reached Shillong.<br>And there he was — my friend.<br>After 7–8 years.<br>He looked almost the same.</p><p>Time had moved, but friendship hadn’t.</p><p>His family welcomed me warmly. Everything was arranged. I took a bath, refreshed myself, and we went out for dinner.<br>Shillong felt cool. Calm. Different from the plains.</p><p>We spoke for hours — about life, careers, memories, change.<br>After nearly 8 years, we had stories to exchange.</p><p>We talked till almost midnight.</p><p>When I finally lay down to sleep, I realised:<br>Today was not just a long ride.<br>It was endurance.<br>It was faith.<br>It was kindness.<br>It was gratitude.</p><p>And somewhere inside, I felt deeply thankful.<br>For the road.<br>For strangers.<br>For old friends.<br>And for the machine that never once gave up.</p>', quote: '"Kindness travels faster than distance."' },
            { type: 'chapter', id: 'ch18', title: 'When the Rider Became the Guest', chapter: 'Ch  18', stats: 'Shillong & Cherrapunji', image: 'images/chapter-18.jpg', desc: '<p>Shillong & Cherrapunji</p><p>After two back-to-back 600+ kilometre days, Day 18 felt different from the moment I opened my eyes.</p><p>I woke up around 6 or 6:30 AM. For the first time in many days, there was no urgency in my body. No need to check the chain. No tightening of luggage straps. No mental calculation of distance and fuel stops.</p><p>My bike rested outside my friend’s house.<br>And strangely, so did I.</p><p>We drove toward a sunrise point near Shillong — high above the city where clouds float beneath you like a moving ocean. As we stood there, the sky slowly shifted from deep blue to soft orange. The clouds rolled below the cliffs, rising and falling like breath.</p><p>Shillong mornings feel different from the plains.<br>Colder.<br>Cleaner.<br>More intimate.</p><p>We stood silently for a while. No rush for photos. No need to prove we were there. Just presence.</p><p>On the drive back, I realised something simple — for the first time since I started this journey, I wasn’t responsible for navigation. I wasn’t balancing throttle and clutch. I wasn’t scanning the road constantly.</p><p>I was just sitting.<br>Looking.<br>Absorbing.</p><p>Back home, breakfast was ready. His father spoke warmly, asking about my ride with genuine interest. His mother ensured I ate properly, almost insisting. His sister interacted naturally, without formality.</p><p>There was no “guest treatment.”<br>There was belonging.</p><p>We had already decided — for the next two days, my bike would rest. Meghalaya evenings turn extremely cold and foggy, and riding narrow hill roads after sunset would not be wise.</p><p>For the first time in this entire journey, I consciously allowed him to rest.<br>After carrying me across states, fog, traffic, highways, and 600-kilometre endurance stretches — he deserved it.</p><p>And maybe I did too.</p><p>We took my friend’s car and headed toward Cherrapunji (Sohra).<br>The drive itself felt cinematic. Green cliffs opened into deep valleys. Clouds brushed past the road. The hills of Meghalaya have a softness to them — not harsh like high mountains, but endless and rolling.</p><p>We visited Nohkalikai Falls — the drop was massive, almost unreal. Water plunged from a towering height into a turquoise pool far below. Standing there, you feel both small and deeply alive.</p><p>We drove toward viewpoints where mist moved through the valleys like slow smoke.<br>Then toward the Living Root Bridges — nature shaped over decades by patience and trust. Roots intertwined into pathways. Human effort and natural growth working together quietly.</p><p>Later, we went toward Laitlum Canyon.<br>That place was something else.<br>Wide open valleys stretched endlessly. Layers of hills faded into pale blue distance. Wind moved strongly across the cliffs.</p><p>Standing there, I felt something similar to what I felt in Kashi — but calmer.<br>Kashi was intensity.<br>Laitlum was expansion.</p><p>In Kashi, you feel watched by centuries.<br>In Laitlum, you feel dissolved into the horizon.</p><p>We didn’t rush through places. Lunch was at a local restaurant — simple Khasi food, warm and comforting in the cold air.</p><p>By around 5 or 5:30 PM, darkness began arriving quickly. In Meghalaya, evening doesn’t slowly settle — it drops.<br>We returned toward Shillong before fog thickened.</p><p>Back home, warmth continued.<br>His father shared stories about the region, about life there. His sister spoke comfortably. Laughter came easily.</p><p>Dinner was shared at home.<br>We spoke late into the night — about life, careers, changes, and the 7–8 years that had passed since we last met.</p><p>Time had changed many things.<br>But friendship hadn’t.</p><p>When I finally lay down to sleep, I realised something quietly powerful:<br>This journey wasn’t only about solitude and self-discovery.<br>It was also about reconnection.</p><p>With old friends.<br>With families.<br>With versions of myself that existed years ago.</p><p>And outside, my bike rested silently.<br>Not in a paid parking lot.<br>Not in a narrow, chaotic lane.<br>Not under worry.</p><p>But in a friend’s home.<br>Safe.<br>Just like me.</p>', quote: '"In Kashi, you feel watched by centuries. In Laitlum, you feel dissolved into the horizon."' },
            { type: 'chapter', id: 'ch19', title: 'Waterfalls, Crowds, and Grease on My Hands', chapter: 'Ch  19', stats: 'Sohra - Christmas Eve', image: 'images/chapter-19.jpg', desc: '<p>Shillong & Sohra – Christmas Eve</p><p>I woke up around 5:45 AM.<br>Before anyone else.<br>Shillong mornings had already become special to me, so I decided to go alone to the sunrise point.</p><p>When I reached, no one was there.<br>Just me.<br>And the horizon.</p><p>Clouds rolled below the cliffs like a silent ocean. The sky slowly shifted colours. The air was sharp and clean. Standing there alone, I felt something deeply peaceful — not excitement, not thrill — just stillness.</p><p>Moments like that don’t need witnesses.<br>They need presence.</p><p>After spending quiet time there, I returned home. By then, my friend was ready. We had breakfast around 7:30 AM and headed toward Cherrapunji again.</p><p>That day was about exploration.<br>We visited the Seven Sisters Falls — water streaming down massive cliffs in multiple ribbons. The scale was overwhelming.</p><p>We drove through winding roads that opened into valleys and fog-covered ridges. The landscape of Meghalaya is not loud — it’s dramatic without trying.</p><p>We explored caves — dark, damp, echoing. Walking through those narrow rock passages felt adventurous in a completely different way from riding highways. Inside the caves, you hear your own breath louder than anything else.</p><p>We stopped at picnic points overlooking endless green valleys. Wind moving across the hills. Silence stretching beyond sight.</p><p>Trust me — the landscape was mind-blowing.<br>It wasn’t just beautiful.<br>It felt untouched.</p><p>By around 5:30 PM, darkness began falling again. We headed back toward Shillong.</p><p>But that evening was different.<br>It was December 24th.<br>As we entered Police Bazaar, the city was alive.</p><p>Music.<br>Lights.<br>People dancing in the streets.<br>Groups celebrating Christmas Eve.</p><p>It felt vibrant and joyful — a completely different energy from the silent valleys we had just left.</p><p>We walked around. Had tea. Absorbed the festive atmosphere. By the time we checked the clock, it was already around 10:30 PM.</p><p>Eventually, we headed home.<br>But my day wasn’t over.</p><h4 class="font-bold text-xl mt-6 mb-2">Grease, Determination, and Gratitude</h4><p>For days, I had been planning to change my engine oil. Long-distance riding demands maintenance. After reaching Shillong, I had managed to find the specific 1.5-litre oil I usually use.</p><p>That night, after dinner, I decided to change it.<br>Christmas Eve.<br>Cold night.<br>Grease on my hands.</p><p>I removed the bolts carefully.<br>But one bolt got stuck.<br>The sump bolt wouldn’t open easily.<br>My tools were limited.<br>One tool even got slightly damaged.</p><p>My friend was tired, yet he stayed with me.<br>We tried patiently.<br>Slowly.<br>Carefully.</p><p>It took nearly an hour just to remove that bolt.<br>When it finally opened, I felt relief — not dramatic relief, but quiet satisfaction.</p><p>The oil drained.<br>Fresh oil went in.</p><p>But tightening the bolt properly was difficult with the tools we had.<br>Still, I managed to secure it enough to recheck in the morning.</p><p>I didn’t want to delay leaving the next day.<br>It was Christmas.<br>I didn’t want my friend to sacrifice his time with family just to accommodate my departure.<br>So I chose to leave early the next day.</p><p>After finishing the oil change, I even washed the bike.<br>Under cold water.<br>At midnight.</p><p>He stood there — cleaned, maintained, ready.</p><p>By the time I lay down, it was nearly 1 AM.</p><p>That day held everything:<br>Silent sunrise.<br>Waterfalls.<br>Caves.<br>Festive streets.<br>And mechanical struggle.</p><p>And somewhere between music in Police Bazaar and grease under my nails, I realised something:<br>This journey was no longer just about destinations.<br>It was about responsibility.</p><p>Toward my machine.<br>Toward my friendships.<br>Toward my own decisions.</p><p>And as I fell asleep, tired but satisfied, I felt grateful.<br>For the road.<br>For the hills.<br>For my friend who stayed up with me.<br>And for a bike that had carried me this far without ever giving up.</p>', quote: '"This journey was no longer just about destinations. It was about responsibility."' },
            { type: 'chapter', id: 'ch20', title: 'Ride into the Sacred Hills', chapter: 'Ch  20', stats: 'South Meghalaya', image: 'images/chapter-20.jpg', desc: '<p>South Meghalaya</p><p>It was Christmas morning.<br>I woke up around 6:30 AM.</p><p>Before leaving, I wished my friend and his family. There was festive warmth in the house — simple, grounded, genuine.</p><p>But before heading toward South Meghalaya, I had unfinished responsibility.<br>The drain bolt from last night’s oil change had not been fully tightened. I could not take a risk.</p><p>Early morning, on Christmas Day, I searched for a garage. Most places were closed.<br>Finally, at a Tata Motors service station, a kind mechanic helped me. He understood the issue immediately, found the correct ring and helped tighten it properly.</p><p>That moment brought relief.<br>Now I could ride with confidence.<br>I started toward South Meghalaya.</p><p>First, I stopped briefly near Umiam Lake — the water calm, reflecting the morning sky. Then I continued deeper into the hills.</p><h4 class="font-bold text-xl mt-6 mb-2">The Sacred Forest</h4><p>One of the places I had planned to visit was the Sacred Forest — Mawphlang Sacred Grove.</p><p>As I entered, the atmosphere changed.<br>The forest felt untouched.<br>Old.<br>Almost guarded.</p><p>A local guide joined me.<br>And the surprising part — he spoke Kannada.<br>He had studied and lived in Bengaluru for some time. Hearing Kannada in the middle of Meghalaya felt unexpected and comforting.</p><p>He shared the history of the sacred grove — how local Khasi communities protect the forest spiritually. Nothing inside the forest can be taken out. Not even a leaf. It is believed that disturbing it brings misfortune.</p><p>The trees were massive.<br>Roots intertwined.<br>The ground soft with centuries of decay.</p><p>The forest didn’t feel like nature alone.<br>It felt sacred in intention.</p><p>Listening to the guide speak about rituals, tribal history, and conservation made me respect the land even more.</p><p>That place wasn’t a tourist spot.<br>It was a living belief system.</p><h4 class="font-bold text-xl mt-6 mb-2">Toward Dawki and the Cleanest Village</h4><p>From there, I started toward Dawki — home to the crystal-clear Umngot River and close to the Bangladesh border.</p><p>The road initially was fine.<br>Then suddenly — it wasn’t.<br>For several kilometres, it was extremely bad.<br>Broken patches. Mud. Uneven surfaces.</p><p>I had to ride carefully.<br>My bike handled it well, but I could feel the strain.<br>Every time the road worsened, I slowed down and mentally thanked him for holding steady.</p><p>After about 10 kilometres of rough stretch, the road improved.<br>And then I saw it — the cleanest village in Asia — Mawlynnong.</p><p>The village felt different.<br>Neat pathways.<br>Bamboo dustbins.<br>Well-maintained houses.<br>Flowers everywhere.</p><p>Cleanliness here wasn’t forced.<br>It was cultural.</p><p>I spent good time walking around. Spoke to a few local men. Their pride in the village was visible. It wasn’t about tourism alone — it was about identity.</p><p>From a viewpoint nearby, I could see the Bangladesh border stretching far into the plains.<br>Standing there, I realised how far I had come from Mysuru.</p><p>Later, I reached Dawki.<br>But the river wasn’t at its best that day. Due to some construction upstream, the water looked muddy. It wasn’t the crystal transparency I had imagined.</p><p>Still, the setting was beautiful.<br>Mountains hugging the river.<br>Boats moving slowly.<br>Border security visible in the distance.</p><p>Around 4 PM, I decided to head back toward Shillong.</p><h4 class="font-bold text-xl mt-6 mb-2">Dust, Darkness, and the Lesson of Continuation</h4><p>When my headlight suddenly stopped working, I was shocked.</p><p>I immediately pulled over.<br>Turned the ignition off.<br>Checked the wiring with whatever little visibility I had.</p><p>But it was dark.<br>Dust was everywhere.<br>My hands were already dirty from the road.</p><p>I couldn’t properly figure out the issue.</p><p>For a few seconds, there was silence inside me.<br>This was not a small problem.<br>It was evening in Meghalaya.<br>The road was narrow.<br>Fog could return anytime.</p><p>But something inside me didn’t panic.<br>A few days earlier, maybe I would have felt anxious.<br>But not now.</p><p>I told myself calmly — You will reach Shillong.<br>And even if the light completely failed, I had options.</p><p>I could call my friend.<br>I could stop somewhere safe.<br>I could wait.</p><p>This journey had taught me something powerful:<br>Not every problem needs panic.<br>Sometimes, it needs pause.</p><p>So instead of worrying, I adapted.<br>I followed behind cars to use their headlights.<br>Reduced my speed.<br>Stayed alert.</p><p>Every kilometre felt earned.<br>Dust covered my jacket. My gloves were dirty. My visor was layered with fine mud.</p><p>But inside, I was steady.</p><p>Somewhere between those dark, slippery stretches and the final approach toward Shillong, I realised:<br>This journey has changed me.<br>Earlier, obstacles felt like interruptions.<br>Now they feel like experiences.</p><p>I don’t have to stop.<br>Maybe I pause.<br>But I never stop.</p><p>When I finally reached my friend’s home and parked the bike safely, I felt deep gratitude.<br>For the machine that had endured the terrain.<br>For the lessons hidden inside inconvenience.<br>For the growth I couldn’t see happening but could feel now.</p><p>That night, sitting at the Christmas dinner table with his family, I wasn’t just tired.<br>I was transformed.<br>Not dramatically.<br>But quietly.</p><p>And quietly is how real change happens.</p>', quote: '"I don’t have to stop. Maybe I pause. But I never stop."' },
            { type: 'chapter', id: 'ch21', title: 'Leaving Warmth, Entering Uncertainty', chapter: 'Ch  21', stats: 'Silchar', image: 'images/chapter-21.jpg', desc: '<p>Shillong to Silchar</p><p>I woke up around 5 AM.<br>The first thing I did was check my bike.</p><p>The headlight that had stopped working the previous evening needed fixing. With limited tools and whatever I had available, I managed to secure the wiring and taped it carefully.</p><p>It wasn’t a perfect repair.<br>But it would work.</p><p>That moment felt satisfying — small mechanical victories on the road build confidence.</p><p>After fixing the light, I took a bath and packed everything slowly.<br>Outside, Shillong was still quiet.</p><p>My friend wasn’t ready to let me leave immediately. Before my departure, he took me to a few beautiful places around Shillong one last time. The hills were calm, the air cool, and the views felt like a gentle farewell from Meghalaya.</p><p>Around noon, he took me to a small local restaurant for authentic Meghalaya food.</p><p>It was simple.<br>Local.<br>Warm.<br>Food always tastes different when shared with people who genuinely care.</p><p>By the time we returned home, it was already around 1:30 PM.</p><p>Then came the difficult part.<br>Saying goodbye.</p><p>His family gathered near the entrance. His father spoke kindly, wishing me a safe journey ahead. His sister smiled warmly.</p><p>And my friend…<br>After 7–8 years, we had met again, spent meaningful days together, and now the road was calling me away.</p><p>We hugged.<br>It was emotional.<br>Not dramatic.<br>But real.</p><p>I started the bike and slowly rolled out of the lane.<br>Shillong disappeared behind me.</p><h4 class="font-bold text-xl mt-6 mb-2">Toward Silchar</h4><p>My plan for the day was to reach Silchar in Assam.<br>I assumed the road would be manageable.<br>After all, it was the holiday season — traffic might be lighter.</p><p>But reality unfolded differently.</p><p>After about 100 kilometres, the road began filling with trucks.<br>Endless trucks.<br>Heavy vehicles crawling slowly through narrow stretches of road.</p><p>The landscape was beautiful but the traffic was intimidating.<br>Somewhere along the way, I passed areas close to the Bangladesh border. The geography felt different. The air felt heavier.</p><p>And then another complication appeared.<br>Time.<br>In that region, the sun sets early.<br>By around 5 PM, darkness had already taken over the hills.</p><p>I realised something uncomfortable.<br>Maybe I had made the wrong decision by leaving Shillong late.<br>The road ahead didn’t show many towns or places to stay.</p><p>And the trucks kept increasing.</p><p>Around 6 PM, things became worse.<br>A massive traffic jam.<br>The road ahead was blocked.<br>Not just a short jam — almost 10 kilometres of trucks stuck on a narrow hill road.</p><p>Dust filled the air.<br>The road itself had almost disappeared in some sections. It was broken, uneven, barely rideable.</p><p>I spoke to a few truck drivers.<br>They looked exhausted.<br>One of them said something that stayed with me.<br>“Brother, this jam may take days to clear.”</p><p>Days.<br>Hearing that, I realised staying there overnight was not an option.</p><p>Carefully, I began navigating through small gaps between trucks. Sometimes the path was barely wide enough for the bike.<br>Dust everywhere.<br>Darkness around.<br>And the road… almost non-existent.</p><p>It was slow, stressful riding.</p><p>Eventually, I managed to cross that stretch and reached a slightly clearer road.</p><p>But now another problem appeared.<br>There were no stays nearby.<br>It was already dark.<br>Around 7:30 PM.</p><p>I called my friend in Shillong and explained the situation.<br>He immediately checked with his father and suggested I continue to Silchar.<br>Another 45 kilometres.<br>About an hour’s ride.</p><p>That felt like the safest option.<br>So I continued.</p><p>The road slowly improved and eventually I entered Silchar.<br>Compared to the isolated stretches behind me, Silchar felt like a proper city — bigger, more active, reassuring.</p><p>I searched for a budget stay and finally found a decent place.<br>Relief.</p><p>After checking in, I met another traveller staying there. Within an hour, we became friends — travel does that sometimes.</p><p>We went out for dinner together.<br>Simple food.<br>Easy conversation.</p><p>And after a long, unpredictable day, that normal moment felt comforting.</p><p>Later that night, I returned to the room and lay down to sleep.<br>Day 21 had started with warmth in Shillong…<br>And ended with dust, darkness, and resilience.</p><p>But that is the nature of long journeys.<br>You leave comfort.<br>And the road immediately reminds you that nothing is guaranteed.<br>Except the experience.</p><h4 class="font-bold text-xl mt-6 mb-2">The 10-Kilometre Standstill</h4><p>Around 6 PM, the road ahead suddenly stopped.<br>Not slowed.<br>Stopped.</p><p>A long line of trucks stretched endlessly along the hill road. Engines off. Drivers sitting outside their vehicles. Dust floating in the headlights.</p><p>I asked a few truck drivers what had happened.<br>One of them looked at me and said, almost casually,<br>“Brother, the road ahead is blocked. It may take days to clear.”</p><p>Days.<br>For a moment I stood there beside my bike, looking at that endless row of trucks disappearing into darkness.</p><p>Strangely, I didn’t panic.<br>There was no fear inside me.<br>Instead, I felt something unexpected — a quiet thrill.</p><p>This… was real adventure.<br>Not the kind you see in photos.<br>Not the romantic version people imagine.</p><p>This was dust, darkness, uncertainty and decision-making on the spot.</p><p>And somewhere inside I realised something clearly:<br>Comfort was never the reason I started this journey.<br>If comfort was the goal, I would have stayed home.</p><p>So instead of worrying, I started observing.<br>Small gaps between trucks.<br>Tiny spaces where a bike could pass.</p><p>Slowly, patiently, I began moving forward.<br>Sometimes the road disappeared completely. Sometimes it was just loose stones and mud. But my bike moved steadily, like he understood the situation as much as I did.</p><p>Every metre felt earned.<br>Dust covered my jacket, my visor, my gloves. The road looked almost invisible under the truck headlights.</p><p>But inside, I was calm.<br>This journey had already taught me something important:<br>Not every difficult moment is a problem.<br>Sometimes it is the story.</p><p>And this — this was one of those stories.</p>', quote: '"Not every difficult moment is a problem. Sometimes it is the story."' },
            { type: 'chapter', id: 'ch22', title: 'When the Road Changed My Plan', chapter: 'Ch  22', stats: 'Tripura', image: 'images/chapter-22.jpg', desc: '<p>Silchar to Jampui Hills, Tripura</p><p>I woke up early again, around 5 AM.<br>Silchar was still quiet when I packed my luggage, took a quick bath, and prepared for the day’s ride. My bike stood outside, ready as always.</p><p>Before leaving, I realised something important — I was completely out of cash.</p><p>So after riding about 30–35 kilometres, I stopped near an ATM and withdrew some money. Long-distance travel teaches you to manage small practical things carefully — fuel, cash, food, rest.</p><p>Around 8:30 or 9 AM, I stopped again because I was hungry. I found a small local place and had breakfast.</p><p>While eating, I began talking with a few local people there. One of them asked about my ride and suggested something unexpected.</p><p>“Why don’t you go to Jampui Hills?” he said.</p><p>My original plan for the day was simple: enter Tripura and reach Agartala.<br>But travel rarely follows fixed plans.</p><p>The more they spoke about Jampui Hills — the views, the landscape, the peaceful villages — the more curious I became.</p><p>I decided to at least ride toward that side and see what happened.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering Tripura</h4><p>By around 11:30 AM, I reached the region near Kanchanpur, which is one of the main gateways toward Jampui Hills.</p><p>There I met a few local people who were asking about my ride and my bike. One of them had worked in Bengaluru earlier.<br>When he heard I was from Karnataka, he immediately started speaking in Kannada.</p><p>In the middle of Tripura, hearing Kannada felt surprising and comforting at the same time.</p><p>He encouraged me to go to Jampui Hills, which was around 35 kilometres away.</p><p>I hesitated for a moment.<br>It was already around 1:30 PM.<br>If I went up to the hills, it might become late in the evening. Finding stay could become difficult.</p><p>But another thought crossed my mind.<br>If I don’t go now, I might regret it later.</p><p>So I decided to go.<br>That decision made the day unforgettable.</p><h4 class="font-bold text-xl mt-6 mb-2">The Climb to Jampui Hills</h4><p>The road toward Jampui Hills slowly climbed upward through beautiful green valleys. I stopped occasionally to admire the landscape.</p><p>At one point, I stopped at a small roadside place where a few girls were sitting nearby. We had a small conversation — simple, friendly exchanges that often happen during solo travel.</p><p>Further ahead, I reached a checkpost where the police stopped me for verification. They checked my documents and asked about my journey.</p><p>When they realised how far I had come riding alone, their reaction surprised me.<br>One officer said with excitement,<br>“Oh my God, you came all the way from there on this bike?”</p><p>He seemed genuinely impressed.<br>Instead of being strict or suspicious, he encouraged me. He even asked about my social media and told me I should share my journey so others could see it.</p><p>That moment felt good.<br>Encouragement from strangers on the road always adds energy to the journey.</p><h4 class="font-bold text-xl mt-6 mb-2">Flying Over Tripura</h4><p>Around 3 PM, I reached Jampui Hills.<br>And something unexpected happened again.</p><p>There was paragliding there.</p><p>Without thinking too much, I decided to try it.<br>The flight became one of the most adventurous moments of the entire trip.</p><p>Normally the ride lasts around 20 minutes, but that day I was in the air for nearly 30–45 minutes.</p><p>Floating above the valleys of Tripura, watching endless green hills stretch beneath me, felt unreal. The entire landscape looked like a green ocean of hills. From up there, the villages, roads, and forests all looked tiny.</p><p>For a moment, the long ride, the dust, the fatigue — everything disappeared.<br>It was pure freedom.</p><p>There was one small challenge though.<br>The minimum combined weight required for safe landing was about 120 kg, but the instructor and I together were around 110 kg. Because of that, the landing wasn’t perfectly smooth.</p><p>Still, the experience was incredible.</p><p>When we landed, something very heartwarming happened.<br>A small crowd had gathered there.<br>Some people clapped.<br>Some came forward and started asking questions about my ride. They were curious about where I had come from and how far I had travelled alone on the bike.</p><p>When they heard about my journey, many of them smiled and wished me well.<br>A few of them said something that stayed with me:<br>“We are happy you came to explore Tripura. Many people don’t know how beautiful our state is.”</p><p>I spent some time talking with them. We exchanged stories, laughed, and spoke about travel and life.<br>Those conversations were simple but genuine.</p><p>In that moment, I wasn’t just a traveller passing through.<br>I felt welcomed.</p><p>Tripura, which had started as an unplanned detour, was slowly becoming one of the most memorable parts of my journey.</p><h4 class="font-bold text-xl mt-6 mb-2">An Unplanned Stay</h4><p>After paragliding, I spent some time in the Jampui Hills area talking with local people. Everyone was friendly and welcoming.</p><p>Later I rode toward the nearby villages — one of them known as one of the cleanest villages in Tripura.<br>But it was Saturday evening.<br>Weekend.<br>Almost every stay was full.</p><p>I started worrying slightly.<br>But again, the road solved the problem in its own way.</p><p>I met a local man who understood my situation and offered a simple place to sleep.<br>It wasn’t a formal hotel.<br>Just a small place with a bed.<br>But for that night, it was enough.</p><p>This journey was never about luxury.<br>It was about experience.</p><p>Later in the evening, another kind person helped arrange food for me. We shared dinner together and spoke for some time.<br>It was simple food.<br>But after such a long, adventurous day, it tasted perfect.</p><p>That night, lying down in that modest room, I thought about the entire day.<br>A random breakfast conversation had changed my plan.<br>That change had given me:<br>A new destination.<br>New people.<br>An unforgettable paragliding experience.<br>And another lesson from the road.</p><p>Sometimes the best parts of a journey are not planned.<br>They happen when you listen to the road.</p><p>And outside, my bike rested quietly after climbing the hills of Tripura.<br>Once again, I felt grateful.</p><p>That machine had carried me through plains, fog, dust, and mountains.<br>Somewhere along this journey, it had stopped feeling like a vehicle.<br>It had become my partner.</p><p>And every kilometre was making me fall in love with the road — and with that bike — all over again.</p>', quote: '"Sometimes the best parts of a journey are not planned. They happen when you listen to the road."' },
            { type: 'chapter', id: 'ch23', title: 'The Shortcut Through the Unknown', chapter: 'Ch  23', stats: 'Aizawl', image: 'images/chapter-23.jpg', desc: '<p>Jampui Hills to Aizawl, Mizoram</p><p>I woke up very early that morning, around 4:30 AM.<br>The hills were still silent. The air was cold and calm. I packed my bike carefully, tightened the luggage straps, and prepared for the day ahead.</p><p>Before leaving Jampui Hills, I wanted to witness one more sunrise.<br>So I rode up toward the viewpoint and waited.</p><p>Around 5:15 AM, the sky slowly began to glow. The sun appeared gently over the hills, lighting the valleys of Tripura with golden light. Only a few people were there that morning, which made the moment even more special.</p><p>I stood quietly for a while, watching the sunrise and absorbing the calmness of the hills.</p><p>After coming down around 6 AM, I met the person who had helped arrange my stay the previous night. We thanked each other, exchanged numbers, and spoke for a few minutes.</p><p>Then it was time to leave.<br>My next destination was Mizoram, specifically Aizawl.</p><p>When I checked the route, there were two options:<br>A longer but safer road — around 400–430 km<br>A shorter route — about 200 km, but through remote mountains and villages</p><p>The longer road meant comfort.<br>The shorter road meant adventure.</p><p>I stood there thinking for a few minutes.<br>Then I told myself something simple:<br>If I came all the way here, why choose comfort now?</p><p>So I took the shortcut.</p><h4 class="font-bold text-xl mt-6 mb-2">The Road That Wasn\'t a Road</h4><p>After riding a few kilometres on the main road, I reached a checkpost. The officials checked my documents and allowed me to proceed.</p><p>Beyond that point, the real journey began.<br>The road slowly disappeared.</p><p>What looked like a road on the map turned into a mountain trail.<br>Broken paths. Mud. Narrow tracks through forests.</p><p>For the first 10–15 kilometres, I barely saw any people.<br>Then I reached a small tribal village.<br>One man approached me and asked questions rather rudely. For a moment I felt uncomfortable.</p><p>A thought crossed my mind:<br>Maybe I should have taken the longer road.</p><p>But there was no turning back.</p><p>A little further ahead, I encountered something even more frightening.<br>A rusted iron bridge, partially broken.<br>Large holes in the metal sheets. The structure looked fragile. Below it, a river flowed quietly.</p><p>One wrong move could mean falling through.<br>I stopped the bike.<br>Took a deep breath.<br>Then slowly crossed it — inch by inch.</p><p>After that, the road continued through isolated villages and rocky paths. In one place, a group of people showed me an “X” sign, which made me slightly nervous.<br>I wasn’t sure if it was a warning or simply a gesture.</p><p>The path became more difficult.<br>Two mountains on either side. A narrow path going through hills and valleys. No proper road. No signs.</p><p>Even worse — the route didn’t appear properly on my map.<br>At that moment I realised something.<br>I was completely relying on instinct.</p><p>But strangely, I didn’t panic.<br>A thought stayed in my mind:<br>Whatever happens, I will handle it.<br>Maybe the bike might break down. Maybe I might struggle.<br>But I will not give up.</p><h4 class="font-bold text-xl mt-6 mb-2">Alone in the Hills</h4><p>By around 7:30–8 AM, I had already ridden nearly 50 kilometres through rough terrain.<br>I stopped my bike and thought for a moment.<br>Should I go back?<br>Or continue?</p><p>Just then, I saw a man riding ahead on a similar path.<br>Relief.</p><p>For a few kilometres, I followed him.<br>At one point he stopped. I thought maybe he needed water or rest.<br>But then I realised he was drinking local rice beer.<br>He insisted I try some.<br>I politely declined and continued riding.</p><p>Soon there was another confusing junction with no signboards.<br>No map guidance.<br>No people around.<br>I trusted my instinct and chose the road that felt right.</p><p>Thankfully, after another 80–90 kilometres, I finally reached a bigger road.<br>It felt like victory.<br>But the road wasn’t easy yet.<br>Mud.<br>Slippery patches.<br>Broken sections.</p><p>Still, I continued.</p><p>Around 10:30 AM, after nearly four hours of continuous riding, I stopped to rest.<br>My friend had given me some oranges, so I ate those along with biscuits.<br>That simple break felt refreshing.</p><h4 class="font-bold text-xl mt-6 mb-2">Entering Mizoram</h4><p>After continuing the ride, I finally entered Mizoram.<br>The landscape changed again.<br>Green hills. Clean roads. Quiet villages.</p><p>The last 25 kilometres before Aizawl were surprisingly good — smooth concrete roads.<br>After the difficult mountain trails earlier, it felt like luxury.</p><p>The view was breathtaking.<br>Endless hills. Houses built along slopes. Clouds moving through valleys.</p><p>I slowed down often, taking photos and simply enjoying the scenery.</p><p>Around 1:30 PM, I finally reached Aizawl.</p><h4 class="font-bold text-xl mt-6 mb-2">A City That Felt Different</h4><p>It was Sunday, and because of Christmas holidays, almost everything was closed.<br>The city looked quiet.</p><p>The stay I had booked was on an upper floor, and the hotel staff were not very helpful. I had to carry my luggage upstairs myself.</p><p>Parking was another issue.<br>The owner told me to park the bike on the roadside. But I wasn’t comfortable leaving it there in a completely new city.<br>Finally I found a nearby parking space and paid extra to keep the bike safe.</p><p>For the next three days, that parking spot would become my bike’s resting place.</p><p>Inside the room, I met a traveller from Africa who was sharing the room. A wooden divider separated our spaces, but we quickly started talking and became comfortable.</p><p>Since all restaurants were closed, I ordered pizza from Zomato.<br>We ate together and then decided to explore
